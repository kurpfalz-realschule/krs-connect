      async uploadFile(file, folder = 'uploads') {
        if (this.isDemo) return URL.createObjectURL(file);

        // Pre-Flight: Datei-Größe (Bucket-Limit ist 25 MB)
        if (file.size > UPLOAD_CONFIG.MAX_BYTES) {
          showToast(`Datei zu groß (${Math.round(file.size / 1024 / 1024)} MB, max. 25 MB).`, 'error');
          return null;
        }

        // Pre-Flight: erlaubter MIME-Type (muss zur Storage-Policy passen)
        const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
        if (file.type && !UPLOAD_CONFIG.ALLOWED_MIME.has(file.type)) {
          showToast(`Dateityp nicht erlaubt (${file.type}). Erlaubt: Bilder, PDF, Word, Excel, PowerPoint, Text.`, 'error');
          return null;
        }
        if (!file.type && !UPLOAD_CONFIG.ALLOWED_EXT.has(ext)) {
          showToast(`Dateiendung .${ext} nicht erlaubt.`, 'error');
          return null;
        }

        // Compress images before upload
        if (file.type.startsWith('image/')) {
          file = await compressImage(file);
        }
        try {
          // Storage-Quota-Check (Free Tier: 1 GB)
          try {
            const { data: storageFiles } = await this.sb.storage.from('images').list('uploads', { limit: 1000 });
            if (storageFiles) {
              const totalSize = storageFiles.reduce((sum, f) => sum + (f.metadata?.size || 0), 0);
              const maxStorage = 900 * 1024 * 1024; // 900 MB Warnschwelle
              if (totalSize + file.size > maxStorage) {
                console.warn(`Storage fast voll: ${Math.round(totalSize / 1024 / 1024)} MB von ~1000 MB`);
                // Nicht blockieren, nur warnen
              }
            }
          } catch (quotaErr) {
            // Quota-Check fehlgeschlagen — kein Problem, Upload trotzdem versuchen
          }
          const path = `${folder}/${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${ext}`;
          const { data, error } = await this.sb.storage.from('images').upload(path, file, {
            contentType: file.type || undefined,
            cacheControl: '3600',
            upsert: false
          });
          if (error) throw error;
          // S1: Bucket ist privat — NICHT die öffentliche URL speichern (400 ohne
          // Login), sondern den stabilen Objekt-Pfad. Beim Rendern zieht das
          // Frontend daraus eine kurzlebige Signed URL (window.__krsResolveStorageUrl).
          return data.path;
        } catch (err) {
          console.error('uploadFile error:', err);
          // Spezifische Fehlermeldungen je nach Supabase-Error
          let msg = 'Datei konnte nicht hochgeladen werden.';
          const txt = (err?.message || err?.error || '').toString();
          if (/exceeded the maximum allowed size|payload too large|413/i.test(txt)) {
            msg = 'Datei zu gro\u00df (max. 25 MB).';
          } else if (/policy|not authorized|permission|RLS|row-level/i.test(txt)) {
            msg = 'Dateityp nicht erlaubt oder fehlende Berechtigung. Erlaubt: Bilder, PDF, Office-Dokumente, Text.';
          } else if (/network|fetch|offline/i.test(txt)) {
            msg = 'Keine Verbindung - bitte Internet pr\u00fcfen.';
          } else if (/duplicate/i.test(txt)) {
            msg = 'Datei mit gleichem Namen existiert bereits.';
          } else if (txt) {
            msg = 'Upload fehlgeschlagen: ' + txt.substring(0, 80);
          }
          showToast(msg, 'error');
          return null;
        }
      }

          message: String(message || '').trim().substring(0, 2000),

      async updateFeedbackStatus(id, status) {

      // ── Team-Dateiablage-Links (v4.12.0) ───────────────────
      // WICHTIG (Normalizer-Drift-Falle): _normalizeTeamLink ist das EINZIGE
      // Mapping DB/Mock → UI. Neue Spalten hier ergänzen, sonst verschwinden
      // sie nach dem Neuladen still aus dem UI.
      _normalizeTeamLink(row) {
        if (!row) return null;
        return {
          id: row.id,
          team_id: row.team_id,
          titel: row.titel || '',
          url: row.url || '',
          beschreibung: row.beschreibung || '',
          icon: row.icon || '',
          created_by: row.created_by ?? null,
          created_at: row.created_at || null,
          sort_order: row.sort_order ?? 0
        };
      }

      async getTeamLinks(teamId) {
        if (this.isDemo) {
          const list = MOCK_TEAM_LINKS[teamId] || [];
          return list.map(l => this._normalizeTeamLink(l))
            .sort((a, b) => (a.sort_order - b.sort_order) || String(a.created_at || '').localeCompare(String(b.created_at || '')));
        }
        try {
          const { data, error } = await this.sb.from('team_links').select('*')
            .eq('team_id', teamId)
            .order('sort_order', { ascending: true })
            .order('created_at', { ascending: true });
          if (error) throw error;
          return (data || []).map(l => this._normalizeTeamLink(l));
        } catch (err) { console.error('getTeamLinks error:', err); return []; }

      async createTeamLink(teamId, { titel, url, beschreibung = '', icon = '' } = {}, userId = null) {
        const cleanTitel = String(titel || '').trim().substring(0, 120);
        const cleanUrl = String(url || '').trim().substring(0, 500);
        if (!cleanTitel) { showToast('Bitte gib dem Link einen Titel.', 'error'); return null; }
        if (!isSafeHttpUrl(cleanUrl)) { showToast('Nur Links mit http:// oder https:// sind erlaubt.', 'error'); return null; }
        const clean = {
          team_id: teamId,
          titel: cleanTitel,
          url: cleanUrl,
          beschreibung: String(beschreibung || '').trim().substring(0, 300),
          icon: String(icon || '').trim().substring(0, 8)
        };
        if (this.isDemo) {
          const list = MOCK_TEAM_LINKS[teamId] || (MOCK_TEAM_LINKS[teamId] = []);
          const link = this._normalizeTeamLink({ id: 'tl' + Date.now(), ...clean, created_by: userId ?? null, created_at: new Date().toISOString(), sort_order: list.length });
          list.push(link);
          return link;
        }
        try {
          const insertObj = { ...clean, sort_order: 0 };
          if (userId) insertObj.created_by = userId;
          const { data, error } = await this.sb.from('team_links').insert(insertObj).select('*').single();
          if (error) throw error;
          return this._normalizeTeamLink(data);
        } catch (err) {
          console.error('createTeamLink error:', err);
          showToast(/row-level security|policy|permission|denied/i.test(err && err.message || '')

            : 'Link konnte nicht gespeichert werden. Bitte versuche es erneut.', 'error');
          return null;
        }
      }

      async updateTeamLink(linkId, updates = {}) {
        const patch = {};
        if (updates.titel !== undefined) {
          const t = String(updates.titel || '').trim().substring(0, 120);
          if (!t) { showToast('Bitte gib dem Link einen Titel.', 'error'); return null; }
          patch.titel = t;
        }
        if (updates.url !== undefined) {
          const u = String(updates.url || '').trim().substring(0, 500);
          if (!isSafeHttpUrl(u)) { showToast('Nur Links mit http:// oder https:// sind erlaubt.', 'error'); return null; }
          patch.url = u;
        }
        if (updates.beschreibung !== undefined) patch.beschreibung = String(updates.beschreibung || '').trim().substring(0, 300);
        if (updates.icon !== undefined) patch.icon = String(updates.icon || '').trim().substring(0, 8);
        if (updates.sort_order !== undefined) patch.sort_order = parseInt(updates.sort_order, 10) || 0;
        if (this.isDemo) {
          for (const list of Object.values(MOCK_TEAM_LINKS)) {
            const l = list.find(x => String(x.id) === String(linkId));
            if (l) { Object.assign(l, patch, { updated_at: new Date().toISOString() }); return this._normalizeTeamLink(l); }
          }
          return null;
        }
        try {
          const { data, error } = await this.sb.from('team_links').update({ ...patch, updated_at: new Date().toISOString() }).eq('id', linkId).select('*').single();
          if (error) throw error;
          return this._normalizeTeamLink(data);
        } catch (err) {
          console.error('updateTeamLink error:', err);

        } catch (err) {

      // ── Team-Termine (v4.12.0) ─────────────────────────────
      // Bewusst KEIN Vollkalender: keine Wiederholungen, keine Erinnerungen.
      // Gleiche Normalizer-Regel wie bei den Team-Links (s. o.).
      _normalizeTermin(row) {
        if (!row) return null;
        return {
          id: row.id,
          team_id: row.team_id,
          titel: row.titel || '',
          datum: row.datum ? String(row.datum).substring(0, 10) : '',
          uhrzeit: row.uhrzeit ? String(row.uhrzeit).substring(0, 5) : '',
          ort: row.ort || '',
          beschreibung: row.beschreibung || '',
          created_by: row.created_by ?? null,
          created_at: row.created_at || null
        };
      }

      _sortTermineAufsteigend(list) {
        return [...list].sort((a, b) =>
          (a.datum + 'T' + (a.uhrzeit || '00:00')).localeCompare(b.datum + 'T' + (b.uhrzeit || '00:00')));
      }

      _cleanTerminFelder({ titel, datum, uhrzeit = '', ort = '', beschreibung = '' } = {}) {
        const cleanTitel = String(titel || '').trim().substring(0, 120);
        const cleanDatum = String(datum || '').trim();
        const cleanUhrzeit = String(uhrzeit || '').trim().substring(0, 5);
        if (!cleanTitel) { showToast('Bitte gib dem Termin einen Titel.', 'error'); return null; }
        if (!/^\d{4}-\d{2}-\d{2}$/.test(cleanDatum)) { showToast('Bitte wähle ein gültiges Datum.', 'error'); return null; }
        if (cleanUhrzeit && !/^\d{2}:\d{2}$/.test(cleanUhrzeit)) { showToast('Bitte gib die Uhrzeit als HH:MM an (oder lasse sie leer).', 'error'); return null; }
        return {
          titel: cleanTitel,
          datum: cleanDatum,
          uhrzeit: cleanUhrzeit,
          ort: String(ort || '').trim().substring(0, 120),
          beschreibung: String(beschreibung || '').trim().substring(0, 500)
        };
      }

      async getTeamTermine(teamId) {
        if (this.isDemo) {
          const list = MOCK_TEAM_TERMINE[teamId] || [];
          return this._sortTermineAufsteigend(list.map(t => this._normalizeTermin(t)));

          const { data, error } = await this.sb.from('team_termine').select('*')
            .eq('team_id', teamId)
            .order('datum', { ascending: true })
            .order('uhrzeit', { ascending: true, nullsFirst: true });

      // ── Reactions ──────────────────────────────
      async getReactions(targetType, targetIds) {
        // Returns Map<targetId, [{emoji, users: [userId,...], count}]>
        const result = new Map();
        if (!targetIds || targetIds.length === 0) return result;
        if (this.isDemo) {
          // Demo: Reactions direkt von den Mock-Posts lesen
          if (targetType === 'post') {
            const allPosts = Object.values(MOCK_POSTS).flat();
            for (const id of targetIds) {
              const post = allPosts.find(p => p.id === id);
              if (post && post.reactions && post.reactions.length > 0) {
                result.set(id, post.reactions.map(r => ({ ...r, users: [...(r.users || [])] })));
              }
            }
          } else if (targetType === 'message') {
            for (const id of targetIds) {
              const rs = MOCK_MESSAGE_REACTIONS[id];
              if (rs && rs.length > 0) result.set(id, rs.map(r => ({ ...r, users: [...(r.users || [])] })));
            }
          }
          return result;
        }
        try {
          const { data, error } = await this.sb.from('reactions')
            .select('target_id, emoji, user_id')
            .eq('target_type', targetType)
            .in('target_id', targetIds);
          if (error) throw error;
          // Group by target_id + emoji
          for (const r of (data || [])) {
            if (!result.has(r.target_id)) result.set(r.target_id, {});
            const byEmoji = result.get(r.target_id);
            if (!byEmoji[r.emoji]) byEmoji[r.emoji] = [];
            byEmoji[r.emoji].push(r.user_id);
          }
          // Convert to array format
          const formatted = new Map();
          for (const [tid, byEmoji] of result) {
            formatted.set(tid, Object.entries(byEmoji).map(([emoji, users]) => ({ emoji, users, count: users.length })));
          }
          return formatted;
        } catch (err) {
          console.error('getReactions error:', err);
          return result;
        }
      }

      // ── Read Receipts (Lesebestätigungen) ──────────────
      async markPostRead(postId, userId) {

          await this.sb.from('post_reads').upsert({ post_id: postId, user_id: userId }, { onConflict: 'post_id,user_id' });

      async getPostReads(postIds) {

        if (!postIds || postIds.length === 0) return result;

          for (const id of postIds) {

              user_id: u.id, display_name: u.display_name, read_at: new Date().toISOString()
            }));
            result.set(id, readers);
          }

            .select('post_id, user_id, read_at, users(display_name)')

          if (error) throw error;
          for (const r of (data || [])) {

      // ── Profile Update ──────────────────────────────
      async updateProfile(userId, updates) {
        // Whitelist: Nur erlaubte Felder durchlassen
        const ALLOWED_FIELDS = ['display_name', 'avatar_color', 'avatar_url', 'status'];
        const safeUpdates = {};
        for (const key of Object.keys(updates)) {

          if (user) Object.assign(user, safeUpdates);
          return user;

          if (error) throw error;
          return data;

      // ── Polls ─────────────────────────────────────
      async createPoll(channelId, authorId, question, options) {
        const pollData = { question, options: options.map((o, i) => ({ id: i, text: o, votes: [] })), totalVotes: 0, multiSelect: false };
        if (this.isDemo) {
          const post = {
            id: 'poll-' + Date.now(), channel_id: channelId,
            author: MOCK_USERS.find(u => u.id === authorId) || MOCK_USERS[0],
            content: '<p>📊 ' + question + '</p>',
            poll_data: pollData,
            reactions: [], replies: 0, reply_users: [],
            created_at: new Date().toLocaleString('de-DE')
          };
          if (!MOCK_POSTS[channelId]) MOCK_POSTS[channelId] = [];
          MOCK_POSTS[channelId].unshift(post);
          return { ...post, reactions: [] };
        }
        try {
          const { data, error } = await this.sb.from('posts').insert({
            channel_id: channelId, author_id: authorId,
            content: '<p>📊 ' + question + '</p>',
            poll_data: pollData
          }).select('*, author:users(*)').single();
          if (error) throw error;
          return data;
        } catch (err) {
          console.error('createPoll error:', err);
          showToast('Umfrage konnte nicht erstellt werden.', 'error');
          return null;
        }
      }

      async votePoll(postId, optionId, userId) {
        if (this.isDemo) {
          for (const chPosts of Object.values(MOCK_POSTS)) {
            const post = chPosts.find(p => p.id === postId);
            if (post?.poll_data) {
              // Remove previous vote
              post.poll_data.options.forEach(o => { o.votes = o.votes.filter(v => v !== userId); });
              // Add new vote
              const opt = post.poll_data.options.find(o => o.id === optionId);
              if (opt) opt.votes.push(userId);
              post.poll_data.totalVotes = post.poll_data.options.reduce((sum, o) => sum + o.votes.length, 0);
              return { ...post };
            }
          }
          return null;
        }
        try {
          // Fetch current poll data
          const { data: post, error: fetchErr } = await this.sb.from('posts').select('poll_data').eq('id', postId).single();
          if (fetchErr) throw fetchErr;
          const pd = post.poll_data;
          // Remove previous vote by this user
          pd.options.forEach(o => { o.votes = o.votes.filter(v => v !== userId); });
          // Add new vote
          const opt = pd.options.find(o => o.id === optionId);
          if (opt) opt.votes.push(userId);
          pd.totalVotes = pd.options.reduce((sum, o) => sum + o.votes.length, 0);
          const { data, error } = await this.sb.from('posts').update({ poll_data: pd }).eq('id', postId).select('*, author:users(*)').single();
          if (error) throw error;
          return data;
        } catch (err) {
          console.error('votePoll error:', err);
          showToast('Abstimmung konnte nicht gespeichert werden.', 'error');
          return null;
        }
      }

      async toggleReaction(targetType, targetId, userId, emoji) {
        // Emoji-Validierung: nur echte Emojis (1-8 Zeichen Unicode), kein HTML/Script
        if (!emoji || emoji.length > 8 || /<|>|&|"|'/.test(emoji)) {
          console.error('Invalid emoji rejected:', emoji);
          return false;
        }
        if (this.isDemo) {
          // Toggle in mock data — Posts an den Post-Objekten, Messages im Store.
          const applyToggle = (list) => {
            const existing = list.find(r => r.emoji === emoji);
            if (existing) {
              if (existing.users.includes(userId)) {
                existing.users = existing.users.filter(u => u !== userId);
                existing.count = existing.users.length;
                if (existing.count === 0) return list.filter(r => r.emoji !== emoji);
              } else {
                existing.users.push(userId);
                existing.count = existing.users.length;
              }
            } else {
              list.push({ emoji, users: [userId], count: 1 });
            }
            return list;
          };
          if (targetType === 'message') {
            const list = MOCK_MESSAGE_REACTIONS[targetId] ? [...MOCK_MESSAGE_REACTIONS[targetId]] : [];
            MOCK_MESSAGE_REACTIONS[targetId] = applyToggle(list);
            return true;
          }
          const postsArray = targetType === 'post' ? Object.values(MOCK_POSTS).flat() : [];
          const target = postsArray.find(p => p.id === targetId);
          if (target) {
            if (!target.reactions) target.reactions = [];

      async getConversations(userId) {
        if (this.isDemo) return [...MOCK_CONVERSATIONS];
        try {
          // 1. Finde alle Konversationen des Users (mit Join statt 2 separate Queries)
          const { data: memberships, error: err1 } = await this.sb
            .from('conversation_members')
            .select('conversation_id, conversations(*)')
            .eq('user_id', userId);
          if (err1) throw err1;
          if (!memberships?.length) return [];

          const convIds = memberships.map(m => m.conversation_id);
          const convs = memberships.map(m => m.conversations).filter(Boolean);
          if (!convs.length) return [];

          // 2+3. Lade Teilnehmer UND letzte Nachrichten parallel
          const [membersRes, msgsRes] = await Promise.all([
            this.sb.from('conversation_members').select('conversation_id, user_id, users(*)').in('conversation_id', convIds),
            this.sb.from('messages').select('conversation_id, content, created_at').in('conversation_id', convIds).order('created_at', { ascending: false })
          ]);
          const allMembers = membersRes.data || [];
          const lastMsgs = msgsRes.data || [];

          // 4. Reichere Konversationen an
          return convs.map(conv => {
            const members = allMembers.filter(m => m.conversation_id === conv.id);
            const lastMsg = lastMsgs.find(m => m.conversation_id === conv.id);
            const convObj = {
              ...conv,
              lastMessage: lastMsg?.content || '',
              time: lastMsg ? formatDate(lastMsg.created_at) : '',
              lastActivityAt: lastMsg?.created_at || conv.updated_at || conv.created_at || null
            };
            if (conv.is_group) {
              convObj.members = members.map(m => m.user_id);
              convObj.name = conv.name || 'Gruppenchat';
            } else {
              const otherMember = members.find(m => m.user_id !== userId);
              convObj.user = otherMember?.users || { display_name: 'Unbekannt', avatar_color: '#757575' };
            }
            return convObj;
          });
        } catch (err) {
          console.error('getConversations error:', err);
          return [];
        }
      }

      _readHiddenLs(kind, userId) {
        try { return new Set(JSON.parse(localStorage.getItem(this._hiddenLsKey(kind, userId)) || '[]')); }

              .or(`content.ilike.%${query}%,title.ilike.%${query}%`)

              .limit(20);

          try {

              .textSearch('content', query, { type: 'websearch', config: 'german' })
              .order('created_at', { ascending: false })
              .limit(20);
            messages = ftsMsgs;
          } catch (ftsErr) {
            const { data: ilikeMsgs } = await this.sb.from('messages')
              .select('*, sender:users(*)')
              .ilike('content', `%${query}%`)
              .order('created_at', { ascending: false })

      // Presence: track online users
      trackPresence(userId, displayName, onPresenceChange) {
        if (this.isDemo || !this.sb) {
          // Demo: Fake einige User als online
          const fakeOnline = new Set([1, 3, 5]);
          fakeOnline.add(Number(userId));
          setTimeout(() => onPresenceChange(fakeOnline), 500);
          return () => {};
        }
        const subKey = 'presence';
        this.subManager.remove(subKey); // Alte Presence aufräumen
        const presenceChannel = this.sb.channel('online-users', {
          config: { presence: { key: userId } }
        });
        presenceChannel
          .on('presence', { event: 'sync' }, () => {
            const state = presenceChannel.presenceState();
            const onlineIds = new Set();
            Object.values(state).forEach(presences => {
              presences.forEach(p => {
                if (p.user_id != null) {
                  onlineIds.add(Number(p.user_id));
                }
              });
            });
            onPresenceChange(onlineIds);
          })
          .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
              await presenceChannel.track({
                user_id: userId,
                display_name: displayName,
                online_at: new Date().toISOString()
              });
            }
          });
        this.subManager.add(subKey, presenceChannel);
        return () => { this.subManager.remove(subKey); };
      }

        } catch (err) {
          console.error('updatePassword error:', err);
          return { error: err.message || 'Passwort konnte nicht geändert werden.' };
        }
      }

      // Aktuelle Session prüfen
      async getSession() {
        if (this.isDemo || !this.sb) return null;
        try {
          const { data: { session } } = await this.sb.auth.getSession();
          return session;
        } catch (err) {
          console.error('getSession error:', err);
          return null;
        }
      }

      // Auth-User in users-Tabelle auflösen + auth_id verknüpfen (Phase 6)
      async resolveAuthUser(authUser) {
        if (!authUser || this.isDemo) return null;
        try {
          // Suche User in der users-Tabelle per E-Mail
          const { data, error } = await this.sb.from('users').select('*').eq('email', authUser.email).single();
          if (error && error.code !== 'PGRST116') throw error; // PGRST116 = no rows
          if (!data) {
            console.warn('resolveAuthUser: Kein User mit Email', authUser.email);
            return null;
          }
          // auth_id verknüpfen falls noch nicht gesetzt (einmalig beim ersten Login)
          if (!data.auth_id) {
            const { error: updateErr } = await this.sb.from('users')
              .update({ auth_id: authUser.id, status: 'active' })
              .eq('id', data.id);
            if (updateErr) console.warn('auth_id Verknüpfung fehlgeschlagen:', updateErr);
            else data.auth_id = authUser.id;
          }
          // User-Preferences initialisieren falls nötig
          const { data: prefs } = await this.sb.from('user_preferences')
            .select('*').eq('user_id', data.id).single();
          if (!prefs) {
            try { await this.sb.from('user_preferences').insert({ user_id: data.id }); } catch (e) { /* prefs optional */ }
          }
          return data;
        } catch (err) {
          console.error('resolveAuthUser error:', err);
          return null;
        }
      }

      // Auth-State-Listener
      onAuthStateChange(callback) {
        if (this.isDemo || !this.sb) return () => {};
        const { data: { subscription } } = this.sb.auth.onAuthStateChange((event, session) => {
          callback(event, session);
        });
        return () => subscription?.unsubscribe();
      }

      // Logout
      async signOut() {
        if (this.isDemo || !this.sb) return;
        try {
          await this.sb.auth.signOut();
        } catch (err) {
          console.error('signOut error:', err);
        }
      }

      // ── Phase 6: User-Preferences (Supabase statt localStorage) ──
      async getUserPreferences(userId) {
        if (this.isDemo) return { read_receipts_enabled: false, notifications_enabled: true, saved_posts: [], onboarding_done: false };
        try {
          const { data } = await this.sb.from('user_preferences').select('*').eq('user_id', userId).single();
          return data || { read_receipts_enabled: false, notifications_enabled: true, saved_posts: [], onboarding_done: false };
        } catch (e) { return { read_receipts_enabled: false, notifications_enabled: true, saved_posts: [], onboarding_done: false }; }
      }

      async updateUserPreference(userId, key, value) {
        if (this.isDemo) return;
        try {
          await this.sb.from('user_preferences')
            .upsert({ user_id: userId, [key]: value, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
        } catch (e) { console.warn('updateUserPreference error:', e); }
      }

      // ── Phase 6: Admin-Panel Methoden ──
      async getAllUsersAdmin() {
        if (this.isDemo) return MOCK_USERS;
        try {
          const { data, error } = await this.sb.from('users').select('*').order('display_name');
          if (error) throw error;
          return data || [];
        } catch (e) { console.error('getAllUsersAdmin error:', e); return []; }
      }

      async inviteUser(email, displayName, role = 'member') {
        if (this.isDemo) return null;
        try {
          // A3 (22.07.2026, C-B-17): siehe TEAM_COLORS-Kommentar für die
          // Kontrast-Nachweise; hier zusätzlich #4ECDC4→#25827c, #FF6B6B→#eb0000,
          // #45B7D1→#257f94, #96CEB4→#3c8262, #FFEAA7→#937000, #DDA0DD→#b942b9,
          // #87CEEB→#1c7da5 (alle ≥ 4.5:1 gegen #fff).
          const colors = ['#6c5df6','#25827c','#eb0000','#257f94','#3c8262','#937000','#b942b9','#1c7da5'];
          const { data, error } = await this.sb.from('users').insert({
            email: email.toLowerCase(),
            display_name: displayName,
            role,
            status: 'invited',
            avatar_color: colors[Math.floor(Math.random() * colors.length)]
          }).select().single();
          if (error) throw error;
          return data;
        } catch (e) {
          console.error('inviteUser error:', e);
          showToast('Einladung fehlgeschlagen: ' + (e.message || 'Unbekannter Fehler'), 'error');
          return null;
        }
      }

      async updateUserStatus(userId, status) {
        if (this.isDemo) return;
        try {
          await this.sb.from('users').update({ status }).eq('id', userId);
        } catch (e) { console.error('updateUserStatus error:', e); }
      }

      async updateUserRole(userId, role) {
        if (this.isDemo) return;
        try {
          await this.sb.from('users').update({ role }).eq('id', userId);
        } catch (e) { console.error('updateUserRole error:', e); }
      }

      cleanup() {
        // SubscriptionManager aufräumen (Phase 7.1)
        this.subManager.cleanup();
        // Legacy-Array aufräumen (falls noch genutzt)
        this.subscriptions.forEach(s => {
          try {
            if (s.unsubscribe) s.unsubscribe();
            if (this.sb && this.sb.removeChannel) this.sb.removeChannel(s);
          } catch (e) {
            console.warn('Cleanup error:', e);
          }
        });
        this.subscriptions = [];
      }
    }

    // ============================================================
    function UpdateBanner() {
      const [newVersion, setNewVersion] = useState(null);
      const [dismissed, setDismissed] = useState(false);
      useEffect(() => {
        if (window.__KRS_FORCE_DEMO) return; // im Test-/Demo-Modus nicht pollen
        const current = window.KRS_VERSION;
        let stopped = false;
        const check = async () => {
          try {
            const res = await fetch('index.html?_=' + Date.now(), { cache: 'no-store' });
            if (!res.ok) return;
            const txt = await res.text();
            const m = txt.match(/KRS_VERSION\s*=\s*'([^']+)'/);
            const remote = m && m[1];
            if (!stopped && remote && remote !== current) setNewVersion(remote);
          } catch (e) { /* offline / CDN — still ignorieren */ }
        };
        check();
        const id = setInterval(check, 5 * 60 * 1000); // alle 5 Minuten
        const onFocus = () => check();
        window.addEventListener('focus', onFocus);
        return () => { stopped = true; clearInterval(id); window.removeEventListener('focus', onFocus); };
      }, []);
      if (!newVersion || dismissed) return null;
      return React.createElement('div', { className: 'update-banner', role: 'alert' },
        React.createElement('span', null, '🔄 Neue Version ' + newVersion + ' verfügbar — du nutzt v' + window.KRS_VERSION + '.'),

        React.createElement('button', { className: 'later', onClick: () => setDismissed(true) }, 'Später')

    // Reduziert das style-Attribut eines Knotens auf eine sichere Whitelist

    function filterSafeStyle(node) {

      const color = grab(/(?:^|;|\s)color\s*:\s*([^;]+)/i);

      if (bg && safeColorVal(bg) && !PASTE_DEFAULT_COLORS.includes(bg.toLowerCase())) keep.push('background-color: ' + bg);

    function simplifyPastedHtml(rawHtml) {

      root.querySelectorAll('img').forEach(img => {

        });

      while (removed && guard2++ < 30) {

        .replace(/[ \t]{2,}/g, ' ')
        .replace(/\n{3,}/g, '\n\n')

    // ── Formatting Toolbar ──
    function FormatToolbar({ textareaRef, value, onChange }) {

      const wrapSelection = useCallback((before, after) => {
        const ta = textareaRef.current;
        if (!ta) return;

          .split(/\r?\n/)
          .map(line => line.replace(/^\s*(?:[-*•]|\d+[.)])\s*/, '').trim())
          .filter(Boolean);
        const listHtml = '<ul>\n' + listItems.map(item => '<li>' + item + '</li>').join('\n') + '\n</ul>';
        const prefix = start > 0 && !value.substring(0, start).endsWith('\n') ? '\n' : '';
        const suffix = end < value.length && !value.substring(end).startsWith('\n') ? '\n' : '';
        const insert = prefix + listHtml + suffix;
        const newText = value.substring(0, start) + insert + value.substring(end);
        onChange(newText);
        setTimeout(() => {
          ta.focus();
          if (!selected) {
            const itemStart = start + prefix.length + '<ul>\n<li>'.length;
            ta.setSelectionRange(itemStart, itemStart + 'Punkt'.length);
          }

    // ── Chat-Übersicht: Sortierung nach letzter Aktivität (Teams-Style) ──
    // Zuletzt aktiver Chat steht oben in der linken Liste.
    function getConversationActivityMs(conv) {
      if (!conv) return 0;
      if (typeof conv._lastActivityTs === 'number') return conv._lastActivityTs;
      const raw = conv.lastActivityAt || conv.last_message_at || conv.updated_at || conv.created_at;
      const parsed = raw ? Date.parse(raw) : NaN;
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function sortConversationsByActivity(conversations) {
      return [...(conversations || [])].sort((a, b) => getConversationActivityMs(b) - getConversationActivityMs(a));
    }

    // Aktualisiert Vorschau/Zeit/Unread einer Konversation bei neuer Nachricht
    // und sortiert die Liste neu (betroffener Chat wandert nach oben).
    function updateConversationActivity(conversations, message, options = {}) {
      const conversationId = message?.conversation_id;
      if (conversationId == null) return sortConversationsByActivity(conversations);
      const parsed = message?.created_at ? Date.parse(message.created_at) : NaN;
      const fallbackTs = options.activityTs || Date.now();
      const activityTs = Number.isFinite(parsed) ? parsed : fallbackTs;
      const activityAt = Number.isFinite(parsed) ? message.created_at : new Date(activityTs).toISOString();
      const preview = message?.content || (message?.image_url ? '📎 Datei' : '');
      const time = options.timeLabel || (message?.created_at ? formatDate(message.created_at) : 'Gerade eben');
      const unreadDelta = options.unreadDelta || 0;

      return sortConversationsByActivity((conversations || []).map(conv => {
        if (String(conv.id) !== String(conversationId)) return conv;
        const nextUnread = Math.max(0, (conv.unread || 0) + unreadDelta);
        return {
          ...conv,
          lastMessage: preview,
          time,
          lastActivityAt: activityAt,
          _lastActivityTs: activityTs,
          unread: nextUnread
        };
      }));
    }

    function highlightMentions(containerEl) {
      // DOM-basiert statt Regex+HTML (XSS-sicher)
      // Iteriert über TextNodes und wrapped @Mentions in <span>
      const walker = document.createTreeWalker(containerEl, NodeFilter.SHOW_TEXT, null);
      const mentionRegex = /@([\wäöüÄÖÜß]+(?:\s[\wäöüÄÖÜß.]+)?)/g;
      const textNodes = [];
      while (walker.nextNode()) textNodes.push(walker.currentNode);
      for (const node of textNodes) {
        const text = node.nodeValue;
        if (!mentionRegex.test(text)) continue;
        mentionRegex.lastIndex = 0;
        const frag = document.createDocumentFragment();
        let lastIdx = 0;
        let match;
        while ((match = mentionRegex.exec(text)) !== null) {
          if (match.index > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
          const span = document.createElement('span');
          span.className = match[1].toLowerCase() === 'alle' ? 'mention-tag-all' : 'mention-tag';
          span.textContent = match[0]; // textContent = XSS-sicher
          frag.appendChild(span);
          lastIdx = mentionRegex.lastIndex;
        }
        if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
        node.parentNode.replaceChild(frag, node);
      }
    }

    function sanitizeHtml(html) {
      if (!html) return '';
      const tmp = document.createElement('div');

      if (window.DOMPurify && window.DOMPurify.sanitize) {
        // SICHER: DOMPurify verfügbar
        tmp.innerHTML = DOMPurify.sanitize(html, SANITIZE_CONFIG);
        // Inline-Styles auf sichere Whitelist reduzieren (Farben bleiben erhalten)
        tmp.querySelectorAll('[style]').forEach(filterSafeStyle);
        // Bilder: unsichere Quellen entfernen, sichere Bilder DSGVO-schonend laden
        tmp.querySelectorAll('img').forEach(img => {
          const src = img.getAttribute('src') || '';
          if (!isSafeImageSrc(src)) { img.remove(); return; }
          img.removeAttribute('style');
          img.setAttribute('loading', 'lazy');
          img.setAttribute('referrerpolicy', 'no-referrer');
        });
        tmp.querySelectorAll('a').forEach(a => {
          a.setAttribute('target', '_blank');

          const isVoted = opt.votes?.includes(userId);

    // ── Poll Creator ─────────────────────────────

      const [question, setQuestion] = useState('');
      const [options, setOptions] = useState(['', '']);

      const addOption = () => { if (options.length < CONFIG.MAX_POLL_OPTIONS) setOptions(prev => [...prev, '']); };
      const removeOption = (idx) => { if (options.length > 2) setOptions(prev => prev.filter((_, i) => i !== idx)); };
      const updateOption = (idx, val) => setOptions(prev => prev.map((o, i) => i === idx ? val : o));

      const handleSubmit = () => {
        const q = question.trim();
        if (!q) { showToast('Bitte eine Frage eingeben', 'error'); return; }
        if (q.length > CONFIG.MAX_POLL_QUESTION) { showToast('Frage zu lang (max. ' + CONFIG.MAX_POLL_QUESTION + ' Zeichen)', 'error'); return; }
        const opts = options.map(o => o.trim()).filter(o => o.length > 0);
        if (opts.length < CONFIG.MIN_POLL_OPTIONS) { showToast('Mindestens ' + CONFIG.MIN_POLL_OPTIONS + ' Optionen nötig', 'error'); return; }
        const tooLong = opts.find(o => o.length > CONFIG.MAX_POLL_OPTION);
        if (tooLong) { showToast('Option zu lang (max. ' + CONFIG.MAX_POLL_OPTION + ' Zeichen)', 'error'); return; }
        onCreatePoll(q, opts);

        )

    // ============================================================
    // ANHÄNGE — gemeinsame Render-Komponente (Posts + Chat)
    // Bilder als Thumbnails, Dokumente als Teams-artige Datei-Karten.
    // Klick öffnet den Datei-Viewer (Vorschau), Karte hat Download-Button.
    // ============================================================
    function _attExt(f){ var n = (f.name || f.url || '').split('?')[0]; return (n.split('.').pop() || '').toLowerCase(); }
    function _attIsImage(f){ return /^image\//.test(f.type || '') || /\.(jpg|jpeg|png|gif|webp)(\?|$)/i.test(f.url || ''); }
    function _attIcon(f){ if (_attIsImage(f)) return '🖼️'; var m = { pdf:'📕', doc:'📘', docx:'📘', xls:'📗', xlsx:'📗', csv:'📗', ppt:'📙', pptx:'📙', txt:'📄', md:'📄', zip:'🗜️' }; return m[_attExt(f)] || '📎'; }
    function _attSize(b){ if (b == null || isNaN(b)) return ''; if (b < 1024) return b + ' B'; if (b < 1048576) return Math.round(b/1024) + ' KB'; return (b/1048576).toFixed(1) + ' MB'; }
    function _attParse(image_url){
      var files = [];
      try { var p = JSON.parse(image_url); if (Array.isArray(p)) files = p; } catch (e) {}
      if (files.length === 0 && image_url) {
        var nm = 'Datei'; try { nm = decodeURIComponent(image_url.split('?')[0].split('/').pop()) || 'Datei'; } catch (e) {}
        files = [{ url: image_url, name: nm, type: '' }];
      }
      return files;
    }
    function FileCard({ file, compact }) {
      var ext = _attExt(file);
      var meta = (ext ? ext.toUpperCase() : '') + (file.size ? (' · ' + _attSize(file.size)) : '');
      return React.createElement('div', { onClick: () => window.openFileViewer([file], 0), title: 'Vorschau öffnen', role: 'button', tabIndex: 0,
        onKeyDown: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.openFileViewer([file], 0); } },
        style: { display: 'inline-flex', alignItems: 'center', gap: '8px', padding: compact ? '6px 8px' : '8px 10px', background: 'var(--bg-tertiary)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', cursor: 'pointer', maxWidth: '280px', minHeight: '44px' } },
        React.createElement('span', { style: { fontSize: compact ? '18px' : '22px', flexShrink: 0 } }, _attIcon(file)),
        React.createElement('div', { style: { minWidth: 0, flex: 1 } },
          React.createElement('div', { style: { fontSize: compact ? '12px' : '13px', color: 'var(--text-primary)', fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, file.name || 'Datei'),

        ),

      );
    }
    function AttachmentBlock({ image_url, compact }) {
      var files = _attParse(image_url);
      if (files.length === 0) return null;
      var images = files.filter(_attIsImage);
      var docs = files.filter(function(f){ return !_attIsImage(f); });
      function openAt(f){ return function(){ window.openFileViewer(files, files.indexOf(f)); }; }
      return React.createElement('div', { style: { margin: compact ? '0 0 4px' : '8px 0' } },
        images.length > 0 && React.createElement('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: docs.length > 0 ? '6px' : 0 } },
          images.map(function(img, i){ return React.createElement(SignedImg, { key: i, src: img.url, alt: img.name || '', title: img.name || '',
            style: { maxWidth: images.length === 1 ? (compact ? '240px' : '100%') : (compact ? '120px' : '48%'), maxHeight: images.length === 1 ? (compact ? '200px' : '400px') : (compact ? '100px' : '200px'), borderRadius: 'var(--radius)', cursor: 'pointer', objectFit: 'cover', display: 'block' },
            onClick: openAt(img) }); })
        ),

    function FeedbackModal({ user, dataService, onClose, onOpenBoard, canGoBack }) {
      const [category, setCategory] = useState('');
      const [rating, setRating] = useState(0);
      const [message, setMessage] = useState('');
      const [sending, setSending] = useState(false);
      const [lastSubmit, setLastSubmit] = useState(0);

      const categories = [
        { id: 'bug', label: '🐛 Bug / Fehler' },
        { id: 'verbesserung', label: '💡 Verbesserung' },
        { id: 'lob', label: '👍 Lob' },
        { id: 'frage', label: '❓ Frage' },
        { id: 'sonstiges', label: '📝 Sonstiges' }
      ];

      const canSend = !!category && !!message.trim();
      const handleSubmit = async () => {
        // Pflichtfelder werden über den deaktivierten Button + Inline-Hinweis klar
        // gemacht — kein verwirrender Fehler-Toast mehr (Wunsch Norbert 20.06.).
        if (!canSend) return;
        // Rate-Limiting: 10 Sekunden Cooldown
        if (Date.now() - lastSubmit < 10000) {
          showToast('Bitte warte einen Moment vor dem nächsten Feedback.', 'info');
          return;
        }
        setSending(true);
        // 1) Primär: ins Feedback-Board (Supabase bzw. Demo-Store) speichern
        try {
          await dataService.submitFeedback({
            userId: user?.id || null,
            name: user?.display_name || 'Anonym',
            category: category || 'sonstiges',
            rating: Math.min(Math.max(rating, 0), 5),
            message: message.trim(),
            page: window.location.href
          });
        } catch (err) {
          console.error('submitFeedback error:', err);
          const msg = (err && (err.message || err.hint || err.details)) || 'Unbekannter Fehler';
          showToast('Feedback konnte nicht gespeichert werden: ' + msg, 'error');
          setSending(false);
          return;
        }

        // 2) Best-effort: zusätzlich ins bestehende Google-Sheet (Archiv, optional)
        if (FEEDBACK_GAS_URL) {
          try {
            await fetch(FEEDBACK_GAS_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify({
                name: String(user?.display_name || 'Anonym').substring(0, 100),
                category: category || 'sonstiges',
                rating: Math.min(Math.max(rating, 0), 5),
                message: String(message.trim()).substring(0, 2000),
                page: String(window.location.href).substring(0, 200),
                userAgent: String(navigator.userAgent).substring(0, 300)
              })
            });
          } catch (e) { console.warn('GAS-Feedback (optional) fehlgeschlagen:', e); }
        }

        setLastSubmit(Date.now());
        showToast('Danke für dein Feedback!', 'success');
        onClose();
      };

      return React.createElement('div', { className: 'feedback-overlay', role: 'dialog', 'aria-modal': 'true', 'aria-label': '📣 Feedback geben', onClick: (ev) => { if (ev.target === ev.currentTarget) onClose(); } },
        React.createElement('div', { className: 'feedback-modal' },
          React.createElement('div', { className: 'feedback-title' }, '📣', ' Feedback geben'),

          React.createElement('div', { className: 'feedback-label' }, 'Kategorie ', React.createElement('span', { style: { color: 'var(--danger)' } }, '*'), React.createElement('span', { style: { fontWeight: 400, color: 'var(--text-muted)', fontSize: '12px' } }, ' (bitte wählen)')),
          React.createElement('div', { className: 'feedback-categories' },
            categories.map(cat =>
              React.createElement('button', {
                key: cat.id,
                className: 'feedback-cat' + (category === cat.id ? ' active' : ''),
                onClick: () => setCategory(cat.id)
              }, cat.label)
            )
          ),

          React.createElement('div', { className: 'feedback-label' }, 'Wie gefällt dir ' + (window.T ? window.T('app.name', 'die App') : 'die App') + '? (optional)'),
          React.createElement('div', { className: 'feedback-stars' },
            [1, 2, 3, 4, 5].map(star =>
              React.createElement('button', {
                key: star,
                className: 'feedback-star' + (star <= rating ? ' active' : ''),
                onClick: () => setRating(star === rating ? 0 : star),
                'aria-label': star + ' Sterne'
              }, star <= rating ? '★' : '☆')
            )

          React.createElement('div', { className: 'feedback-label' }, 'Deine Nachricht ', React.createElement('span', { style: { color: 'var(--danger)' } }, '*')),
          React.createElement('textarea', {
            className: 'feedback-textarea',

          React.createElement('div', { style: { fontSize: '11px', color: 'var(--text-muted)', textAlign: 'right', marginTop: '4px' } },
            message.length + ' / 2000'
          ),

          !canSend && React.createElement('div', { style: { fontSize: '12px', color: 'var(--text-muted)', marginTop: '8px' } },
            !category ? 'Bitte zuerst ein Thema wählen.' : 'Bitte noch eine Nachricht schreiben.'),

    function useNotifications() {
      const [notificationsEnabled, setNotificationsEnabled] = useState(() => {
        try { return localStorage.getItem('krs-notifications') !== 'off'; } catch(e) { return true; }
      });
      const [notificationPermission, setNotificationPermission] = useState(() => {
        return typeof Notification !== 'undefined' ? Notification.permission : 'denied';
      });

      const requestNotifications = useCallback(async () => {
        if (typeof Notification === 'undefined') {
          showToast('Browser unterstützt keine Benachrichtigungen', 'error');
          return;
        }
        const perm = await Notification.requestPermission();
        setNotificationPermission(perm);
        if (perm === 'granted') {
          setNotificationsEnabled(true);
          try { localStorage.setItem('krs-notifications', 'on'); } catch(e) {}
          showToast('Benachrichtigungen aktiviert!', 'success');
        } else {
          showToast('Benachrichtigungen wurden blockiert. Bitte in den Browser-Einstellungen erlauben.', 'error');
        }
      }, []);

      const toggleNotifications = useCallback(() => {
        if (!notificationsEnabled && notificationPermission !== 'granted') {
          requestNotifications();
          return;
        }
        setNotificationsEnabled(prev => {
          const next = !prev;
          try { localStorage.setItem('krs-notifications', next ? 'on' : 'off'); } catch(e) {}
          showToast(next ? 'Benachrichtigungen aktiviert' : 'Benachrichtigungen deaktiviert', 'success');
          return next;
        });
      }, [notificationsEnabled, notificationPermission, requestNotifications]);

      const sendBrowserNotification = useCallback((title, body, onClick) => {
        if (!notificationsEnabled || notificationPermission !== 'granted') return;
        if (document.hasFocus()) return;
        try {
          const n = new Notification(title, {
            body: (body || '').substring(0, 150),
            icon: APP_LOGO, badge: APP_LOGO,
            tag: 'krs-' + Date.now(),
            renotify: true
          });
          if (onClick) n.onclick = () => { window.focus(); onClick(); n.close(); };
          setTimeout(() => n.close(), CONFIG.NOTIFICATION_AUTO_CLOSE);
        } catch(e) { console.warn('Notification error:', e); }
      }, [notificationsEnabled, notificationPermission]);

      return { notificationsEnabled, notificationPermission, requestNotifications,
        toggleNotifications, sendBrowserNotification };
    }

    // ── Phase 7.4: Error Boundaries ──────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, info) {
        console.error('ErrorBoundary caught:', error, info);
      }
      render() {
        if (this.state.hasError) {
          const style = { padding: '40px', textAlign: 'center', fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif' };
          return React.createElement('div', { style },
            // A3 (22.07.2026): h1 statt h2 — Root-ErrorBoundary, bei einem Absturz
            // die einzige Überschrift der Seite (analog Hub-Fix, A11Y-SPEC 6.7).
            React.createElement('h1', { style: { color: 'var(--text-primary)', marginBottom: '12px' } }, 'Etwas ist schiefgelaufen'),
            React.createElement('p', { style: { color: 'var(--text-secondary)', marginBottom: '20px' } },
              this.props.fallbackMessage || 'Dieser Bereich hatte einen Fehler. Bitte versuche es erneut.'
            ),
            React.createElement('button', {
              onClick: () => this.setState({ hasError: false, error: null }),
              style: { background: 'var(--accent)', color: 'white', border: 'none', padding: '10px 20px', borderRadius: 'var(--radius)', cursor: 'pointer', fontSize: '14px', marginRight: '8px' }
            }, 'Erneut versuchen'),
            React.createElement('button', {
              onClick: () => window.location.reload(),
              style: { background: 'var(--bg-tertiary)', color: 'var(--text-primary)', border: '1px solid var(--border)', padding: '10px 20px', borderRadius: 'var(--radius)', cursor: 'pointer', fontSize: '14px' }
            }, 'Seite neu laden')
          );
        }
        return this.props.children;
      }
    }

      // Forward post to another channel or DM

            } else {
              const fwdContent = '<p><em>↪ Weitergeleitet von ' + fromLabel + ':</em></p>' + (payload.content || '');
              await dataService.createPost(target.id, user.id, fwdContent, '', payload.image_url || null, false);
            }
          } else {
            if (isFile) {
              await dataService.sendMessage(target.id, user.id, '📎 Weitergeleitete Datei', JSON.stringify([payload.__file]));
            } else {
              await dataService.sendMessage(target.id, user.id, payload.content || '📎 Weitergeleitet', payload.image_url || null);

      // Bridge: „Weiterleiten" aus dem Datei-Viewer öffnet das Forward-Modal mit der Datei
      useEffect(() => {
        window.__krsForwardFile = (file) => setShowForwardModal({ __file: file });
        return () => { try { delete window.__krsForwardFile; } catch (e) { window.__krsForwardFile = null; } };
      }, []);

      // Saved/Bookmarked posts
      const toggleSavePost = useCallback((post) => {
        setSavedPosts(prev => {
          const exists = prev.find(p => p.id === post.id);
          const next = exists ? prev.filter(p => p.id !== post.id) : [...prev, { id: post.id, title: post.title || htmlToText(post.content).substring(0, 60), channel: selectedChannel?.name, savedAt: new Date().toISOString() }];
          try { localStorage.setItem('krs-saved-posts', JSON.stringify(next)); } catch(e) {}
          // Phase 6: Auch in Supabase speichern
          if (user?.id && dataService && !dataService.isDemo) {
            dataService.updateUserPreference(user.id, 'saved_posts', next);

      // (loadingUsers, postsLoading, hasMore*, loadingMore, mobileSidebarOpen,

      // (dataService — jetzt oben direkt nach den useState-Deklarationen, s. P7)

      // Pending auth user (wird nach Setup+Render automatisch eingeloggt)
      const [pendingAuthUser, setPendingAuthUser] = useState(null);

      // ── Hub-Auth: postMessage-Listener ──────────────
      const hubAuthStateRef = useRef({ setupComplete: false, user: null, allUsers: [] });

      // Findet den passenden Connect-User zum Hub-Profil. Wenn keiner in der

      // erzeugt — so gelingt der Unified-Login immer (Hub ist die Auth-Quelle).
      const resolveHubUser = useCallback((userList, hubUser) => {
        const ln = (hubUser.lehrkraft_name || '').toLowerCase();
        const match = (userList || []).find(u =>
          (hubUser.kuerzel && u.kuerzel === hubUser.kuerzel) ||
          (hubUser.display_name && u.display_name === hubUser.display_name) ||
          (hubUser.lehrkraft_name && u.name === hubUser.lehrkraft_name) ||
          (ln && u.display_name && u.display_name.toLowerCase().includes(ln))
        );
        if (match) return match;
        return {
          id: hubUser.id || ('krs-' + (hubUser.kuerzel || 'user')),
          username: (hubUser.kuerzel || hubUser.display_name || 'user').toLowerCase().replace(/\s+/g, ''),
          kuerzel: hubUser.kuerzel,
          name: hubUser.lehrkraft_name,
          display_name: hubUser.display_name || hubUser.lehrkraft_name || 'Lehrkraft',
          avatar_color: hubUser.avatar_color || '#6c5df6', // A3 C-B-17: #7c6ff7 war 3.84:1, jetzt 4.63:1
          role: hubUser.role || 'member'
        };
      }, []);

      useEffect(() => {
        // TENANT-SPEC.md 2.1/3.6: bei hub.enabled:false Listener gar nicht registrieren,
        // nichts an parent posten. Origin-Prüfung als exakte Array-Mitgliedschaft
        // (nicht includes()/Substring — sonst akzeptiert https://evil-…github.io.angreifer.tld).
        if (!window.__KRS_HUB_ENABLED) return;
        const allowedOrigins = (window.T && window.T('hub.allowedOrigins', [])) || [];
        const isInHub = window.parent !== window;
        const handleHubAuth = async (event) => {
          if (!allowedOrigins.includes(event.origin) && event.origin !== window.location.origin) return;
          if (event.source !== window.parent) return;
          if (event.data?.type === 'KRS_HUB_AUTH' && event.data?.hub_verified) {
            // BETA (Login-Modell A): Connect läuft im Hub LIVE und nutzt den
            // EIGENEN E-Mail/Passwort-Login → ECHTE Daten. Der frühere Zwang
            // setIsDemo(true) + synthetischer Hub-User (→ Mock-Daten) ist
            // entfernt. Das Hub-Profil wird hier bewusst ignoriert; die normale
            // Session-Prüfung/der Login-Screen von Connect übernimmt.
            // (Nahtloses SSO = Login-Modell B, späterer Ausbau.)
            console.debug('[Hub] Auth empfangen — Connect nutzt eigenen Live-Login (Modell A), kein Demo-Zwang.');
          }
        };
        window.addEventListener('message', handleHubAuth);
        if (isInHub && allowedOrigins[0]) {
          window.parent.postMessage({ type: 'KRS_HUB_REQUEST_AUTH', moduleId: 'connect' }, allowedOrigins[0]);
        }
        return () => window.removeEventListener('message', handleHubAuth);
      }, []);

      const handleSetupComplete = async ({ isDemo: demoMode, client, authUser }) => {
        setIsDemo(demoMode);
        if (client) setSupabaseClient(client);
        // User-Liste sofort laden
        setLoadingUsers(true);
        try {
          const ds = new DataService(demoMode ? null : client);
          const usersData = await ds.getUsers();
          setAllUsers(usersData.length > 0 ? usersData : MOCK_USERS);
        } catch (e) {
          setAllUsers(MOCK_USERS);
        }
        setLoadingUsers(false);
        setSetupComplete(true);

        // Wenn Auth-User mitgegeben wurde (Magic Link Login), als Pending merken
        if (authUser && !demoMode) {
          setPendingAuthUser(authUser);
        }
      };

      // Pending Auth-User automatisch einloggen sobald dataService bereit ist.
      // Phase 2: gilt auch im Demo-Modus — der Hub übernimmt die Auth, daher
      // darf der eigene User-Select-/Login-Screen übersprungen werden.
      useEffect(() => {
        if (pendingAuthUser && dataService && setupComplete && !user) {
          handleUserSelected(pendingAuthUser);
          setPendingAuthUser(null);
        }
      }, [pendingAuthUser, dataService, setupComplete, user]);

      const handleUserSelected = async (selectedUser) => {
        setUser(selectedUser);
        // Load teams
        const teamsData = await dataService.getTeams(selectedUser.id);
        setTeams(teamsData);
        // Archivierte Teams (#8) separat laden — für den Archiv-Bereich der Sidebar
        dataService.getArchivedTeams(selectedUser.id).then(setArchivedTeams).catch(() => {});
        if (teamsData.length > 0) {
          const firstTeam = teamsData[0];
          setSelectedTeam(firstTeam);
          const channelsData = await dataService.getChannels(firstTeam.id);
          setChannels(channelsData);
          // Initialize unread badges from ALL teams' channels + build channelTeamMap
          const initialUnreads = new Map();
          const ctMap = new Map();
          for (const t of teamsData) {
            const chans = t.id === firstTeam.id ? channelsData : await dataService.getChannels(t.id);
            chans.forEach(ch => {
              ctMap.set(ch.id, t.id);
              if (ch.unread > 0) initialUnreads.set(ch.id, ch.unread);
            });
          }
          setChannelTeamMap(ctMap);
          // For Supabase mode: calculate unreads from localStorage lastRead timestamps
          if (!dataService.isDemo) {
            const allChannelIds = Array.from(ctMap.keys());
            const supaUnreads = await dataService.getChannelUnreadCounts(allChannelIds, selectedUser.id);
            if (supaUnreads.size > 0) setUnreadPostChannels(supaUnreads);
          } else if (initialUnreads.size > 0) {
            setUnreadPostChannels(initialUnreads);
          }
          if (channelsData.length > 0) {
            setSelectedChannel(channelsData[0]);
            // Mark the first channel as read right away (Phase 6: Instanz-Methode für Supabase-Upsert)
            dataService.markChannelRead(channelsData[0].id, selectedUser.id);
          }
          // Check user's role in this team
          if (!dataService.isDemo) {
            const members = await dataService.getTeamMembers(firstTeam.id);
            const me = members.find(m => m.id === selectedUser.id);
            setUserTeamRole(me?.role || null);
          } else {
            setUserTeamRole('admin'); // Demo: always admin
          }
        }
        // Ausgeblendete Foren laden (persistiert) — Sprint 4
        try {
          const hiddenT = await dataService.getHiddenIds('team', selectedUser.id);
          if (hiddenT && hiddenT.size) setHiddenTeams(hiddenT);
        } catch (e) {}
        // Load conversations + all users for chat
        const convData = await dataService.getConversations(selectedUser.id);
        setConversations(convData || []);
        // Ausgeblendete Chats laden (persistiert)
        try {
          const hiddenC = await dataService.getHiddenIds('conv', selectedUser.id);
          if (hiddenC && hiddenC.size) setHiddenConversations(hiddenC);
        } catch (e) {}
        // Initialize unread chat count
        if (!dataService.isDemo && convData?.length > 0) {
          const convUnreads = await dataService.getConversationUnreadCounts(convData, selectedUser.id);
          let totalUnread = 0;
          const enrichedConvs = (convData || []).map(c => {
            const unread = convUnreads.get(c.id) || 0;
            totalUnread += unread;
            return unread > 0 ? { ...c, unread } : c;
          });
          if (totalUnread > 0) {
            setConversations(enrichedConvs);
            setUnreadChatCount(totalUnread);
          }
        } else {
          const totalChatUnread = (convData || []).reduce((sum, c) => sum + (c.unread || 0), 0);
          if (totalChatUnread > 0) setUnreadChatCount(totalChatUnread);
        }
        const usersData = await dataService.getUsers();
        setAllUsers(usersData || MOCK_USERS);
        // Phase 6: Preferences aus Supabase laden (mit localStorage Fallback)
        if (!dataService.isDemo) {
          try {
            const prefs = await dataService.getUserPreferences(selectedUser.id);
            if (prefs) {
              if (prefs.read_receipts_enabled !== undefined) setReadReceiptsEnabled(prefs.read_receipts_enabled);
              if (prefs.saved_posts && Array.isArray(prefs.saved_posts) && prefs.saved_posts.length > 0) {
                setSavedPosts(prefs.saved_posts);
              }
              if (prefs.onboarding_done) {
                // Onboarding schon gemacht → nicht mehr zeigen
              } else {
                setShowOnboarding(true);
              }
            }
          } catch(e) {
            // Fallback: localStorage
            try { if (!localStorage.getItem('krs_onboarding_done')) setShowOnboarding(true); } catch(e2) {}
          }
        } else {
          // Demo-Modus: localStorage check
          try { if (!localStorage.getItem('krs_onboarding_done')) setShowOnboarding(true); } catch(e) {}
        }
      };

      // Session-Refresh + Auto-Logout bei Token-Ablauf (Phase 6)
      useEffect(() => {
        if (isDemo || !supabaseClient) return;
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange(
          (event, session) => {
            if (event === 'TOKEN_REFRESHED') {
              console.log('Session refreshed');
            }
            if (event === 'SIGNED_OUT') {
              setUser(null);
              setSetupComplete(false);
              setIsDemo(true);
              _supabaseClientSingleton = null;
              showToast('Du wurdest abgemeldet.', 'info');
            }
          }
        );
        return () => subscription?.unsubscribe();
      }, [supabaseClient, isDemo]);

      // Heartbeat: Alle 4h Supabase pingen (Phase 6.8 — Backup, primär via GAS)
      useEffect(() => {
        if (isDemo || !supabaseClient) return;
        const interval = setInterval(async () => {
          try {
            await supabaseClient.from('users').select('count', { count: 'exact', head: true });
          } catch (e) {
            console.warn('Heartbeat failed:', e);
            showToast('Verbindung zum Server unterbrochen. Seite bitte neu laden.', 'error');
          }
        }, 4 * 60 * 60 * 1000); // 4 Stunden
        return () => clearInterval(interval);
      }, [supabaseClient, isDemo]);

      // Posts subscription (Phase 6.7: Loading-Guard gegen Race Condition)
      const postsLoadingRef = useRef(false);
      const pendingRealtimeRef = useRef([]);
      useEffect(() => {
        if (selectedChannel) {
          let cancelled = false;
          postsLoadingRef.current = true;
          pendingRealtimeRef.current = [];
          setPostsLoading(true);
          const loadPosts = async () => {
            const postsData = await dataService.getPosts(selectedChannel.id, PAGE_SIZE, 0);
            if (!cancelled) {
              setPosts(postsData);
              setHasMorePosts(postsData.length >= PAGE_SIZE);
              // Pending Realtime-Events nachträglich anwenden
              const pending = pendingRealtimeRef.current;
              if (pending.length > 0) {
                setPosts(prev => {
                  let updated = [...prev];
                  for (const p of pending) {
                    if (!updated.some(existing => existing.id === p.id)) {
                      updated = [p, ...updated];
                    }
                  }
                  return updated;
                });
              }
              pendingRealtimeRef.current = [];
              postsLoadingRef.current = false;
              setPostsLoading(false);
            }
          };
          loadPosts();
          const unsub = dataService.subscribeToChannel(selectedChannel.id, newPost => {
            if (cancelled) return;
            if (postsLoadingRef.current) {
              // Während Loading: Events in Queue sammeln
              pendingRealtimeRef.current.push(newPost);
              return;
            }
            setPosts(prev => {
              // Duplikat-Prävention (optimistic update + Realtime)
              if (prev.some(p => p.id === newPost.id)) return prev;
              return [newPost, ...prev];
            });
          });
          // Feedback #4 (Stresstest 09.07.): Polling-Fallback auch für Kanal-Posts —
          // fängt verpasste Realtime-Events nach WLAN-Abbruch ab (Merge, kein Replace).
          const mergeFreshPosts = (fresh) => {
            if (cancelled || !fresh || postsLoadingRef.current) return;
            setPosts(prev => {
              const known = new Set(prev.map(p => p.id));
              const neu = fresh.filter(p => !known.has(p.id));
              if (neu.length === 0) return prev;
              const merged = [...neu, ...prev];
              const ts = p => new Date(p.created_at).getTime();
              if (merged.every(p => !isNaN(ts(p)))) merged.sort((a, b) => ts(b) - ts(a));
              return merged;
            });
          };
          const refetchPosts = () => {
            if (document.visibilityState !== 'visible') return;
            dataService.getPosts(selectedChannel.id, PAGE_SIZE, 0).then(mergeFreshPosts).catch(() => {});
          };
          const postsPollIv = setInterval(refetchPosts, CONFIG.CHAT_POLL_INTERVAL || 20000);
          const onVisiblePosts = () => { if (document.visibilityState === 'visible') refetchPosts(); };
          document.addEventListener('visibilitychange', onVisiblePosts);
          window.addEventListener('online', onVisiblePosts);
          return () => {
            cancelled = true; postsLoadingRef.current = false; unsub();
            clearInterval(postsPollIv);
            document.removeEventListener('visibilitychange', onVisiblePosts);
            window.removeEventListener('online', onVisiblePosts);
          };
        }
      }, [selectedChannel, dataService]);

      // Thread replies + Realtime
      useEffect(() => {
        if (openThread) {
          let cancelled = false;
          const loadReplies = async () => {
            const repliesData = await dataService.getReplies(openThread.id);
            if (!cancelled) setReplies(repliesData);
          };
          loadReplies();
          const unsub = dataService.subscribeToReplies(openThread.id, newReply => {
            if (!cancelled) setReplies(prev => {
              if (prev.some(r => r.id === newReply.id)) return prev;
              return [...prev, newReply];
            });
          });
          return () => { cancelled = true; unsub(); };
        }
      }, [openThread, dataService]);

      // ESC-Key Handler: Schlie\u00dft Overlays/Panels in Hierarchie
      const handleEscapeKey = useCallback((e) => {
        if (e.key !== 'Escape') return;
        // Nicht in Input/Textarea-Kontexten
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        if (openThread) { e.preventDefault(); setOpenThread(null); return; }
        if (mobileSidebarOpen) { e.preventDefault(); setMobileSidebarOpen(false); return; }
        if (showTeamMembers) { e.preventDefault(); setShowTeamMembers(false); return; }
      }, [openThread, mobileSidebarOpen, showTeamMembers]);

      useEffect(() => {
        document.addEventListener('keydown', handleEscapeKey);
        return () => document.removeEventListener('keydown', handleEscapeKey);
      }, [handleEscapeKey]);

      // Chat messages subscription
      useEffect(() => {
        if (selectedConversation) {
          let cancelled = false;
          const loadMessages = async () => {
            const msgs = await dataService.getMessages(selectedConversation.id, PAGE_SIZE, 0);
            if (!cancelled) {
              setChatMessages(msgs || []);
              setHasMoreMessages((msgs || []).length >= PAGE_SIZE);
            }
          };
          loadMessages();
          const unsub = dataService.subscribeToConversation(selectedConversation.id, newMsg => {
            if (!cancelled) setChatMessages(prev => {
              if (prev.some(m => m.id === newMsg.id)) return prev;
              return [...prev, newMsg];
            });
          });
          // Feedback #4 (Stresstest 09.07.): „Chat aktualisiert sich nicht live".
          // Realtime-Websockets brechen im Schul-WLAN gern ab; verpasste Events
          // holt dieses Sicherheitsnetz nach: sanftes Polling (nur sichtbarer Tab)
          // + Refetch bei Tab-Rückkehr und Netz-Reconnect. Merge statt Replace,
          // damit nachgeladene ältere Nachrichten (Pagination) erhalten bleiben.
          const mergeFresh = (msgs) => {
            if (cancelled || !msgs) return;
            setChatMessages(prev => {
              const known = new Set(prev.map(m => m.id));
              const fresh = msgs.filter(m => !known.has(m.id));
              if (fresh.length === 0) return prev;
              const merged = [...prev, ...fresh];
              // Nur sortieren, wenn alle Timestamps parsebar sind (Demo nutzt de-DE-Strings)
              const ts = m => new Date(m.created_at).getTime();
              if (merged.every(m => !isNaN(ts(m)))) merged.sort((a, b) => ts(a) - ts(b));
              return merged;
            });
          };
          const refetch = () => {
            if (document.visibilityState !== 'visible') return;
            dataService.getMessages(selectedConversation.id, PAGE_SIZE, 0).then(mergeFresh).catch(() => {});
          };
          const pollIv = setInterval(refetch, CONFIG.CHAT_POLL_INTERVAL || 20000);
          const onVisible = () => { if (document.visibilityState === 'visible') refetch(); };
          document.addEventListener('visibilitychange', onVisible);
          window.addEventListener('online', onVisible);
          return () => {
            cancelled = true; unsub();
            clearInterval(pollIv);
            document.removeEventListener('visibilitychange', onVisible);
            window.removeEventListener('online', onVisible);
          };
        }
      }, [selectedConversation, dataService]);

      // Ref für selectedConversation (verhindert Stale Closure + unnötige Re-Subscriptions)
      const selectedConversationRef = useRef(selectedConversation);
      selectedConversationRef.current = selectedConversation;
      const selectedChannelRef = useRef(selectedChannel);
      selectedChannelRef.current = selectedChannel;

      // Global listener for new messages (unread badges)
      useEffect(() => {
        if (!user || !dataService || dataService.isDemo) return;
        const sb = dataService.sb;
        if (!sb) return;

        // Listen for new messages in any conversation the user is part of
        const msgChannel = sb.channel('global-messages')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            const newMsg = payload.new;
            // Don't count own messages or messages in the currently open conversation
            if (newMsg.sender_id === user.id) return;
            const currentConv = selectedConversationRef.current;
            if (currentConv && newMsg.conversation_id === currentConv.id) return;
            // Update unread count
            setUnreadChatCount(prev => prev + 1);
            // Update conversation unread badge
            setConversations(prev => updateConversationActivity(prev, newMsg, { unreadDelta: 1, timeLabel: 'Jetzt' }));
            // Browser-Notification
            sendBrowserNotification(
              '💬 Neue Nachricht',
              htmlToText(newMsg.content) || '📎 Datei',
              () => { /* focus kommt automatisch */ }
            );
          })
          .subscribe();

        // Listen for new posts (unread in forums)
        const postChannel = sb.channel('global-posts')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, payload => {
            const newPost = payload.new;
            if (newPost.author_id === user.id) return;
            if (newPost.parent_id) return; // Skip replies
            // Deduplication: Nicht zählen wenn der Post im aktuell offenen Channel ist
            const currentCh = selectedChannelRef.current;
            if (currentCh && newPost.channel_id === currentCh.id) return;
            // Mark channel as having unread posts
            setUnreadPostChannels(prev => {
              const next = new Map(prev);
              next.set(newPost.channel_id, (next.get(newPost.channel_id) || 0) + 1);
              return next;
            });
            // Browser-Notification (dringend und @alle erhalten spezielle Behandlung)
            const isUrgentPost = newPost.is_urgent;
            const hasMentionAll = (newPost.content || '').toLowerCase().includes('@alle');
            const hasMentionMe = user && (newPost.content || '').toLowerCase().includes(('@' + (user.display_name || '')).toLowerCase());
            const notifTitle = isUrgentPost ? '🚨 DRINGEND' : hasMentionAll ? '📢 @alle' : hasMentionMe ? '💬 Du wurdest erwähnt' : '📢 Neuer Beitrag';
            // Dringend + @alle: Notification auch wenn App im Fokus
            if (isUrgentPost || hasMentionAll || hasMentionMe) {
              try {
                if (notificationsEnabled && notificationPermission === 'granted') {
                  const n = new Notification(notifTitle, {
                    body: (newPost.title || htmlToText(newPost.content) || 'Neuer Beitrag').substring(0, 150),
                    icon: APP_LOGO, badge: APP_LOGO, tag: 'krs-urgent-' + newPost.id, renotify: true, requireInteraction: isUrgentPost
                  });
                  n.onclick = () => { window.focus(); n.close(); };
                  if (!isUrgentPost) setTimeout(() => n.close(), CONFIG.NOTIFICATION_AUTO_CLOSE);
                }
              } catch(e) {}
              // In-App Toast für dringende Posts
              if (isUrgentPost) showToast('🚨 DRINGEND: ' + (newPost.title || htmlToText(newPost.content) || '').substring(0, 80), 'error');
            } else {
              sendBrowserNotification(notifTitle, newPost.title || htmlToText(newPost.content) || 'Neuer Beitrag in einem Kanal', () => {});
            }
          })
          .subscribe();

        return () => {
          sb.removeChannel(msgChannel);
          sb.removeChannel(postChannel);
        };
      }, [user, dataService]); // selectedConversation NICHT in Dependencies (via Ref)

      // Tab-Titel mit Unread-Count aktualisieren
      useEffect(() => {
        const totalUnread = unreadChatCount + Array.from(unreadPostChannels.values()).reduce((a, b) => a + b, 0);
        { const __an = window.T ? window.T('app.name', 'Die App') : 'Die App';
          document.title = totalUnread > 0 ? `(${totalUnread}) ${__an}` : __an; }
      }, [unreadChatCount, unreadPostChannels]);

      // Auto-request notification permission on first load
      useEffect(() => {
        if (!user) return;
        if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
          // Warte kurz, dann frage nach Permission
          const timer = setTimeout(() => {
            if (notificationsEnabled) requestNotifications();
          }, 3000);
          return () => clearTimeout(timer);
        }
      }, [user]);

      // Demo-Modus: Simulierte Nachrichten für Unread-Badges
      useEffect(() => {
        if (!user || !dataService?.isDemo) return;
