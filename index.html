<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRS Connect</title>
  <style>
    /* ═══════════════════════════════════════════════════
       KRS Connect — Design Tokens (v4.0.0)
       Synchron mit KRS Hub gehalten:
       - Akzent-Blau (--accent) = Hub --primary
       - Radius/Shadow/Transition aus Hub übernommen
       - Orange/Amber bleiben für semantische Markierungen
         (Pinned, Urgent) — kein Brand-Akzent
       Abweichung zur Desktop-Vorlage (dokumentiert, O1):
       --shadow bleibt FARBWERT, weil 14 Regeln ihn als
       Farbe in box-shadow-Shorthands nutzen. Voller
       Schattenwert wäre dort ungültiges CSS.
       ═══════════════════════════════════════════════════ */
    :root {
      /* Background-Hierarchie (Connect-eigen) */
      --bg-primary: #F8F9FC;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #EEF0F4;
      --bg-hover: #E4E7ED;
      --bg-active: #D8DCE5;

      /* Text (mit Hub harmonisiert) */
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;

      /* Akzent — identisch zu Hub --primary für konsistentes Branding */
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: rgba(37, 99, 235, 0.10);
      --accent-soft: #dbeafe;

      /* Semantische Akzente (Connect-Spezifika) */
      --accent-orange: #D4762C;   /* Pinned */
      --accent-amber: #E8A832;    /* Highlight */

      /* Status-Farben (mit Hub harmonisiert) */
      --success: #16a34a;
      --success-light: #dcfce7;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --danger-text: #B91C1C;

      /* Rahmen, Schatten, Radien (aus Hub übernommen) */
      --border: #e2e8f0;
      --shadow: rgba(0,0,0,0.08);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 14px;
      --touch-min: 44px;
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Keyboard-Focus-Styles (Accessibility) */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--radius);
    }
    button:focus:not(:focus-visible) { outline: none; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    #app { width: 100%; height: 100vh; }

    /* Layout */
    .app-layout {
      display: flex;
      height: 100vh;
      width: 100%;
      background: var(--bg-primary);
    }

    /* Sidebar */
    .sidebar {
      width: 68px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 24px;
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }

    .sidebar-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      padding: 3px;
    }

    .sidebar-logo:hover { background: var(--bg-tertiary); }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .nav-item {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .nav-item svg { width: 20px; height: 20px; }
    .nav-item:hover { color: var(--accent); background: var(--bg-hover); }
    .nav-item.active { color: var(--accent); background: var(--accent-light); }

    .sidebar-bottom {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    /* v4.10.0: Gespeichert & gepinnt — Abschnitt oben in der Chat-Spalte */
    .saved-section-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      min-height: 44px;
      text-align: left;
    }
    .saved-section-btn:hover { background: var(--bg); }
    .saved-section-count {
      flex: 0 0 auto;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar-content {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .sidebar-search {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { outline: none; border-color: var(--accent); }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px;
    }

    .list-item {
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: var(--radius);
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-primary);
      text-align: left;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-item:hover { background: var(--bg-hover); }
    .list-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
    .list-item-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .list-item-text { flex: 1; font-size: 13px; }
    .list-item-badge { font-size: 11px; background: var(--danger); color: white; padding: 2px 6px; border-radius: 10px; }

    /* Content Area */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-secondary);
    }

    .content-header h1 { margin: 0; font-size: 18px; }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .icon-btn svg { width: 18px; height: 18px; }
    .icon-btn:hover { background: var(--bg-hover); color: var(--accent); }

    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Cards */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: 0 1px 3px var(--shadow);
      transition: all var(--transition);
    }

    .card:hover { box-shadow: 0 4px 12px var(--shadow); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Posts */
    .post {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: 0 1px 3px var(--shadow);
      transition: all var(--transition);
    }

    .post:hover { box-shadow: 0 4px 12px var(--shadow); }

    .post-header {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .post-author {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 14px;
    }

    .post-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .post-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      margin: 8px 0;
      cursor: pointer;
    }

    .post-content {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
      margin: 8px 0;
    }

    .post-content p { margin: 8px 0; }
    .post-content ul { margin: 8px 0; padding-left: 20px; }
    .post-content li { margin: 4px 0; }
    .post-content strong { font-weight: 600; }

    .post-reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0;
    }

    .reaction {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition);
      min-height: 36px;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .reaction:hover { background: var(--accent-light); border-color: var(--accent); }
    .reaction.own { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .reaction.add-reaction { background: transparent; border-style: dashed; color: var(--text-muted); font-size: 18px; padding: 6px 12px; min-width: 44px; min-height: 36px; }
    .reaction.add-reaction:hover { background: var(--bg-hover); border-style: solid; color: var(--text-secondary); }

    /* Mention Autocomplete */
    .mention-autocomplete {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 -4px 16px var(--shadow);
      max-height: 200px;
      overflow-y: auto;
      z-index: 200;
      margin-bottom: 4px;
    }
    .mention-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      color: var(--text-primary);
    }
    .mention-item:hover, .mention-item.active { background: var(--accent-light); }
    .mention-tag { color: var(--accent); font-weight: 600; }

    /* Skeleton Loading */
    @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
    .skeleton { background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-hover) 50%, var(--bg-tertiary) 75%); background-size: 400px 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }
    .skeleton-line { height: 14px; margin-bottom: 8px; }
    .skeleton-circle { border-radius: 50%; }
    .skeleton-card { padding: 16px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: var(--radius-lg); }
    .mention-tag-all { color: var(--danger); font-weight: 700; background: rgba(239,68,68,0.1); padding: 1px 6px; border-radius: 4px; }

    /* Rich-Text-Editor (contentEditable WYSIWYG) */
    .rich-editor { display:block; width:100%; padding:8px 0; border:none; background:transparent; color:var(--text-primary); font-size:14px; min-height:60px; font-family:inherit; outline:none; white-space:pre-wrap; overflow-wrap:anywhere; }
    .rich-editor:empty::before { content: attr(data-placeholder); color: var(--text-muted); pointer-events:none; }
    .rich-editor p { margin: 6px 0; }
    .rich-editor ul, .rich-editor ol { margin: 6px 0; padding-left: 22px; }
    .rich-editor li { margin: 3px 0; }
    .rich-editor a { color: var(--accent); text-decoration: underline; }
    .rich-toolbar { display:flex; gap:4px; margin-bottom:6px; flex-wrap:wrap; }
    .rich-toolbar button { min-width:34px; min-height:34px; border:1px solid var(--border); background:var(--bg-secondary); color:var(--text-secondary); border-radius:6px; cursor:pointer; font-size:14px; line-height:1; padding:0 8px; }
    .rich-toolbar button:hover { background: var(--bg-tertiary); }
    .rich-toolbar button:active { background: var(--accent-light); }

    /* Accordion / Aufklappmenü */
    .accordion { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .accordion-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg-tertiary); cursor: pointer; border: none; width: 100%; font-size: 14px; font-weight: 600; color: var(--text-primary); transition: background var(--transition); }
    .accordion-header:hover { background: var(--bg-hover); }
    .accordion-chevron { transition: transform 0.2s ease; font-size: 12px; color: var(--text-muted); }
    .accordion-chevron.open { transform: rotate(90deg); }
    .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
    .accordion-body.open { max-height: 2000px; }
    .accordion-body-inner { padding: 8px 14px; }

    /* Wiki-Popup */
    .wiki-popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 10000; display: flex; align-items: center; justify-content: center; animation: fadeIn .2s; }
    .wiki-popup { background: var(--bg-secondary); border-radius: 12px; width: 90%; max-width: 800px; height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden; }
    .wiki-popup-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); }
    .wiki-popup-header h3 { font-size: 14px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 0; }
    .wiki-popup-header a { font-size: 12px; color: var(--accent); text-decoration: none; white-space: nowrap; }
    .wiki-popup-close { width: 32px; height: 32px; border: none; background: var(--bg-hover); border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-primary); flex-shrink: 0; }
    .wiki-popup-close:hover { background: var(--bg-active); }
    .wiki-popup iframe { flex: 1; border: none; width: 100%; }
    .wiki-popup-error { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--text-muted); padding: 40px; text-align: center; }
    .wiki-popup-error a { color: var(--accent); }
    .wiki-link { color: var(--accent); cursor: pointer; text-decoration: none; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
    .wiki-link:hover { text-decoration: underline; }

    .post-footer {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .post-footer button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      transition: color var(--transition);
    }

    .post-footer button:hover { color: var(--accent); }

    /* Thread */
    .thread-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .thread-panel {
      width: 100%;
      max-width: 500px;
      height: 100%;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      margin-left: auto;
      border-left: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    .thread-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .thread-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .thread-reply {
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      padding: 12px;
    }

    .thread-reply-author {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
    }

    .thread-reply-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .thread-reply-content {
      font-size: 13px;
      color: var(--text-primary);
      margin-top: 6px;
      line-height: 1.4;
    }

    .thread-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .compose-box {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .compose-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      resize: none;
      max-height: 100px;
      font-family: inherit;
    }

    .compose-input:focus { outline: none; border-color: var(--accent); }

    .compose-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .compose-btn:hover { background: var(--accent-hover); }
    .compose-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    /* Avatar */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* Polls */
    .poll-container {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin: 8px 0;
    }
    .poll-question {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 10px;
      color: var(--text-primary);
    }
    .poll-option {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      background: var(--bg-secondary);
      transition: all 0.15s;
      overflow: hidden;
      min-height: 44px;
    }
    .poll-option:hover { border-color: var(--accent); }
    .poll-option.voted { border-color: var(--accent); background: var(--accent-light); }
    .poll-option .poll-bar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: var(--accent);
      opacity: 0.1;
      border-radius: var(--radius);
      transition: width 0.4s ease;
    }
    .poll-option .poll-text { position: relative; z-index: 1; flex: 1; font-size: 13px; }
    .poll-option .poll-count { position: relative; z-index: 1; font-size: 12px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
    .poll-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 11px; color: var(--text-muted); }

    /* Poll Creator */
    .poll-creator { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; margin-top: 8px; }
    .poll-creator input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-primary); color: var(--text-primary); font-size: 13px; outline: none; margin-bottom: 6px; box-sizing: border-box; }
    .poll-creator input:focus { border-color: var(--accent); }
    .poll-creator .poll-option-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .poll-creator .poll-option-row input { flex: 1; margin-bottom: 0; }
    .poll-creator .poll-option-row button { flex-shrink: 0; width: 32px; height: 32px; border: none; background: none; cursor: pointer; color: var(--text-muted); font-size: 16px; border-radius: var(--radius); }
    .poll-creator .poll-option-row button:hover { background: var(--bg-hover); color: var(--danger); }

    /* Channel Context Menu */
    .channel-context-menu {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 20px var(--shadow);
      padding: 4px 0;
      z-index: 600;
      min-width: 180px;
    }
    .channel-context-menu button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 14px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 13px;
      text-align: left;
    }
    .channel-context-menu button:hover { background: var(--bg-hover); }
    .channel-context-menu button.danger { color: var(--danger); }
    .channel-context-menu button.danger:hover { background: rgba(239,68,68,0.08); }

    /* Channel Create/Edit Dialog */
    .channel-dialog {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 40px var(--shadow);
      padding: 24px;
      width: 380px;
      max-width: calc(100vw - 32px);
    }
    .channel-dialog h3 { margin: 0 0 16px 0; font-size: 16px; }
    .channel-dialog input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    .channel-dialog input:focus { border-color: var(--accent); }
    .channel-dialog .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .channel-dialog .dialog-actions button {
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 13px;
    }
    .channel-dialog .dialog-actions .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
    }
    .channel-dialog .dialog-actions .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Emoji Picker */
    .emoji-picker-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 500;
    }

    .emoji-picker {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 40px var(--shadow);
      width: 340px;
      max-width: calc(100vw - 32px);
      max-height: min(400px, 60vh);
      display: flex;
      flex-direction: column;
      z-index: 501;
    }

    .emoji-picker-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .emoji-picker-header input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
    }

    .emoji-picker-header input:focus { outline: none; border-color: var(--accent); }

    .emoji-grid {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }

    .emoji-category {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 4px 8px;
    }

    .emoji-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius);
      transition: all var(--transition);
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji-btn:hover { background: var(--bg-hover); }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2000;
    }

    .toast {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 4px 12px var(--shadow);
      animation: toastSlideIn 0.3s ease;
    }

    @keyframes toastSlideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .toast.leaving { animation: toastSlideOut 0.3s ease forwards; }
    @keyframes toastSlideOut { to { transform: translateX(400px); opacity: 0; } }

    .toast > div { flex: 1; }
    .toast strong { color: var(--text-primary); }

    /* Setup/Selection Screens */
    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px;
      text-align: center;
    }

    .setup-screen h1 {
      font-size: 32px;
      margin-bottom: 30px;
    }

    .setup-screen input {
      display: block;
      width: 300px;
      margin: 10px auto;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
    }

    .setup-screen input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .setup-screen button {
      padding: 10px 30px;
      margin-top: 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      transition: all var(--transition);
    }

    .setup-screen button:hover {
      background: var(--accent-hover);
    }

    .setup-screen label {
      display: block;
      margin: 15px 0;
      font-size: 16px;
    }

    .user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      max-width: 600px;
      margin: 30px auto 0;
    }

    .user-btn {
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }

    .user-btn:hover {
      box-shadow: 0 4px 12px var(--shadow);
      transform: translateY(-2px);
    }

    .user-btn-name {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Chat UI */
    .conversation-list { display: flex; flex-direction: column; height: 100%; }
    .conversation-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .conversation-header h2 { margin: 0; font-size: 16px; }
    .new-chat-btn { width: 32px; height: 32px; border-radius: var(--radius); background: var(--accent); color: white; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .new-chat-btn:hover { background: var(--accent-hover); }

    .new-chat-picker { padding: 8px 12px; border-bottom: 1px solid var(--border); max-height: 300px; overflow-y: auto; }
    .new-chat-picker input { position: sticky; top: 0; z-index: 1; }
    .user-pick-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; border: none; background: none; cursor: pointer; border-radius: var(--radius); font-size: 14px; color: var(--text-primary); transition: background var(--transition); }
    .user-pick-btn:hover { background: var(--bg-hover); }

    .conversation-items { flex: 1; overflow-y: auto; }

    .conversation-item { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 16px; border: none; background: none; cursor: pointer; text-align: left; transition: background var(--transition); border-bottom: 1px solid var(--border); }
    .conversation-item:hover { background: var(--bg-hover); }
    .conversation-item.active { background: var(--accent-light); }
    .conversation-info { flex: 1; min-width: 0; }
    .conversation-name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
    .conversation-preview { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conversation-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .conversation-time { font-size: 11px; color: var(--text-muted); }
    .unread-badge { background: var(--accent-orange); color: white; border-radius: 10px; padding: 2px 7px; font-size: 11px; font-weight: 600; }
    .nav-badge { position: absolute; top: 2px; right: 2px; background: var(--accent-orange); color: white; border-radius: 10px; padding: 1px 5px; font-size: 10px; font-weight: 700; min-width: 16px; text-align: center; line-height: 14px; }
    .nav-item { position: relative; }
    .channel-unread { font-weight: 700; color: var(--text-primary); }
    .channel-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-orange); flex-shrink: 0; }

    /* Online Status */
    .online-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); border: 2px solid var(--bg-secondary); flex-shrink: 0; }
    .online-dot.small { width: 8px; height: 8px; border-width: 1.5px; }
    .online-dot.offline { background: var(--text-muted); }
    .avatar-wrapper { position: relative; display: inline-flex; flex-shrink: 0; }
    .avatar-status { position: absolute; bottom: -1px; right: -1px; }
    .online-indicator { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: var(--radius); background: var(--bg-tertiary); font-size: 12px; color: var(--text-secondary); cursor: pointer; border: none; width: 100%; transition: background var(--transition); }
    .online-indicator:hover { background: var(--bg-hover); }
    .online-count { font-weight: 600; color: var(--success); }
    .online-panel { position: absolute; bottom: 52px; left: 68px; width: 220px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: 0 4px 20px var(--shadow); z-index: 200; overflow: hidden; }
    .online-panel-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; color: var(--text-primary); }
    .online-panel-list { max-height: 250px; overflow-y: auto; padding: 6px 0; }
    .online-panel-user { display: flex; align-items: center; gap: 8px; padding: 6px 14px; font-size: 13px; color: var(--text-primary); }
    .online-panel-user .avatar { width: 28px; height: 28px; font-size: 11px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 300; }
    .modal { background: var(--bg-secondary); border-radius: var(--radius-lg); box-shadow: 0 8px 30px rgba(0,0,0,0.15); width: 420px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .modal-header h3 { margin: 0; font-size: 16px; }
    .modal-body { padding: 16px 20px; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .form-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all var(--transition); }
    .color-swatch.selected { border-color: var(--text-primary); transform: scale(1.1); }
    .color-swatch:hover { transform: scale(1.1); }
    .member-list { max-height: 200px; overflow-y: auto; }
    .member-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
    .member-item .avatar { width: 32px; height: 32px; font-size: 12px; }
    .member-name { flex: 1; font-size: 14px; }
    .member-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 16px; }
    .member-remove:hover { color: var(--danger); background: rgba(239,68,68,0.1); }
    .member-add-btn { background: var(--accent-light); color: var(--accent); border: none; padding: 4px 10px; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 600; }
    .member-add-btn:hover { background: var(--accent); color: white; }
    .btn-primary { padding: 8px 20px; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }
    .btn-secondary { padding: 8px 20px; background: var(--bg-tertiary); color: var(--text-primary); border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; }
    .btn-secondary:hover { background: var(--bg-hover); }
    .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; cursor: pointer; }
    .checkbox-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
    .group-avatar { width: 40px; height: 40px; border-radius: var(--radius); background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; flex-shrink: 0; }
    .settings-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; }
    .settings-btn:hover { color: var(--accent); background: var(--accent-light); }

    .chat-panel { display: flex; flex-direction: column; height: 100%; }
    .chat-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .chat-header-name { font-weight: 600; font-size: 16px; }
    .back-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); padding: 4px; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 6px; position: relative; }
    .chat-messages.drag-active { outline: 2px dashed var(--accent); outline-offset: -8px; background: var(--accent-light); }
    .chat-drop-overlay { position: sticky; top: 0; z-index: 5; align-self: center; margin: 4px auto 8px; padding: 8px 16px; background: var(--accent); color: #fff; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.18); pointer-events: none; }
    .chat-msg { display: flex; gap: 8px; max-width: 75%; }
    .chat-msg.own { align-self: flex-end; flex-direction: row-reverse; }
    .chat-msg.other { align-self: flex-start; }
    .chat-bubble { padding: 10px 14px; border-radius: 16px; background: var(--bg-tertiary); word-break: break-word; }
    .chat-bubble.own { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .chat-bubble.other { border-bottom-left-radius: 4px; }
    .chat-text { font-size: 14px; line-height: 1.5; }
    .chat-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .chat-bubble.own .chat-time { color: rgba(255,255,255,0.7); }
    /* DM Bearbeiten/Löschen — am Desktop bei Hover, auf Touch (iPad) immer sichtbar */
    .chat-msg-actions { position: absolute; top: -12px; right: 6px; display: flex; gap: 2px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 14px; padding: 1px 2px; opacity: 0; transition: opacity .12s; box-shadow: 0 1px 4px var(--shadow); z-index: 2; }
    .chat-msg:hover .chat-msg-actions, .chat-msg-actions:focus-within { opacity: 1; }
    @media (hover: none) { .chat-msg-actions { opacity: 1; } }

    .chat-input-bar { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); align-items: flex-end; }
    .chat-input-bar input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; }
    .chat-input-bar input:focus { outline: none; border-color: var(--accent); }
    .chat-send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: white; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all var(--transition); flex-shrink: 0; }
    .chat-send-btn:hover { background: var(--accent-hover); }
    .chat-send-btn:disabled { background: var(--text-muted); cursor: not-allowed; }
    .chat-image-btn svg { width: 22px; height: 22px; }
    .chat-image-btn:hover { color: var(--accent); }

    .chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 16px; gap: 12px; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    /* Teams visibility */
    .team-item { position: relative; }
    .team-hide-btn { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); opacity: 0; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; font-size: 12px; transition: opacity 0.15s; }
    .team-item:hover .team-hide-btn { opacity: 1; }
    .team-hide-btn:hover { color: var(--danger); }
    .hidden-teams-toggle { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; width: 100%; transition: color 0.15s; }
    .hidden-teams-toggle:hover { color: var(--text-primary); }

    /* Teams-Ansicht: Wrapper um Teams- + Kanäle-Spalte. Desktop: transparent
       (display:contents) → 3-Spalten-Layout bleibt unverändert. Mobile: wird
       zum gemeinsamen Drawer (siehe Media Query unten). */
    .team-drawer { display: contents; }

    /* Responsive */
    /* Tablet Breakpoint (iPad 768-1024px) */
    @media (min-width: 769px) and (max-width: 1024px) {
      .sidebar-content { width: 220px; min-width: 220px; }
      .content { flex: 1; min-width: 0; }
      .thread-panel { width: 320px; min-width: 320px; }
      .emoji-picker { width: 280px; min-width: 280px; }
      .post-card { padding: 12px 14px; }
      .channel-header h2 { font-size: 16px; }
      .sidebar-bottom { gap: 2px; }
      .sidebar-bottom .feedback-trigger { padding: 4px; font-size: 16px; min-width: 36px; min-height: 36px; }
    }

    @media (max-width: 768px) {
      .app-layout { flex-direction: column; height: 100vh; }
      .sidebar { width: 100%; height: 56px; flex-direction: row; padding: 0 8px; gap: 4px; order: 2; border-top: 1px solid var(--border); border-right: none; }
      .sidebar-nav { flex-direction: row; flex: 1; justify-content: space-around; }
      .sidebar-nav button { font-size: 11px; padding: 6px 8px; }
      .sidebar-bottom { flex-direction: row; gap: 2px; flex: 0 0 auto; }
      /* Bottom-Bar entrümpeln (v4.10.0): Ausblenden, was auf dem Handy nur
         Platz frisst (Logo, Versionstext, großer Feedback-Button, Online-Zähler).
         Sichtbar bleiben: die Nav-Icons, ⚙️ Einstellungen, 🛠️ Admin, Profil,
         Abmelden. Suche/Online/Feedback sind in die Ansichten gewandert. */
      .sidebar .sidebar-logo, .sidebar .app-version, .sidebar .beta-feedback-btn { display: none; }
      .sidebar-nav { flex: 1; }
      .sidebar-bottom .online-indicator { display: none; }
      .sidebar-bottom .feedback-trigger { display: inline-flex; }
      .sidebar-content { position: fixed; top: 0; left: 0; width: 80vw; max-width: 300px; height: calc(100vh - 56px); z-index: 100; transform: translateX(-100%); transition: transform 0.25s ease; background: var(--bg-secondary); box-shadow: 2px 0 12px rgba(0,0,0,0.15); }
      .sidebar-content.mobile-open { transform: translateX(0); }
      /* Teams + Kanäle teilen sich EINEN Drawer (sonst überlagern beide
         fixed-Spalten einander → es waren nur die Kanäle sichtbar). */
      .team-drawer { display: flex; flex-direction: column; position: fixed; top: 0; left: 0; width: 80vw; max-width: 300px; height: calc(100vh - 56px); z-index: 100; transform: translateX(-100%); transition: transform 0.25s ease; background: var(--bg-secondary); box-shadow: 2px 0 12px rgba(0,0,0,0.15); overflow-y: auto; }
      .team-drawer.mobile-open { transform: translateX(0); }
      .team-drawer .sidebar-content { position: static; width: 100%; max-width: none; height: auto; transform: none; box-shadow: none; z-index: auto; flex: 0 0 auto; }
      .team-drawer .sidebar-content + .sidebar-content { border-top: 1px solid var(--border); }
      .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 99; }
      .mobile-overlay.visible { display: block; }
      .content { flex: 1; order: 1; overflow-y: auto; min-height: 0; }
      .content-header { position: sticky; top: 0; z-index: 10; }
      .modal { width: 95vw; max-height: 90vh; }
      .post-card { padding: 12px; }
      .post-header { gap: 8px; }
      .chat-messages { padding: 8px; }
      .chat-input-bar { padding: 8px; }
      .chat-input-bar textarea { font-size: 16px; } /* Verhindert iOS-Zoom */
      .mobile-menu-btn {
        display: flex !important;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        min-height: 44px;
        border-radius: var(--radius);
      }
      .mobile-menu-btn:active { background: var(--bg-hover); }
    }

    /* Toast System */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      max-width: calc(100% - 32px);
      width: max-content;
      box-shadow: 0 4px 12px var(--shadow);
      pointer-events: auto;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 3.7s forwards;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast-success { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .toast-error { background: #fef2f2; color: #7f1d1d; border: 1px solid #fca5a5; }
    .toast-info { background: #eff6ff; color: #1e3a5f; border: 1px solid #93c5fd; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    /* Feedback Modal */

  <!-- supabase-js resilient laden: Fallback-CDN-Kette + Timeout, damit ein
       CDN-Haenger nicht die ganze App mit "Supabase nicht verfuegbar" killt.
       window.__supabaseReady = Promise, auf das die App vor Client-Nutzung wartet. -->
  <script>
    (function () {
      var CDNS = [
        'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
        'https://unpkg.com/@supabase/supabase-js@2',
        'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js'
      ];
      var i = 0, settled = false;
      window.__supabaseReady = new Promise(function (resolve, reject) {
        function ok()  { if (!settled) { settled = true; resolve(window.supabase); } }
        function bad(e){ if (!settled) { settled = true; reject(e); } }
        function tryNext() {
          if (window.supabase && window.supabase.createClient) return ok();
          if (i >= CDNS.length) return bad(new Error('Alle Supabase-CDNs fehlgeschlagen'));
          var url = CDNS[i++];
          var s = document.createElement('script');
          s.src = url; s.async = false;
          s.onload  = function () { (window.supabase && window.supabase.createClient) ? ok() : tryNext(); };
          s.onerror = function () { console.warn('[CDN] supabase-js fehlgeschlagen:', url); tryNext(); };
          document.head.appendChild(s);
        }
        tryNext();
        setTimeout(function () { if (!(window.supabase && window.supabase.createClient)) bad(new Error('Supabase-CDN Timeout (15s)')); }, 15000);
      });
      window.__supabaseReady.catch(function (e) { console.error('[CDN] supabase init:', e && e.message); });
    })();
  </script>

  <script>
    // ============================================================
    // LIGHTBOX — Fullscreen-Bildanzeige mit Navigation & Download
    // ============================================================
    (function() {
      var _lbImgs = [], _lbIdx = 0, _lbKeyHandler = null, _lbTouchStartX = 0;

      window.openLightbox = function(images, startIdx) {
        _lbImgs = images;
        _lbIdx = startIdx || 0;
        renderLB();
      };

      function renderLB() {
        var ov = document.querySelector('.lightbox-overlay');
        if (ov) ov.remove();

        ov = document.createElement('div');
        ov.className = 'lightbox-overlay';
        ov.setAttribute('role', 'dialog');
        ov.setAttribute('aria-modal', 'true');
        ov.setAttribute('aria-label', 'Bildanzeige');
        ov.onclick = function(e) { if (e.target === ov) closeLB(); };

        var img = _lbImgs[_lbIdx];
        var imgUrl = typeof img === 'string' ? img : img.url;
        var imgName = typeof img === 'string' ? imgUrl.split('/').pop().split('?')[0] : (img.name || 'Bild');

        // Close button
        var closeBtn = document.createElement('button');
        closeBtn.className = 'lightbox-close';
        closeBtn.setAttribute('aria-label', 'Schließen');
        closeBtn.textContent = '✕';
        closeBtn.onclick = closeLB;
        ov.appendChild(closeBtn);

        // Nav prev
        if (_lbImgs.length > 1) {
          var prevBtn = document.createElement('button');
          prevBtn.className = 'lightbox-nav lightbox-prev';
          prevBtn.setAttribute('aria-label', 'Vorheriges Bild');
          prevBtn.textContent = '‹';
          prevBtn.onclick = function(e) { e.stopPropagation(); lbPrev(); };
          ov.appendChild(prevBtn);
        }

        // Image
        var imgEl = document.createElement('img');
        imgEl.className = 'lightbox-img';
        imgEl.src = imgUrl;
        imgEl.alt = imgName;
        imgEl.onclick = function(e) { e.stopPropagation(); };
        ov.appendChild(imgEl);

        // Nav next
        if (_lbImgs.length > 1) {
          var nextBtn = document.createElement('button');
          nextBtn.className = 'lightbox-nav lightbox-next';
          nextBtn.setAttribute('aria-label', 'Nächstes Bild');
          nextBtn.textContent = '›';
          nextBtn.onclick = function(e) { e.stopPropagation(); lbNext(); };
          ov.appendChild(nextBtn);
        }

        // Caption with download + share
        var caption = document.createElement('div');
        caption.className = 'lightbox-caption';
        var countText = _lbImgs.length > 1 ? ((_lbIdx + 1) + '/' + _lbImgs.length + ' — ') : '';
        if (countText) caption.appendChild(document.createTextNode(countText));
        var dlLink = document.createElement('a');
        dlLink.href = imgUrl;
        dlLink.download = imgName;
        dlLink.title = 'Herunterladen';
        dlLink.textContent = '⬇ Download';
        dlLink.onclick = function(e) { e.stopPropagation(); };
        caption.appendChild(dlLink);
        ov.appendChild(caption);

        // Touch-Swipe
        ov.addEventListener('touchstart', function(e) { _lbTouchStartX = e.touches[0].clientX; });
        ov.addEventListener('touchend', function(e) {
          var diff = _lbTouchStartX - e.changedTouches[0].clientX;
          if (Math.abs(diff) > 50) { diff > 0 ? lbNext() : lbPrev(); }
        });

        document.body.appendChild(ov);

        // Keyboard
        if (_lbKeyHandler) document.removeEventListener('keydown', _lbKeyHandler);
        _lbKeyHandler = function(e) {
          if (!document.querySelector('.lightbox-overlay')) return;
          if (e.key === 'Escape') closeLB();
          if (e.key === 'ArrowRight') lbNext();
          if (e.key === 'ArrowLeft') lbPrev();
        };
        document.addEventListener('keydown', _lbKeyHandler);
      }

      function lbNext() { _lbIdx = (_lbIdx + 1) % _lbImgs.length; renderLB(); }
      function lbPrev() { _lbIdx = (_lbIdx - 1 + _lbImgs.length) % _lbImgs.length; renderLB(); }

      function closeLB() {
        var ov = document.querySelector('.lightbox-overlay');
        if (ov) ov.remove();
        if (_lbKeyHandler) {
          document.removeEventListener('keydown', _lbKeyHandler);
          _lbKeyHandler = null;
        }
      }
    })();
  </script>

    async function compressImage(file, maxWidth = 1200, quality = 0.8) {
      return new Promise((resolve) => {
        // Skip non-image files or small files (< 200KB)
        if (!file.type.startsWith('image/') || file.size < CONFIG.IMAGE_COMPRESS_THRESHOLD) {
          resolve(file);
          return;
        }
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let { width, height } = img;
          if (width > maxWidth) {
            height = Math.round(height * maxWidth / width);
            width = maxWidth;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob((blob) => {
            if (blob && blob.size < file.size) {
              // Compressed is smaller — use it
              const compressed = new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() });
              resolve(compressed);
            } else {
              // Original was already smaller — keep it
              resolve(file);
            }
          }, 'image/jpeg', quality);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          resolve(file); // Fallback to original
        };
        img.src = url;
      });
    }

    // ── Phase 7.1: SubscriptionManager ──────────────────────────
    // Map-basiertes Subscription-Tracking verhindert Memory Leaks
    class SubscriptionManager {
      constructor(supabaseClient) {
        this.sb = supabaseClient;
        this.subs = new Map();
      }

      add(key, subscription) {
        this.remove(key); // Altes aufräumen bevor neues rein
        this.subs.set(key, subscription);
      }

      remove(key) {
        const sub = this.subs.get(key);
        if (sub) {
          try {
            if (sub.unsubscribe) sub.unsubscribe();
            if (sub.untrack) sub.untrack(); // Presence
            if (this.sb && this.sb.removeChannel) this.sb.removeChannel(sub);
          } catch (e) {
            console.warn('SubscriptionManager remove error:', e);
          }
          this.subs.delete(key);
        }
      }

      has(key) { return this.subs.has(key); }

      cleanup() {
        this.subs.forEach((sub, key) => {
          try {
            if (sub.unsubscribe) sub.unsubscribe();
            if (sub.untrack) sub.untrack();
            if (this.sb && this.sb.removeChannel) this.sb.removeChannel(sub);
          } catch (e) {
            console.warn('SubscriptionManager cleanup error:', e);
          }
        });
        this.subs.clear();
      }

      get size() { return this.subs.size; }
    }

      async cleanupOldFiles(olderThanDays = 90) {
        if (this.isDemo) return 0;

          cutoff.setDate(cutoff.getDate() - olderThanDays);
          const { data: files } = await this.sb.storage.from('images').list('uploads', { limit: 1000 });
          if (!files) return 0;
          const old = files.filter(f => f.created_at && new Date(f.created_at) < cutoff);

          const paths = old.map(f => `uploads/${f.name}`);
          const { error } = await this.sb.storage.from('images').remove(paths);
          if (error) throw error;
          return old.length;
        } catch (err) {

      // Get unread counts for channels (Phase 6: Supabase channel_reads + localStorage Fallback)
      async getChannelUnreadCounts(channelIds, userId) {
        if (this.isDemo) return new Map();
        try {
          // 1. Lesezeiten aus Supabase laden (1 Query statt N)
          const { data: dbReads } = await this.sb.from('channel_reads')
            .select('channel_id, last_read_at')
            .eq('user_id', userId)
            .in('channel_id', channelIds);
          const readMap = new Map((dbReads || []).map(r => [r.channel_id, r.last_read_at]));
          // Fallback: localStorage für Channels ohne DB-Eintrag
          for (const chId of channelIds) {
            if (!readMap.has(chId)) {
              const ls = localStorage.getItem(`krs-lastread-ch-${chId}`);
              if (ls) readMap.set(chId, ls);
            }
          }
          // 2. Unread-Counts parallel berechnen
          const counts = new Map();
          const results = await Promise.all(channelIds.map(chId => {
            const lastRead = readMap.get(chId) || '1970-01-01';
            return this.sb.from('posts')
              .select('*', { count: 'exact', head: true })
              .eq('channel_id', chId)
              .is('parent_id', null)
              .neq('author_id', userId)
              .gt('created_at', lastRead)
              .then(res => ({ chId, count: res.count, error: res.error }));
          }));
          for (const { chId, count, error } of results) {
            if (!error && count > 0) counts.set(chId, count);
          }
          return counts;
        } catch (err) {
          console.error('getChannelUnreadCounts error:', err);
          return new Map();
        }
      }

            .select('conversation_id, last_read_at')

              const ls = localStorage.getItem(`krs-lastread-conv-${conv.id}`);
              if (ls) readMap.set(conv.id, ls);

            return this.sb.from('messages')

        // Pre-Flight: Datei-Größe (Bucket-Limit ist 25 MB)
        if (file.size > UPLOAD_CONFIG.MAX_BYTES) {
          showToast(`Datei zu groß (${Math.round(file.size / 1024 / 1024)} MB, max. 25 MB).`, 'error');
          return null;
        }

        // Pre-Flight: erlaubter MIME-Type (muss zur Storage-Policy passen)
        const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
        if (file.type && !UPLOAD_CONFIG.ALLOWED_MIME.has(file.type)) {
          showToast(`Dateityp nicht erlaubt (${file.type}). Erlaubt: Bilder, PDF, Word, Excel, PowerPoint, Text.`, 'error');
          return null;
        }
        if (!file.type && !UPLOAD_CONFIG.ALLOWED_EXT.has(ext)) {
          showToast(`Dateiendung .${ext} nicht erlaubt.`, 'error');
          return null;
        }

        // Compress images before upload
        if (file.type.startsWith('image/')) {
          file = await compressImage(file);
        }
        try {
          // Storage-Quota-Check (Free Tier: 1 GB)
          try {
            const { data: storageFiles } = await this.sb.storage.from('images').list('uploads', { limit: 1000 });
            if (storageFiles) {
              const totalSize = storageFiles.reduce((sum, f) => sum + (f.metadata?.size || 0), 0);
              const maxStorage = 900 * 1024 * 1024; // 900 MB Warnschwelle
              if (totalSize + file.size > maxStorage) {
                console.warn(`Storage fast voll: ${Math.round(totalSize / 1024 / 1024)} MB von ~1000 MB`);
                // Nicht blockieren, nur warnen
              }
            }
          } catch (quotaErr) {
            // Quota-Check fehlgeschlagen — kein Problem, Upload trotzdem versuchen
          }
          const path = `${folder}/${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${ext}`;
          const { data, error } = await this.sb.storage.from('images').upload(path, file, {
            contentType: file.type || undefined,
            cacheControl: '3600',
            upsert: false
          });
          if (error) throw error;
          const { data: urlData } = this.sb.storage.from('images').getPublicUrl(data.path);
          return urlData.publicUrl;
        } catch (err) {
          console.error('uploadFile error:', err);
          // Spezifische Fehlermeldungen je nach Supabase-Error
          let msg = 'Datei konnte nicht hochgeladen werden.';
          const txt = (err?.message || err?.error || '').toString();
          if (/exceeded the maximum allowed size|payload too large|413/i.test(txt)) {
            msg = 'Datei zu gro\u00df (max. 25 MB).';
          } else if (/policy|not authorized|permission|RLS|row-level/i.test(txt)) {
            msg = 'Dateityp nicht erlaubt oder fehlende Berechtigung. Erlaubt: Bilder, PDF, Office-Dokumente, Text.';
          } else if (/network|fetch|offline/i.test(txt)) {
            msg = 'Keine Verbindung - bitte Internet pr\u00fcfen.';
          } else if (/duplicate/i.test(txt)) {
            msg = 'Datei mit gleichem Namen existiert bereits.';
          } else if (txt) {
            msg = 'Upload fehlgeschlagen: ' + txt.substring(0, 80);
          }
          showToast(msg, 'error');
          return null;
        }
      }

      async getReactions(targetType, targetIds) {
        // Returns Map<targetId, [{emoji, users: [userId,...], count}]>
        const result = new Map();
        if (!targetIds || targetIds.length === 0) return result;
        if (this.isDemo) {
          // Demo: Reactions direkt von den Mock-Posts lesen
          if (targetType === 'post') {
            const allPosts = Object.values(MOCK_POSTS).flat();
            for (const id of targetIds) {
              const post = allPosts.find(p => p.id === id);
              if (post && post.reactions && post.reactions.length > 0) {
                result.set(id, post.reactions.map(r => ({ ...r, users: [...(r.users || [])] })));
              }
            }
          } else if (targetType === 'message') {
            for (const id of targetIds) {
              const rs = MOCK_MESSAGE_REACTIONS[id];
              if (rs && rs.length > 0) result.set(id, rs.map(r => ({ ...r, users: [...(r.users || [])] })));
            }
          }
          return result;
        }
        try {
          const { data, error } = await this.sb.from('reactions')
            .select('target_id, emoji, user_id')
            .eq('target_type', targetType)
            .in('target_id', targetIds);
          if (error) throw error;
          // Group by target_id + emoji
          for (const r of (data || [])) {
            if (!result.has(r.target_id)) result.set(r.target_id, {});
            const byEmoji = result.get(r.target_id);
            if (!byEmoji[r.emoji]) byEmoji[r.emoji] = [];
            byEmoji[r.emoji].push(r.user_id);
          }
          // Convert to array format
          const formatted = new Map();
          for (const [tid, byEmoji] of result) {
            formatted.set(tid, Object.entries(byEmoji).map(([emoji, users]) => ({ emoji, users, count: users.length })));
          }
          return formatted;
        } catch (err) {
          console.error('getReactions error:', err);
          return result;
        }
      }

      async toggleReaction(targetType, targetId, userId, emoji) {
        // Emoji-Validierung: nur echte Emojis (1-8 Zeichen Unicode), kein HTML/Script
        if (!emoji || emoji.length > 8 || /<|>|&|"|'/.test(emoji)) {
          console.error('Invalid emoji rejected:', emoji);
          return false;
        }
        if (this.isDemo) {
          // Toggle in mock data — Posts an den Post-Objekten, Messages im Store.
          const applyToggle = (list) => {
            const existing = list.find(r => r.emoji === emoji);
            if (existing) {
              if (existing.users.includes(userId)) {
                existing.users = existing.users.filter(u => u !== userId);
                existing.count = existing.users.length;
                if (existing.count === 0) return list.filter(r => r.emoji !== emoji);
              } else {
                existing.users.push(userId);
                existing.count = existing.users.length;
              }
            } else {
              list.push({ emoji, users: [userId], count: 1 });
            }
            return list;
          };
          if (targetType === 'message') {
            const list = MOCK_MESSAGE_REACTIONS[targetId] ? [...MOCK_MESSAGE_REACTIONS[targetId]] : [];
            MOCK_MESSAGE_REACTIONS[targetId] = applyToggle(list);
            return true;
          }
          const postsArray = targetType === 'post' ? Object.values(MOCK_POSTS).flat() : [];
          const target = postsArray.find(p => p.id === targetId);
          if (target) {
            if (!target.reactions) target.reactions = [];
            target.reactions = applyToggle(target.reactions);
          }
          return true;
        }
        try {
          // Atomarer Toggle via PostgreSQL RPC (keine Race Condition)
          const { data, error } = await this.sb.rpc('toggle_reaction', {
            p_target_type: targetType,
            p_target_id: targetId,
            p_user_id: userId,
            p_emoji: emoji
          });
          if (error) throw error;
          return true;
        } catch (err) {

          showToast('Reaktion konnte nicht gespeichert werden.', 'error');

        }
      }

      async getConversations(userId) {
        if (this.isDemo) return [...MOCK_CONVERSATIONS];
        try {
          // 1. Finde alle Konversationen des Users (mit Join statt 2 separate Queries)
          const { data: memberships, error: err1 } = await this.sb
            .from('conversation_members')
            .select('conversation_id, conversations(*)')
            .eq('user_id', userId);
          if (err1) throw err1;
          if (!memberships?.length) return [];

          const convIds = memberships.map(m => m.conversation_id);
          const convs = memberships.map(m => m.conversations).filter(Boolean);
          if (!convs.length) return [];

          // 2+3. Lade Teilnehmer UND letzte Nachrichten parallel
          const [membersRes, msgsRes] = await Promise.all([
            this.sb.from('conversation_members').select('conversation_id, user_id, users(*)').in('conversation_id', convIds),
            this.sb.from('messages').select('conversation_id, content, created_at').in('conversation_id', convIds).order('created_at', { ascending: false })
          ]);
          const allMembers = membersRes.data || [];
          const lastMsgs = msgsRes.data || [];

          // 4. Reichere Konversationen an
          return convs.map(conv => {
            const members = allMembers.filter(m => m.conversation_id === conv.id);
            const lastMsg = lastMsgs.find(m => m.conversation_id === conv.id);
            const convObj = {
              ...conv,
              lastMessage: lastMsg?.content || '',
              time: lastMsg ? formatDate(lastMsg.created_at) : '',
              lastActivityAt: lastMsg?.created_at || conv.updated_at || conv.created_at || null
            };
            if (conv.is_group) {
              convObj.members = members.map(m => m.user_id);
              convObj.name = conv.name || 'Gruppenchat';
            } else {
              const otherMember = members.find(m => m.user_id !== userId);
              convObj.user = otherMember?.users || { display_name: 'Unbekannt', avatar_color: '#999' };
            }
            return convObj;
          });
        } catch (err) {
          console.error('getConversations error:', err);
          return [];
        }
      }

      // ── Ausblenden (hidden-Flag) ─ Sprint 4 ─────────────────────────
      // kind: 'team' → team_members.hidden | 'conv' → conversation_members.hidden
      // Demo & Supabase-Fallback: localStorage; Supabase-Primär: Membership-Flag.
      _hiddenLsKey(kind, userId) { return 'krs-hidden-' + kind + '-' + (userId != null ? userId : 'anon'); }
      _readHiddenLs(kind, userId) {
        try { return new Set(JSON.parse(localStorage.getItem(this._hiddenLsKey(kind, userId)) || '[]')); }
        catch (e) { return new Set(); }
      }
      _writeHiddenLs(kind, userId, set) {
        try { localStorage.setItem(this._hiddenLsKey(kind, userId), JSON.stringify(Array.from(set))); } catch (e) {}
      }
      async getHiddenIds(kind, userId) {
        if (this.isDemo) return this._readHiddenLs(kind, userId);
        try {
          const table = kind === 'team' ? 'team_members' : 'conversation_members';
          const idCol = kind === 'team' ? 'team_id' : 'conversation_id';
          const { data, error } = await this.sb.from(table).select(idCol + ', hidden').eq('user_id', userId).eq('hidden', true);
          if (error) throw error;
          return new Set((data || []).map(r => r[idCol]));
        } catch (err) {
          console.error('getHiddenIds error:', err);
          return this._readHiddenLs(kind, userId); // Fallback
        }
      }
      async setHidden(kind, id, userId, hidden) {
        // localStorage immer mitpflegen (Fallback + Demo)
        const set = this._readHiddenLs(kind, userId);
        if (hidden) set.add(id); else set.delete(id);
        this._writeHiddenLs(kind, userId, set);
        if (this.isDemo) return true;
        try {

      async search(query) {
        if (!query || query.length < 1) return { posts: [], messages: [] };
        if (this.isDemo) {
          const q = query.toLowerCase();
          const allPosts = Object.values(MOCK_POSTS).flat();
          const posts = allPosts.filter(p => (p.content + (p.title || '')).toLowerCase().includes(q));
          return { posts, messages: [] };
        }
        try {
          // Versuche zuerst Full-Text-Search (schneller mit tsvector-Index)
          let posts, messages;
          try {
            const { data: ftsPost } = await this.sb.from('posts')
              .select('*, author:users(*), channel:channels(name, team_id)')
              .textSearch('content', query, { type: 'websearch', config: 'german' })
              .order('created_at', { ascending: false })
              .limit(20);
            posts = ftsPost;
          } catch (ftsErr) {
            // Fallback zu ilike wenn FTS-Index nicht existiert
            const { data: ilikePosts } = await this.sb.from('posts')
              .select('*, author:users(*), channel:channels(name, team_id)')
              .or(`content.ilike.%${query}%,title.ilike.%${query}%`)
              .order('created_at', { ascending: false })
              .limit(20);
            posts = ilikePosts;
          }
          try {
            const { data: ftsMsgs } = await this.sb.from('messages')
              .select('*, sender:users(*)')
              .textSearch('content', query, { type: 'websearch', config: 'german' })
              .order('created_at', { ascending: false })
              .limit(20);
            messages = ftsMsgs;
          } catch (ftsErr) {
            const { data: ilikeMsgs } = await this.sb.from('messages')
              .select('*, sender:users(*)')
              .ilike('content', `%${query}%`)
              .order('created_at', { ascending: false })
              .limit(20);
            messages = ilikeMsgs;
          }
          return { posts: posts || [], messages: messages || [] };
        } catch (err) {
          console.error('Search error:', err);
          return { posts: [], messages: [] };
        }
      }

      async createConversation(userId1, userId2) {
        if (this.isDemo) {
          return { id: 'new-' + Date.now(), is_group: false };
        }
        try {
          // Prüfe ob schon eine Konversation zwischen den beiden existiert
          const { data: memberships1 } = await this.sb.from('conversation_members').select('conversation_id').eq('user_id', userId1);
          const { data: memberships2 } = await this.sb.from('conversation_members').select('conversation_id').eq('user_id', userId2);
          if (memberships1?.length && memberships2?.length) {
            const ids1 = new Set(memberships1.map(m => m.conversation_id));
            const common = memberships2.find(m => ids1.has(m.conversation_id));
            if (common) return { id: common.conversation_id, is_group: false };
          }
          // Neue Konversation erstellen
          const { data: conv, error: convErr } = await this.sb.from('conversations').insert({ is_group: false }).select().single();
          if (convErr) throw convErr;
          // Beide User als Mitglieder hinzufügen
          const { error: memErr } = await this.sb.from('conversation_members').insert([
            { conversation_id: conv.id, user_id: userId1 },
            { conversation_id: conv.id, user_id: userId2 }
          ]);
          if (memErr) throw memErr;
          return conv;
        } catch (err) {
          console.error('createConversation error:', err);
          return null;
        }
      }

        if (this.isDemo) return () => {};
        const subKey = 'channel'; // Nur eine Channel-Sub gleichzeitig

          const sub = this.sb.channel('posts-' + channelId)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts', filter: `channel_id=eq.${channelId}` },
              async (payload) => {
                const post = payload.new;
                if (post.author_id && !post.author) {
                  try {
                    const { data: author } = await this.sb.from('users').select('*').eq('id', post.author_id).single();

          return () => { this.subManager.remove(subKey); };

          console.error('subscribeToChannel error:', err);
          return () => {};
        }
      }

      // Presence: track online users
      trackPresence(userId, displayName, onPresenceChange) {
        if (this.isDemo || !this.sb) {
          // Demo: Fake einige User als online
          const fakeOnline = new Set([1, 3, 5]);
          fakeOnline.add(Number(userId));
          setTimeout(() => onPresenceChange(fakeOnline), 500);
          return () => {};
        }
        const subKey = 'presence';
        this.subManager.remove(subKey); // Alte Presence aufräumen
        const presenceChannel = this.sb.channel('online-users', {
          config: { presence: { key: userId } }
        });
        presenceChannel
          .on('presence', { event: 'sync' }, () => {
            const state = presenceChannel.presenceState();
            const onlineIds = new Set();
            Object.values(state).forEach(presences => {
              presences.forEach(p => {
                if (p.user_id != null) {
                  onlineIds.add(Number(p.user_id));
                }
              });
            });
            onPresenceChange(onlineIds);
          })
          .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
              await presenceChannel.track({
                user_id: userId,
                display_name: displayName,
                online_at: new Date().toISOString()
              });
            }
          });
        this.subManager.add(subKey, presenceChannel);
        return () => { this.subManager.remove(subKey); };
      }

      // Auth-User in users-Tabelle auflösen + auth_id verknüpfen (Phase 6)
      async resolveAuthUser(authUser) {
        if (!authUser || this.isDemo) return null;
        try {
          // Suche User in der users-Tabelle per E-Mail
          const { data, error } = await this.sb.from('users').select('*').eq('email', authUser.email).single();
          if (error && error.code !== 'PGRST116') throw error; // PGRST116 = no rows
          if (!data) {
            console.warn('resolveAuthUser: Kein User mit Email', authUser.email);
            return null;
          }
          // auth_id verknüpfen falls noch nicht gesetzt (einmalig beim ersten Login)
          if (!data.auth_id) {
            const { error: updateErr } = await this.sb.from('users')
              .update({ auth_id: authUser.id, status: 'active' })
              .eq('id', data.id);
            if (updateErr) console.warn('auth_id Verknüpfung fehlgeschlagen:', updateErr);
            else data.auth_id = authUser.id;
          }
          // User-Preferences initialisieren falls nötig
          const { data: prefs } = await this.sb.from('user_preferences')
            .select('*').eq('user_id', data.id).single();
          if (!prefs) {
            try { await this.sb.from('user_preferences').insert({ user_id: data.id }); } catch (e) { /* prefs optional */ }
          }
          return data;
        } catch (err) {
          console.error('resolveAuthUser error:', err);
          return null;
        }
      }

    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // ============================================================
    // UPDATE-BANNER (#13) — ohne Service Worker: pollt die live index.html
    // und vergleicht KRS_VERSION. Bei neuer Version: Hinweis + Reload-Button.
    // ============================================================
    function UpdateBanner() {
      const [newVersion, setNewVersion] = useState(null);
      const [dismissed, setDismissed] = useState(false);
      useEffect(() => {
        if (window.__KRS_FORCE_DEMO) return; // im Test-/Demo-Modus nicht pollen
        const current = window.KRS_VERSION;
        let stopped = false;
        const check = async () => {
          try {
            const res = await fetch('index.html?_=' + Date.now(), { cache: 'no-store' });
            if (!res.ok) return;
            const txt = await res.text();
            const m = txt.match(/KRS_VERSION\s*=\s*'([^']+)'/);
            const remote = m && m[1];
            if (!stopped && remote && remote !== current) setNewVersion(remote);
          } catch (e) { /* offline / CDN — still ignorieren */ }
        };
        check();
        const id = setInterval(check, 5 * 60 * 1000); // alle 5 Minuten
        const onFocus = () => check();
        window.addEventListener('focus', onFocus);
        return () => { stopped = true; clearInterval(id); window.removeEventListener('focus', onFocus); };
      }, []);
      if (!newVersion || dismissed) return null;
      return React.createElement('div', { className: 'update-banner', role: 'alert' },
        React.createElement('span', null, '🔄 Neue Version ' + newVersion + ' verfügbar — du nutzt v' + window.KRS_VERSION + '.'),
        React.createElement('button', { onClick: () => location.reload() }, 'Jetzt aktualisieren'),
        React.createElement('button', { className: 'later', onClick: () => setDismissed(true) }, 'Später')
      );
    }
