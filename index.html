<!-- A2b · Barrierefreiheit: globaler Focus-Trap + Fokus-Return (WCAG 2.1.2 / 2.4.3) -->
<script>
/* Fängt Tab/Shift+Tab zyklisch im obersten [role="dialog"], neutralisiert den
   Hintergrund (inert + aria-hidden) und gibt den Fokus beim Schließen an das
   auslösende Element zurück. Rein DOM-basiert (liest den Live-Zustand statt
   React-State zu schließen) → stale-closure-frei. Escape schließt weiterhin über
   die vorhandenen Handler der Dialoge; dieser Manager verändert keinen App-State. */
(function () {
  'use strict';
  var FOCUSABLE = 'a[href],area[href],input:not([disabled]):not([type="hidden"]),' +
    'select:not([disabled]),textarea:not([disabled]),button:not([disabled]),' +
    'iframe,audio[controls],video[controls],[contenteditable="true"],[tabindex]:not([tabindex="-1"])';
  var triggerEl = null;          // Element, das den untersten Dialog geöffnet hat
  var lastOutsideFocus = null;   // zuletzt fokussiertes Element außerhalb aller Dialoge
  var activeTrap = null;         // aktuell oberster Dialog
  var neutralized = [];          // neutralisierte Hintergrund-Geschwister (für Restore)

  function isVisible(el) {
    return !!(el && (el.offsetWidth || el.offsetHeight || el.getClientRects().length));
  }
  function openDialogs() {
    return Array.prototype.filter.call(document.querySelectorAll('[role="dialog"]'), function (d) {
      if (!isVisible(d)) return false;
      // Der Lern-Coach (krsc-*) hält sein Panel dauerhaft im DOM (nur per transform
      // ausgeblendet → offsetWidth > 0) und managt Fokus/Escape selbst. Nicht fangen,
      // sonst würde der Trap das Coach-Panel beim Laden fokussieren.
      if (d.className && String(d.className).indexOf('krsc') !== -1) return false;
      if (d.closest && d.closest('[class*="krsc-"]')) return false;
      return true;
    });
  }
  function focusables(container) {
    return Array.prototype.filter.call(container.querySelectorAll(FOCUSABLE), function (el) {
      return isVisible(el) && el.getAttribute('aria-hidden') !== 'true';
    });
  }
  function neutralizeBackground(dialog) {
    var parent = dialog.parentNode;
    if (!parent || !parent.children) return;
    Array.prototype.forEach.call(parent.children, function (sib) {
      if (sib === dialog) return;
      if (sib.getAttribute && sib.getAttribute('role') === 'dialog') return; // andere Dialoge in Ruhe lassen
      neutralized.push({ el: sib, ariaHidden: sib.getAttribute('aria-hidden'), hadInert: sib.hasAttribute('inert') });
      sib.setAttribute('aria-hidden', 'true');
      try { sib.inert = true; } catch (e) {}
      sib.setAttribute('inert', '');
    });
  }
  function restoreBackground() {
    neutralized.forEach(function (n) {
      if (n.ariaHidden === null) n.el.removeAttribute('aria-hidden');
      else n.el.setAttribute('aria-hidden', n.ariaHidden);
      if (!n.hadInert) { try { n.el.inert = false; } catch (e) {} n.el.removeAttribute('inert'); }
    });
    neutralized = [];
  }
  function focusInto(dialog) {
    if (dialog.contains(document.activeElement)) return; // Dialog hat sich selbst fokussiert (autoFocus)
    var f = focusables(dialog);
    var target = f[0] || dialog;
    if (target === dialog && !dialog.hasAttribute('tabindex')) dialog.setAttribute('tabindex', '-1');
    try { target.focus(); } catch (e) {}
  }
  function reconcile() {
    var open = openDialogs();
    var top = open.length ? open[open.length - 1] : null;
    if (top === activeTrap) return;
    restoreBackground();
    if (top === null) {                 // alle Dialoge zu → Fokus zurückgeben
      activeTrap = null;
      var t = triggerEl; triggerEl = null;
      if (t && document.contains(t)) { try { t.focus(); } catch (e) {} }
      return;
    }
    if (activeTrap === null) {           // Öffnen aus Zustand ohne Dialog → Auslöser merken
      triggerEl = (lastOutsideFocus && document.contains(lastOutsideFocus)) ? lastOutsideFocus : document.activeElement;
    }
    activeTrap = top;
    neutralizeBackground(top);
    focusInto(top);
  }
  document.addEventListener('focusin', function (e) {
    var t = e.target;
    if (!activeTrap && t && t.closest && !t.closest('[role="dialog"]')) lastOutsideFocus = t;
  }, true);
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Tab' || !activeTrap || !document.contains(activeTrap)) return;
    var f = focusables(activeTrap);
    if (!f.length) { e.preventDefault(); try { activeTrap.focus(); } catch (er) {} return; }
    var first = f[0], last = f[f.length - 1], a = document.activeElement, inside = activeTrap.contains(a);
    if (e.shiftKey) { if (!inside || a === first) { e.preventDefault(); last.focus(); } }
    else { if (!inside || a === last) { e.preventDefault(); first.focus(); } }
  }, true);
  function start() {
    new MutationObserver(function () { reconcile(); }).observe(document.body, { childList: true, subtree: true });
    reconcile();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start); else start();
  window.__krsFocusTrap = { reconcile: reconcile, get active() { return activeTrap; } };
})();
</script>

<script>
(function(){
  if (window.__krscLoaded) return; window.__krscLoaded = true;
  var CFG = window.KRS_COACH_CONFIG || {};
  var APP   = CFG.app   || 'app';
  var TITLE = CFG.title || 'Lern-Coach';
  var SUB   = CFG.subtitle || 'Learning by Doing — in deinem Tempo';
  var STEPS = (CFG.steps||[]).slice();
  var LSKEY = 'krs_coach_' + APP;

  function load(){ try{return JSON.parse(localStorage.getItem(LSKEY))||{}}catch(e){return{}} }
  function save(s){ try{localStorage.setItem(LSKEY, JSON.stringify(s))}catch(e){} }
  var state = load();
  state.done = state.done || {};
  var active = typeof state.active==='number' ? state.active : 0;

  // ── Root-Container (Shadow-frei, aber Namespace-isoliert) ──
  var root = document.createElement('div');
  root.id = 'krsc-root'; root.setAttribute('data-krsc','1');
  document.body.appendChild(root);

  function doneCount(){ var n=0; STEPS.forEach(function(s){ if(state.done[s.id]) n++; }); return n; }
  function allDone(){ return doneCount()===STEPS.length && STEPS.length>0; }

  // ── FAB ──
  var fab = document.createElement('button');
  fab.className='krsc-fab'; fab.type='button';
  fab.setAttribute('aria-label','Lern-Coach öffnen');
  root.appendChild(fab);
  function renderFab(){
    var n=doneCount();
    // Einmal durch → FAB dauerhaft ausblenden (Fortschritt bleibt in localStorage).
    // Wieder einblendbar per window.KRSCoach.reset() oder .open().
    if(allDone()){ fab.style.display='none'; return; }
    fab.style.display='';
    fab.classList.remove('krsc-done');
    fab.innerHTML = '<span>🎓</span><span>Lernen</span><span class="krsc-badge">'+n+'/'+STEPS.length+'</span>';
  }

  // ── Overlay + Panel ──
  var overlay=document.createElement('div'); overlay.className='krsc-overlay'; root.appendChild(overlay);
  var panel=document.createElement('div'); panel.className='krsc-panel'; panel.setAttribute('role','dialog');
  panel.setAttribute('aria-label',TITLE); panel.setAttribute('aria-modal','true'); root.appendChild(panel);

  var spot=null, tip=null;
  function clearSpot(){ if(spot){spot.remove();spot=null;} if(tip){tip.remove();tip=null;} }

  function esc(str){ return String(str==null?'':str); }

  function render(){
    var n=doneCount(), pct=STEPS.length?Math.round(n/STEPS.length*100):0;
    var html=''
      + '<div class="krsc-head">'
      +   '<button class="krsc-close" type="button" aria-label="Schließen">×</button>'
      +   '<h2>🎓 '+esc(TITLE)+'</h2>'
      +   '<p>'+esc(SUB)+'</p>'
      +   '<div class="krsc-progwrap"><div class="krsc-progbar"><div class="krsc-progfill" style="width:'+pct+'%"></div></div>'
      +   '<div class="krsc-progtxt">'+n+' von '+STEPS.length+' Aufgaben erledigt</div></div>'
      + '</div>'
      + '<div class="krsc-body">';
    if(allDone()){
      html += '<div class="krsc-done-card"><div class="krsc-big">🎉</div>'
        + '<h3>Stark — alles geschafft!</h3>'
        + '<p>Du kennst jetzt die wichtigsten Handgriffe. Du kannst jederzeit wieder reinschauen.</p></div>';
    }
    STEPS.forEach(function(s,i){
      var checked=!!state.done[s.id], isActive=(i===active);
      html += '<div class="krsc-step'+(isActive?' krsc-active':'')+(checked?' krsc-checked':'')+'" data-i="'+i+'">'
        + '<button class="krsc-stephd" type="button" aria-expanded="'+isActive+'">'
        +   '<span class="krsc-num">'+(checked?'✓':(i+1))+'</span>'
        +   '<span class="krsc-steptitle">'+esc(s.title)+'</span>'
        +   '<span class="krsc-chev">▸</span>'
        + '</button>'
        + '<div class="krsc-detail">'
        +   (s.why?'<div class="krsc-why"><b>Warum:</b> '+esc(s.why)+'</div>':'')
        +   '<div class="krsc-do">'+(s.do||'')+'</div>'
        +   '<div class="krsc-actions">'
        +     (s.target?'<button class="krsc-btn krsc-primary krsc-show" type="button">👉 Zeig mir wo</button>':'')
        +     '<button class="krsc-btn '+(checked?'':'krsc-ok')+' krsc-toggle" type="button">'
        +        (checked?'↺ Nochmal':'✓ Erledigt')+'</button>'
        +     (i<STEPS.length-1?'<button class="krsc-btn krsc-next" type="button">Weiter →</button>':'')
        +   '</div>'
        + '</div></div>';
    });
    html += '</div>'
      + '<div class="krsc-foot">'
      +   '<button class="krsc-link krsc-restart" type="button">↺ Von vorne</button>'
      +   '<button class="krsc-btn krsc-primary krsc-later" type="button">Später fortsetzen</button>'
      + '</div>';
    panel.innerHTML=html;
    var fill=panel.querySelector('.krsc-progfill'); if(fill) fill.style.width=pct+'%';

    panel.querySelector('.krsc-close').onclick=closePanel;
    panel.querySelector('.krsc-later').onclick=closePanel;
    panel.querySelector('.krsc-restart').onclick=function(){ state.done={}; active=0; save(state); clearSpot(); render(); renderFab(); };
    panel.querySelectorAll('.krsc-stephd').forEach(function(b){
      b.onclick=function(){ var i=+this.parentNode.getAttribute('data-i'); active=(active===i?-1:i); save(state); clearSpot(); render(); };
    });
    panel.querySelectorAll('.krsc-toggle').forEach(function(b){
      b.onclick=function(){ var i=+this.closest('.krsc-step').getAttribute('data-i'); var id=STEPS[i].id;
        state.done[id]=!state.done[id]; if(state.done[id]&&i<STEPS.length-1)active=i+1; save(state); render(); renderFab(); };
    });
    panel.querySelectorAll('.krsc-next').forEach(function(b){
      b.onclick=function(){ var i=+this.closest('.krsc-step').getAttribute('data-i'); active=Math.min(i+1,STEPS.length-1); save(state); clearSpot(); render(); };
    });
    panel.querySelectorAll('.krsc-show').forEach(function(b){
      b.onclick=function(){ var i=+this.closest('.krsc-step').getAttribute('data-i'); showTarget(STEPS[i]); };
    });
  }

  function showTarget(step){
    clearSpot();
    var el=null; try{ el=step.target?document.querySelector(step.target):null; }catch(e){}
    if(!el){
      // Fallback: Tooltip mittig mit Hinweistext
      tip=document.createElement('div'); tip.className='krsc-tip';
      tip.style.left='50%'; tip.style.top='50%'; tip.style.transform='translate(-50%,-50%)';
      tip.innerHTML='<div>'+esc(step.hint||'Der passende Bereich ist gerade nicht sichtbar — folge kurz der Anleitung oben.')+'</div>'
        +'<button class="krsc-tipbtn" type="button">Verstanden</button>';
      root.appendChild(tip); tip.querySelector('.krsc-tipbtn').onclick=clearSpot;
      return;
    }
    el.scrollIntoView({behavior:'smooth',block:'center'});
    setTimeout(function(){
      var r=el.getBoundingClientRect(), pad=6;
      spot=document.createElement('div'); spot.className='krsc-spot krsc-pulse';
      spot.style.left=(r.left-pad)+'px'; spot.style.top=(r.top-pad)+'px';
      spot.style.width=(r.width+pad*2)+'px'; spot.style.height=(r.height+pad*2)+'px';
      root.appendChild(spot);
      tip=document.createElement('div'); tip.className='krsc-tip';
      var tx=Math.min(r.left, window.innerWidth-320), ty=r.bottom+12;
      if(ty>window.innerHeight-120) ty=Math.max(12,r.top-120);
      tip.style.left=Math.max(12,tx)+'px'; tip.style.top=ty+'px';
      tip.innerHTML='<div>'+esc(step.hint||'Hier ist die Stelle. Probier es ruhig aus!')+'</div>'
        +'<button class="krsc-tipbtn" type="button">Alles klar</button>';
      root.appendChild(tip); tip.querySelector('.krsc-tipbtn').onclick=clearSpot;
    },320);
  }

  function openPanel(){ render(); overlay.classList.add('krsc-open'); panel.classList.add('krsc-open');
    document.addEventListener('keydown',onKey); }
  function closePanel(){ overlay.classList.remove('krsc-open'); panel.classList.remove('krsc-open');
    clearSpot(); document.removeEventListener('keydown',onKey); }
  function onKey(e){ if(e.key==='Escape'){ if(spot||tip){clearSpot();} else closePanel(); } }

  fab.onclick=openPanel; overlay.onclick=closePanel;
  renderFab();

  // Öffentliche Mini-API (z.B. für „Coach starten"-Button in der App)
  window.KRSCoach={ open:openPanel, close:closePanel, reset:function(){state.done={};active=0;save(state);renderFab();} };
})();
</script>
