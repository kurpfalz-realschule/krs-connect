<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRS Connect</title>
  <style>
    :root {
      --bg-primary: #F8F9FC;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #EEF0F4;
      --bg-hover: #E4E7ED;
      --bg-active: #D8DCE5;
      --text-primary: #1A1D26;
      --text-secondary: #5A5F72;
      --text-muted: #8C91A0;
      --accent: #5B7B94;
      --accent-hover: #4A6A83;
      --accent-light: rgba(91,123,148,0.1);
      --accent-orange: #D4762C;
      --accent-amber: #E8A832;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
      --border: #E2E4E8;
      --shadow: rgba(0,0,0,0.06);
      --radius: 8px;
      --radius-lg: 12px;
      --transition: 0.15s ease;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Keyboard-Focus-Styles (Accessibility) */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--radius);
    }
    button:focus:not(:focus-visible) { outline: none; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    #app { width: 100%; height: 100vh; }

    /* Layout */
    .app-layout {
      display: flex;
      height: 100vh;
      width: 100%;
      background: var(--bg-primary);
    }

    /* Sidebar */
    .sidebar {
      width: 68px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 24px;
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }

    .sidebar-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      padding: 3px;
    }

    .sidebar-logo:hover { background: var(--bg-tertiary); }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .nav-item {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .nav-item svg { width: 20px; height: 20px; }
    .nav-item:hover { color: var(--accent); background: var(--bg-hover); }
    .nav-item.active { color: var(--accent); background: var(--accent-light); }

    .sidebar-bottom {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar-content {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .sidebar-search {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { outline: none; border-color: var(--accent); }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px;
    }

    .list-item {
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: var(--radius);
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-primary);
      text-align: left;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-item:hover { background: var(--bg-hover); }
    .list-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
    .list-item-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .list-item-text { flex: 1; font-size: 13px; }
    .list-item-badge { font-size: 11px; background: var(--danger); color: white; padding: 2px 6px; border-radius: 10px; }

    /* Content Area */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-secondary);
    }

    .content-header h1 { margin: 0; font-size: 18px; }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .icon-btn svg { width: 18px; height: 18px; }
    .icon-btn:hover { background: var(--bg-hover); color: var(--accent); }

    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Cards */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: 0 1px 3px var(--shadow);
      transition: all var(--transition);
    }

    .card:hover { box-shadow: 0 4px 12px var(--shadow); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Posts */
    .post {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: 0 1px 3px var(--shadow);
      transition: all var(--transition);
    }

    .post:hover { box-shadow: 0 4px 12px var(--shadow); }

    .post-header {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .post-author {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 14px;
    }

    .post-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .post-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      margin: 8px 0;
      cursor: pointer;
    }

    .post-content {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
      margin: 8px 0;
    }

    .post-content p { margin: 8px 0; }
    .post-content ul { margin: 8px 0; padding-left: 20px; }
    .post-content li { margin: 4px 0; }
    .post-content strong { font-weight: 600; }

    .post-reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0;
    }

    .reaction {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .reaction:hover { background: var(--accent-light); border-color: var(--accent); }

    .post-footer {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .post-footer button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      transition: color var(--transition);
    }

    .post-footer button:hover { color: var(--accent); }

    /* Thread */
    .thread-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .thread-panel {
      width: 100%;
      max-width: 500px;
      height: 100%;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      margin-left: auto;
      border-left: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    .thread-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .thread-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .thread-reply {
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      padding: 12px;
    }

    .thread-reply-author {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
    }

    .thread-reply-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .thread-reply-content {
      font-size: 13px;
      color: var(--text-primary);
      margin-top: 6px;
      line-height: 1.4;
    }

    .thread-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .compose-box {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .compose-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      resize: none;
      max-height: 100px;
      font-family: inherit;
    }

    .compose-input:focus { outline: none; border-color: var(--accent); }

    .compose-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .compose-btn:hover { background: var(--accent-hover); }
    .compose-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    /* Avatar */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* Emoji Picker */
    .emoji-picker-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 500;
    }

    .emoji-picker {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 40px var(--shadow);
      width: 340px;
      max-height: 400px;
      display: flex;
      flex-direction: column;
      z-index: 501;
    }

    .emoji-picker-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .emoji-picker-header input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
    }

    .emoji-picker-header input:focus { outline: none; border-color: var(--accent); }

    .emoji-grid {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }

    .emoji-category {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 4px 8px;
    }

    .emoji-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius);
      transition: all var(--transition);
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji-btn:hover { background: var(--bg-hover); }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2000;
    }

    .toast {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 4px 12px var(--shadow);
      animation: toastSlideIn 0.3s ease;
    }

    @keyframes toastSlideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .toast.leaving { animation: toastSlideOut 0.3s ease forwards; }
    @keyframes toastSlideOut { to { transform: translateX(400px); opacity: 0; } }

    .toast > div { flex: 1; }
    .toast strong { color: var(--text-primary); }

    /* Setup/Selection Screens */
    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px;
      text-align: center;
    }

    .setup-screen h1 {
      font-size: 32px;
      margin-bottom: 30px;
    }

    .setup-screen input {
      display: block;
      width: 300px;
      margin: 10px auto;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
    }

    .setup-screen input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .setup-screen button {
      padding: 10px 30px;
      margin-top: 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      transition: all var(--transition);
    }

    .setup-screen button:hover {
      background: var(--accent-hover);
    }

    .setup-screen label {
      display: block;
      margin: 15px 0;
      font-size: 16px;
    }

    .user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      max-width: 600px;
      margin: 30px auto 0;
    }

    .user-btn {
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      transition: all var(--transition);
    }

    .user-btn:hover {
      box-shadow: 0 4px 12px var(--shadow);
      transform: translateY(-2px);
    }

    .user-btn-name {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Chat UI */
    .conversation-list { display: flex; flex-direction: column; height: 100%; }
    .conversation-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .conversation-header h2 { margin: 0; font-size: 16px; }
    .new-chat-btn { width: 32px; height: 32px; border-radius: var(--radius); background: var(--accent); color: white; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .new-chat-btn:hover { background: var(--accent-hover); }

    .new-chat-picker { padding: 8px 12px; border-bottom: 1px solid var(--border); max-height: 300px; overflow-y: auto; }
    .new-chat-picker input { position: sticky; top: 0; z-index: 1; }
    .user-pick-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; border: none; background: none; cursor: pointer; border-radius: var(--radius); font-size: 14px; color: var(--text-primary); transition: background var(--transition); }
    .user-pick-btn:hover { background: var(--bg-hover); }

    .conversation-items { flex: 1; overflow-y: auto; }

    .conversation-item { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 16px; border: none; background: none; cursor: pointer; text-align: left; transition: background var(--transition); border-bottom: 1px solid var(--border); }
    .conversation-item:hover { background: var(--bg-hover); }
    .conversation-item.active { background: var(--accent-light); }
    .conversation-info { flex: 1; min-width: 0; }
    .conversation-name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
    .conversation-preview { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conversation-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .conversation-time { font-size: 11px; color: var(--text-muted); }
    .unread-badge { background: var(--accent-orange); color: white; border-radius: 10px; padding: 2px 7px; font-size: 11px; font-weight: 600; }
    .nav-badge { position: absolute; top: 2px; right: 2px; background: var(--accent-orange); color: white; border-radius: 10px; padding: 1px 5px; font-size: 10px; font-weight: 700; min-width: 16px; text-align: center; line-height: 14px; }
    .nav-item { position: relative; }
    .channel-unread { font-weight: 700; color: var(--text-primary); }
    .channel-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-orange); flex-shrink: 0; }

    /* Online Status */
    .online-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); border: 2px solid var(--bg-secondary); flex-shrink: 0; }
    .online-dot.small { width: 8px; height: 8px; border-width: 1.5px; }
    .online-dot.offline { background: var(--text-muted); }
    .avatar-wrapper { position: relative; display: inline-flex; flex-shrink: 0; }
    .avatar-status { position: absolute; bottom: -1px; right: -1px; }
    .online-indicator { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: var(--radius); background: var(--bg-tertiary); font-size: 12px; color: var(--text-secondary); cursor: pointer; border: none; width: 100%; transition: background var(--transition); }
    .online-indicator:hover { background: var(--bg-hover); }
    .online-count { font-weight: 600; color: var(--success); }
    .online-panel { position: absolute; bottom: 52px; left: 68px; width: 220px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: 0 4px 20px var(--shadow); z-index: 200; overflow: hidden; }
    .online-panel-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; color: var(--text-primary); }
    .online-panel-list { max-height: 250px; overflow-y: auto; padding: 6px 0; }
    .online-panel-user { display: flex; align-items: center; gap: 8px; padding: 6px 14px; font-size: 13px; color: var(--text-primary); }
    .online-panel-user .avatar { width: 28px; height: 28px; font-size: 11px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 300; }
    .modal { background: var(--bg-secondary); border-radius: var(--radius-lg); box-shadow: 0 8px 30px rgba(0,0,0,0.15); width: 420px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .modal-header h3 { margin: 0; font-size: 16px; }
    .modal-body { padding: 16px 20px; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .form-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all var(--transition); }
    .color-swatch.selected { border-color: var(--text-primary); transform: scale(1.1); }
    .color-swatch:hover { transform: scale(1.1); }
    .member-list { max-height: 200px; overflow-y: auto; }
    .member-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
    .member-item .avatar { width: 32px; height: 32px; font-size: 12px; }
    .member-name { flex: 1; font-size: 14px; }
    .member-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 16px; }
    .member-remove:hover { color: var(--danger); background: rgba(239,68,68,0.1); }
    .member-add-btn { background: var(--accent-light); color: var(--accent); border: none; padding: 4px 10px; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 600; }
    .member-add-btn:hover { background: var(--accent); color: white; }

          const c = document.createElement('div');
          c.id = 'toast-container';
          c.className = 'toast-container';
          c.setAttribute('role', 'region');
          c.setAttribute('aria-live', 'polite');
          document.body.appendChild(c);
          return c;
        })();
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + (type || 'error');
      toast.setAttribute('role', 'alert');
      const icons = { success: '\u2713', error: '\u2715', info: '\u2139' };
      const iconSpan = document.createElement('span');
      iconSpan.textContent = icons[type] || '';
      const msgSpan = document.createElement('span');
      msgSpan.textContent = String(message);
      toast.appendChild(iconSpan);
      toast.appendChild(msgSpan);
      container.appendChild(toast);

    async function compressImage(file, maxWidth = 1200, quality = 0.8) {
      return new Promise((resolve) => {
        // Skip non-image files or small files (< 200KB)
        if (!file.type.startsWith('image/') || file.size < 200 * 1024) {
          resolve(file);
          return;
        }
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let { width, height } = img;
          if (width > maxWidth) {
            height = Math.round(height * maxWidth / width);
            width = maxWidth;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob((blob) => {
            if (blob && blob.size < file.size) {
              // Compressed is smaller — use it
              const compressed = new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() });
              resolve(compressed);
            } else {
              // Original was already smaller — keep it
              resolve(file);
            }
          }, 'image/jpeg', quality);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          resolve(file); // Fallback to original
        };
        img.src = url;
      });
    }

        if (this.isDemo) return URL.createObjectURL(file);

        try {

          try {
            const { data: storageFiles } = await this.sb.storage.from('images').list('uploads', { limit: 1000 });
            if (storageFiles) {
              const totalSize = storageFiles.reduce((sum, f) => sum + (f.metadata?.size || 0), 0);
              const maxStorage = 900 * 1024 * 1024; // 900 MB Warnschwelle
              if (totalSize + file.size > maxStorage) {
                console.warn(`Storage fast voll: ${Math.round(totalSize / 1024 / 1024)} MB von ~1000 MB`);
                // Nicht blockieren, nur warnen
              }
            }
          } catch (quotaErr) {
            // Quota-Check fehlgeschlagen — kein Problem, Upload trotzdem versuchen
          }
          const ext = file.name.split('.').pop() || 'bin';
          const path = `uploads/${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${ext}`;
          const { data, error } = await this.sb.storage.from('images').upload(path, file);
          if (error) throw error;

          if (memberships1?.length && memberships2?.length) {
            const ids1 = new Set(memberships1.map(m => m.conversation_id));
            const common = memberships2.find(m => ids1.has(m.conversation_id));

            { conversation_id: conv.id, user_id: userId1 },
            { conversation_id: conv.id, user_id: userId2 }

        if (this.isDemo) return () => {};
        // Smart: Alte Channel-Subscriptions aufräumen (nur den gleichen Channel-Typ)
        this.subscriptions = this.subscriptions.filter(s => {
          if (s._krsType === 'channel') {
            try { s.unsubscribe(); if (this.sb) this.sb.removeChannel(s); } catch(e) {}
            return false;
          }
          return true;
        });
        try {
          const sub = this.sb.channel('posts-' + channelId)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts', filter: `channel_id=eq.${channelId}` },
              async (payload) => {
                const post = payload.new;
                if (post.author_id && !post.author) {
                  try {
                    const { data: author } = await this.sb.from('users').select('*').eq('id', post.author_id).single();
                    post.author = author;
                  } catch (e) {
                    post.author = { display_name: 'Unbekannt', avatar_color: '#999' };
                  }
                }
                onNewPost(post);
              })
            .subscribe();
          sub._krsType = 'channel'; // Mark type for smart cleanup
          this.subscriptions.push(sub);
          return () => {
            try { sub.unsubscribe(); if (this.sb) this.sb.removeChannel(sub); } catch(e) {}
            this.subscriptions = this.subscriptions.filter(s => s !== sub);
          };
        } catch (err) {
          console.error('subscribeToChannel error:', err);
          return () => {};
        }
      }

      subscribeToConversation(conversationId, onNewMessage) {
        if (this.isDemo) return () => {};
        // Smart: Alte Conversation-Subscriptions aufräumen
        this.subscriptions = this.subscriptions.filter(s => {
          if (s._krsType === 'conversation') {
            try { s.unsubscribe(); if (this.sb) this.sb.removeChannel(s); } catch(e) {}
            return false;
          }
          return true;
        });
        try {
          const sub = this.sb.channel('messages-' + conversationId)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `conversation_id=eq.${conversationId}` },
              async (payload) => {
                const msg = payload.new;
                if (msg.sender_id && !msg.sender) {
                  try {
                    const { data: sender } = await this.sb.from('users').select('*').eq('id', msg.sender_id).single();
                    msg.sender = sender;
                  } catch (e) {
                    msg.sender = { display_name: 'Unbekannt', avatar_color: '#999' };
                  }
                }
                onNewMessage(msg);
              })
            .subscribe();
          sub._krsType = 'conversation'; // Mark type for smart cleanup
          this.subscriptions.push(sub);
          return () => {
            try { sub.unsubscribe(); if (this.sb) this.sb.removeChannel(sub); } catch(e) {}
            this.subscriptions = this.subscriptions.filter(s => s !== sub);
          };
        } catch (err) {
          console.error('subscribeToConversation error:', err);
          return () => {};
        }
      }

      // Presence: track online users
      trackPresence(userId, displayName, onPresenceChange) {
        if (this.isDemo || !this.sb) {
          // Demo: Fake einige User als online
          const fakeOnline = new Set([1, 3, 5]);
          fakeOnline.add(Number(userId));
          setTimeout(() => onPresenceChange(fakeOnline), 500);
          return () => {};
        }
        const presenceChannel = this.sb.channel('online-users', {
          config: { presence: { key: userId } }
        });
        presenceChannel
          .on('presence', { event: 'sync' }, () => {
            const state = presenceChannel.presenceState();
            const onlineIds = new Set();
            Object.values(state).forEach(presences => {
              presences.forEach(p => {
                if (p.user_id != null) {
                  onlineIds.add(Number(p.user_id));
                }
              });
            });
            onPresenceChange(onlineIds);
          })
          .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
              await presenceChannel.track({
                user_id: userId,
                display_name: displayName,
                online_at: new Date().toISOString()
              });
            }
          });
        this.subscriptions.push(presenceChannel);
        return () => {
          presenceChannel.untrack();
          this.sb.removeChannel(presenceChannel);
        };
      }

      async createTeam(name, description, iconText, iconColor, creatorId) {
        if (this.isDemo) {
          const newTeam = { id: 'team-' + Date.now(), name, description, icon_text: iconText, icon_color: iconColor, category: 'Teams', members: 1 };
          MOCK_TEAMS.push(newTeam);
          MOCK_CHANNELS[newTeam.id] = [{ id: 'ch-' + Date.now(), name: 'Allgemein', is_default: true, unread: 0, team_id: newTeam.id }];
          return newTeam;
        }
        try {
          const { data: team, error: teamErr } = await this.sb.from('teams').insert({ name, description, icon_text: iconText, icon_color: iconColor, category: 'Teams' }).select().single();
          if (teamErr) throw teamErr;
          const { error: memberErr } = await this.sb.from('team_members').insert({ team_id: team.id, user_id: creatorId, role: 'admin' });
          if (memberErr) throw memberErr;
          const { data: defaultChannel, error: chanErr } = await this.sb.from('channels').insert({ team_id: team.id, name: 'Allgemein', is_default: true }).select().single();
          if (chanErr) throw chanErr;
          return team;
        } catch (err) {
          console.error('createTeam error:', err);
          return null;
        }
      }

      async getTeamMembers(teamId) {
        if (this.isDemo) {
          return MOCK_USERS.slice(0, 3).map(u => ({ ...u, role: 'member' }));
        }
        try {
          const { data, error } = await this.sb.from('team_members').select('user_id, role, users(*)').eq('team_id', teamId);
          if (error) throw error;
          return data?.map(tm => ({ ...tm.users, role: tm.role })) || [];
        } catch (err) {
          console.error('getTeamMembers error:', err);
          return [];
        }
      }

      async addTeamMember(teamId, userId) {
        if (this.isDemo) return true;
        try {
          const { error } = await this.sb.from('team_members').insert({ team_id: teamId, user_id: userId, role: 'member' });
          if (error) throw error;
          return true;
        } catch (err) {
          console.error('addTeamMember error:', err);
          return false;
        }
      }

      async removeTeamMember(teamId, userId) {
        if (this.isDemo) return true;
        try {
          const { error } = await this.sb.from('team_members').delete().eq('team_id', teamId).eq('user_id', userId);
          if (error) throw error;
          return true;
        } catch (err) {
          console.error('removeTeamMember error:', err);
          return false;
        }
      }

      async updateTeamMemberRole(teamId, userId, newRole) {
        if (this.isDemo) return true;
        try {
          const { error } = await this.sb.from('team_members').update({ role: newRole }).eq('team_id', teamId).eq('user_id', userId);
          if (error) throw error;
          return true;
        } catch (err) {
          console.error('updateTeamMemberRole error:', err);
          return false;
        }
      }

      async createGroupConversation(name, memberIds) {
        if (this.isDemo) {
          const convId = 'group-' + Date.now();
          return { id: convId, is_group: true, name, members: memberIds };
        }
        try {
          const { data: conv, error: convErr } = await this.sb.from('conversations').insert({ is_group: true, name }).select().single();
          if (convErr) throw convErr;
          const memberRows = memberIds.map(id => ({ conversation_id: conv.id, user_id: id }));
          const { error: memErr } = await this.sb.from('conversation_members').insert(memberRows);
          if (memErr) throw memErr;
          return conv;
        } catch (err) {
          console.error('createGroupConversation error:', err);
          return null;
        }
      }

      // === AUTH METHODS ===

      // Magic Link senden
      async sendMagicLink(email) {
        if (this.isDemo) return { error: null };
        try {
          const { error } = await this.sb.auth.signInWithOtp({
            email,
            options: {
              emailRedirectTo: window.location.origin + window.location.pathname
            }
          });
          if (error) throw error;
          return { error: null };
        } catch (err) {
          console.error('sendMagicLink error:', err);
          return { error: err.message || 'Magic Link konnte nicht gesendet werden.' };
        }
      }

      // Aktuelle Session prüfen
      async getSession() {
        if (this.isDemo || !this.sb) return null;
        try {
          const { data: { session } } = await this.sb.auth.getSession();
          return session;
        } catch (err) {
          console.error('getSession error:', err);
          return null;
        }
      }

      // Auth-User in users-Tabelle auflösen
      async resolveAuthUser(authUser) {
        if (!authUser || this.isDemo) return null;
        try {
          // Suche User in der users-Tabelle per E-Mail
          const { data, error } = await this.sb.from('users').select('*').eq('email', authUser.email).single();
          if (error && error.code !== 'PGRST116') throw error; // PGRST116 = no rows
          return data || null;
        } catch (err) {
          console.error('resolveAuthUser error:', err);
          return null;
        }
      }

      // Auth-State-Listener
      onAuthStateChange(callback) {
        if (this.isDemo || !this.sb) return () => {};
        const { data: { subscription } } = this.sb.auth.onAuthStateChange((event, session) => {
          callback(event, session);
        });
        return () => subscription?.unsubscribe();
      }

      // Logout
      async signOut() {
        if (this.isDemo || !this.sb) return;
        try {
          await this.sb.auth.signOut();
        } catch (err) {
          console.error('signOut error:', err);
        }
      }

      cleanup() {
        this.subscriptions.forEach(s => {
          try {
            if (s.unsubscribe) s.unsubscribe();
            if (this.sb && this.sb.removeChannel) this.sb.removeChannel(s);
          } catch (e) {
            console.warn('Cleanup error:', e);
          }
        });
        this.subscriptions = [];
      }
    }

    // Hilfsfunktion: Datum lesbar formatieren
    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const now = new Date();
        const diff = now - d;
        if (diff < 60000) return 'Gerade eben';
        if (diff < 3600000) return Math.floor(diff / 60000) + ' Min.';
        if (diff < 86400000 && d.getDate() === now.getDate()) return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        if (diff < 172800000) return 'Gestern, ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ', ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      } catch { return dateStr; }
    }

      ALLOWED_TAGS: ['p','br','b','strong','i','em','u','a','ul','ol','li','h1','h2','h3','h4','blockquote','pre','code','span','div','hr'],
      ALLOWED_ATTR: ['href','target','rel','class'],

    function sanitizeHtml(html) {
      if (!html) return '';
      // SICHER: DOMPurify verwenden wenn verfügbar
      if (window.DOMPurify && window.DOMPurify.sanitize) {
        const clean = DOMPurify.sanitize(html, SANITIZE_CONFIG);
        // Links: target=_blank hinzufuegen
        const tmp = document.createElement('div');
        tmp.innerHTML = clean; // Sicher: DOMPurify hat bereits sanitized
        tmp.querySelectorAll('a').forEach(a => {
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener noreferrer');
        });
        return tmp.innerHTML;
      }
      // FALLBACK: Kein DOMPurify → NUR Klartext ausgeben (kein innerHTML!)
      const tmp = document.createElement('div');
      tmp.textContent = html; // Sicher: textContent escaped alles
      return tmp.innerHTML;  // Gibt escaped HTML zurück
    }

    function TeamMembersModal({ teamId, dataService, onClose, onMembersUpdated, currentUser, isAdmin }) {
      const [members, setMembers] = useState([]);
      const [availableUsers, setAvailableUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [allUsers, setAllUsers] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [error, setError] = useState('');

      useEffect(() => {
        const loadData = async () => {
          const tmembers = await dataService.getTeamMembers(teamId);
          setMembers(tmembers);
          const users = await dataService.getUsers();
          setAllUsers(users);
          const memberIds = new Set(tmembers.map(m => m.id));
          setAvailableUsers(users.filter(u => !memberIds.has(u.id) && u.id !== currentUser.id));
          setLoading(false);
        };
        loadData();
      }, [teamId, dataService, currentUser]);

      const filteredUsers = availableUsers.filter(u =>
        u.display_name.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const handleRemove = async (userId) => {
        try {
          const result = await dataService.removeTeamMember(teamId, userId);
          if (result) {
            setMembers(prev => prev.filter(m => m.id !== userId));
            const userToAdd = allUsers.find(u => u.id === userId);
            if (userToAdd) {
              setAvailableUsers(prev => [...prev, userToAdd]);
            }
            setError('');
            if (onMembersUpdated) onMembersUpdated();
          }
        } catch (err) {
          setError(err.message || 'Fehler beim Entfernen des Mitglieds');
        }
      };

      const handleToggleRole = async (userId, currentRole) => {
        try {
          const newRole = currentRole === 'admin' ? 'member' : 'admin';
          const result = await dataService.updateTeamMemberRole(teamId, userId, newRole);
          if (result) {
            setMembers(prev => prev.map(m => m.id === userId ? { ...m, role: newRole } : m));
            setError('');
          }
        } catch (err) {
          setError(err.message || 'Fehler beim Ändern der Rolle');
        }
      };

      const handleAdd = async (userId) => {
        try {
          const result = await dataService.addTeamMember(teamId, userId);
          if (result) {
            const user = availableUsers.find(u => u.id === userId);
            setMembers(prev => [...prev, user]);
            setAvailableUsers(prev => prev.filter(u => u.id !== userId));
            setError('');
            if (onMembersUpdated) onMembersUpdated();
          }
        } catch (err) {
          setError(err.message || 'Fehler beim Hinzufügen des Mitglieds');
        }
      };

    const FEEDBACK_GAS_URL = 'https://script.google.com/macros/s/AKfycbwr9ZV9108jpkfN4nKboTuwMEgUhBOxW2c2ksWgazKNeSgiINL4G2ZNUMKeEzfaOj3H_g/exec';

    function FeedbackModal({ user, onClose }) {
      const [category, setCategory] = useState('');
      const [rating, setRating] = useState(0);
      const [message, setMessage] = useState('');
      const [sending, setSending] = useState(false);
      const [lastSubmit, setLastSubmit] = useState(0);

      const categories = [
        { id: 'bug', label: '🐛 Bug / Fehler' },
        { id: 'verbesserung', label: '💡 Verbesserung' },
        { id: 'lob', label: '👍 Lob' },
        { id: 'frage', label: '❓ Frage' },
        { id: 'sonstiges', label: '📝 Sonstiges' }
      ];

      const handleSubmit = async () => {
        if (!message.trim() && !category) {
          showToast('Bitte schreibe eine Nachricht oder wähle eine Kategorie.', 'info');
          return;
        }
        // Rate-Limiting: 10 Sekunden Cooldown
        if (Date.now() - lastSubmit < 10000) {
          showToast('Bitte warte einen Moment vor dem nächsten Feedback.', 'info');
          return;
        }
        setSending(true);
        try {
          const payload = {
            name: String(user?.display_name || 'Anonym').substring(0, 100),
            category: category || 'Sonstiges',
            rating: Math.min(Math.max(rating, 0), 5),
            message: String(message.trim()).substring(0, 2000),
            page: String(window.location.href).substring(0, 200),
            userAgent: String(navigator.userAgent).substring(0, 300)
          };

          if (FEEDBACK_GAS_URL) {
            const resp = await fetch(FEEDBACK_GAS_URL, {
              method: 'POST',
              body: JSON.stringify(payload),
              mode: 'no-cors'
            });
            // mode: 'no-cors' returns opaque response — we trust GAS handled it
          } else {
            // Kein Endpoint konfiguriert — Demo-Hinweis
            console.log('Feedback (Demo-Modus, kein GAS-Endpoint):', payload);
          }

          setLastSubmit(Date.now());
          showToast('Danke für dein Feedback!', 'success');
          onClose();
        } catch (err) {
          console.error('Feedback send error:', err);
          showToast('Feedback konnte nicht gesendet werden. Bitte versuche es später erneut.', 'error');
          setSending(false);
        }
      };

      return React.createElement('div', { className: 'feedback-overlay', onClick: (ev) => { if (ev.target === ev.currentTarget) onClose(); } },
        React.createElement('div', { className: 'feedback-modal' },
          React.createElement('div', { className: 'feedback-title' }, '📣', ' Feedback geben'),

          React.createElement('div', { className: 'feedback-label' }, 'Kategorie'),
          React.createElement('div', { className: 'feedback-categories' },
            categories.map(cat =>
              React.createElement('button', {
                key: cat.id,
                className: 'feedback-cat' + (category === cat.id ? ' active' : ''),
                onClick: () => setCategory(cat.id)
              }, cat.label)
            )
          ),

          React.createElement('div', { className: 'feedback-label' }, 'Wie gefällt dir KRS Connect? (optional)'),
          React.createElement('div', { className: 'feedback-stars' },
            [1, 2, 3, 4, 5].map(star =>
              React.createElement('button', {
                key: star,
                className: 'feedback-star' + (star <= rating ? ' active' : ''),
                onClick: () => setRating(star === rating ? 0 : star),
                'aria-label': star + ' Sterne'
              }, star <= rating ? '★' : '☆')
            )
          ),

          React.createElement('div', { className: 'feedback-label' }, 'Deine Nachricht'),
          React.createElement('textarea', {

      const [channels, setChannels] = useState([]);
      const [selectedChannel, setSelectedChannel] = useState(null);
      const [posts, setPosts] = useState([]);

      const [showHiddenTeams, setShowHiddenTeams] = useState(false);

      // Chat state
      const [conversations, setConversations] = useState([]);
      const [selectedConversation, setSelectedConversation] = useState(null);
      const [chatMessages, setChatMessages] = useState([]);
      const [allUsers, setAllUsers] = useState([]);

      // Unread notifications
      const [unreadChatCount, setUnreadChatCount] = useState(0);
      const [unreadPostChannels, setUnreadPostChannels] = useState(new Map());
      // Mapping: channelId → teamId (für Team-Badges)
      const [channelTeamMap, setChannelTeamMap] = useState(new Map());

      // Browser Notifications
      const [notificationsEnabled, setNotificationsEnabled] = useState(() => {
        try { return localStorage.getItem('krs-notifications') !== 'off'; } catch(e) { return true; }
      });
      const [notificationPermission, setNotificationPermission] = useState(() => {
        return typeof Notification !== 'undefined' ? Notification.permission : 'denied';
      });

      const requestNotifications = useCallback(async () => {
        if (typeof Notification === 'undefined') {
          showToast('Browser unterstützt keine Benachrichtigungen', 'error');
          return;
        }
        const perm = await Notification.requestPermission();
        setNotificationPermission(perm);
        if (perm === 'granted') {
          setNotificationsEnabled(true);
          try { localStorage.setItem('krs-notifications', 'on'); } catch(e) {}
          showToast('Benachrichtigungen aktiviert!', 'success');
        } else {
          showToast('Benachrichtigungen wurden blockiert. Bitte in den Browser-Einstellungen erlauben.', 'error');
        }
      }, []);

      const toggleNotifications = useCallback(() => {
        if (!notificationsEnabled && notificationPermission !== 'granted') {
          requestNotifications();
          return;
        }
        const next = !notificationsEnabled;
        setNotificationsEnabled(next);
        try { localStorage.setItem('krs-notifications', next ? 'on' : 'off'); } catch(e) {}
        showToast(next ? 'Benachrichtigungen aktiviert' : 'Benachrichtigungen deaktiviert', 'success');
      }, [notificationsEnabled, notificationPermission, requestNotifications]);

      const sendBrowserNotification = useCallback((title, body, onClick) => {
        if (!notificationsEnabled || notificationPermission !== 'granted') return;
        if (document.hasFocus()) return; // Nicht benachrichtigen wenn App im Fokus
        try {
          const n = new Notification(title, {
            body: body.length > 100 ? body.substring(0, 100) + '...' : body,
            icon: KRS_LOGO,
            badge: KRS_LOGO,
            tag: 'krs-' + Date.now(),
            renotify: true
          });
          if (onClick) n.onclick = () => { window.focus(); onClick(); n.close(); };
          setTimeout(() => n.close(), 8000);
        } catch(e) { console.warn('Notification error:', e); }
      }, [notificationsEnabled, notificationPermission]);

      // Online presence
      const [onlineUsers, setOnlineUsers] = useState(new Set());
      const [showOnlinePanel, setShowOnlinePanel] = useState(false);
      const [showFeedback, setShowFeedback] = useState(false);

      const [loadingUsers, setLoadingUsers] = useState(false);

      // Pagination
      const [hasMorePosts, setHasMorePosts] = useState(false);
      const [hasMoreMessages, setHasMoreMessages] = useState(false);
      const [loadingMore, setLoadingMore] = useState(false);
      const PAGE_SIZE = 50;

      // Mobile sidebar
      const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);

      // Team management modals
      const [showCreateTeam, setShowCreateTeam] = useState(false);
      const [showTeamMembers, setShowTeamMembers] = useState(false);
      const [userTeamRole, setUserTeamRole] = useState(null);

      const dataService = useMemo(() => new DataService(isDemo ? null : supabaseClient), [supabaseClient, isDemo]);

      const toggleTeamVisibility = (teamId) => {
        setHiddenTeams(prev => {
          const next = new Set(prev);
          if (next.has(teamId)) next.delete(teamId);
          else next.add(teamId);
          return next;
        });
      };

      // Pending auth user (wird nach Setup+Render automatisch eingeloggt)
      const [pendingAuthUser, setPendingAuthUser] = useState(null);

      const handleSetupComplete = async ({ isDemo: demoMode, client, authUser }) => {
        setIsDemo(demoMode);
        if (client) setSupabaseClient(client);
        // User-Liste sofort laden
        setLoadingUsers(true);
        try {
          const ds = new DataService(demoMode ? null : client);
          const usersData = await ds.getUsers();
          setAllUsers(usersData.length > 0 ? usersData : MOCK_USERS);
        } catch (e) {
          setAllUsers(MOCK_USERS);
        }
        setLoadingUsers(false);
        setSetupComplete(true);

        // Wenn Auth-User mitgegeben wurde (Magic Link Login), als Pending merken
        if (authUser && !demoMode) {
          setPendingAuthUser(authUser);
        }
      };

      // Pending Auth-User automatisch einloggen sobald dataService bereit ist
      useEffect(() => {
        if (pendingAuthUser && dataService && !dataService.isDemo && setupComplete) {
          handleUserSelected(pendingAuthUser);
          setPendingAuthUser(null);
        }
      }, [pendingAuthUser, dataService, setupComplete]);

      const handleUserSelected = async (selectedUser) => {
        setUser(selectedUser);
        // Load teams
        const teamsData = await dataService.getTeams(selectedUser.id);
        setTeams(teamsData);
        if (teamsData.length > 0) {
          const firstTeam = teamsData[0];
          setSelectedTeam(firstTeam);
          const channelsData = await dataService.getChannels(firstTeam.id);
          setChannels(channelsData);
          // Initialize unread badges from ALL teams' channels + build channelTeamMap
          const initialUnreads = new Map();
          const ctMap = new Map();
          for (const t of teamsData) {
            const chans = t.id === firstTeam.id ? channelsData : await dataService.getChannels(t.id);
            chans.forEach(ch => {
              ctMap.set(ch.id, t.id);
              if (ch.unread > 0) initialUnreads.set(ch.id, ch.unread);
            });
          }
          setChannelTeamMap(ctMap);
          // For Supabase mode: calculate unreads from localStorage lastRead timestamps
          if (!dataService.isDemo) {
            const allChannelIds = Array.from(ctMap.keys());
            const supaUnreads = await dataService.getChannelUnreadCounts(allChannelIds, selectedUser.id);
            if (supaUnreads.size > 0) setUnreadPostChannels(supaUnreads);
          } else if (initialUnreads.size > 0) {
            setUnreadPostChannels(initialUnreads);
          }
          if (channelsData.length > 0) {

            }, notificationsEnabled && notificationPermission === 'granted' ? '🔔' : '🔕'),
            React.createElement('button', { className: 'feedback-trigger', onClick: () => setShowFeedback(true), title: 'Feedback geben' }, '📣'),
            React.createElement('button', { className: 'icon-btn', onClick: handleLogout, title: 'Abmelden', 'aria-label': 'Abmelden', dangerouslySetInnerHTML: { __html: Icons.logout } })
          ),
          // Online Users Panel (Popup)
          showOnlinePanel && React.createElement('div', { className: 'online-panel' },
            React.createElement('div', { className: 'online-panel-header' },
              onlineUsers.size + ' Online'
            ),
            React.createElement('div', { className: 'online-panel-list' },
              allUsers.filter(u => onlineUsers.has(Number(u.id))).map(u =>
                React.createElement('div', { key: u.id, className: 'online-panel-user' },
                  React.createElement('div', { className: 'avatar-wrapper' },
                    React.createElement('div', { className: 'avatar', style: { background: u.avatar_color } }, u.display_name?.charAt(0)?.toUpperCase()),
                    React.createElement('span', { className: 'avatar-status online-dot small' })
                  ),
                  React.createElement('span', null, u.display_name),
                  u.id === user.id && React.createElement('span', { style: { fontSize: '11px', color: 'var(--text-muted)' } }, '(du)')
                )
              ),
              allUsers.filter(u => !onlineUsers.has(Number(u.id))).length > 0 && React.createElement(React.Fragment, null,
                React.createElement('div', { style: { padding: '8px 14px 4px', fontSize: '11px', color: 'var(--text-muted)', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.5px' } }, 'Offline'),
                allUsers.filter(u => !onlineUsers.has(Number(u.id))).slice(0, 5).map(u =>
                  React.createElement('div', { key: u.id, className: 'online-panel-user', style: { opacity: 0.5 } },
                    React.createElement('div', { className: 'avatar-wrapper' },
                      React.createElement('div', { className: 'avatar', style: { background: u.avatar_color } }, u.display_name?.charAt(0)?.toUpperCase()),
                      React.createElement('span', { className: 'avatar-status online-dot small offline' })
                    ),
                    React.createElement('span', null, u.display_name)
                  )
                )
              )
            )
          )
        ),
        // Main content: Teams oder Chat
        React.createElement('div', { className: 'main' },
          view === 'teams' ? teamsView : view === 'chat' ? chatView : React.createElement(SearchView, { dataService, user })
        ),
        // Thread overlay (nur in Teams-View)
        view === 'teams' && openThread && React.createElement(ThreadPanel, { post: openThread, replies, dataService, user, onClose: () => setOpenThread(null) }),
        // Feedback Modal
        showFeedback && React.createElement(FeedbackModal, { user, onClose: () => setShowFeedback(false) })
      )
      );
    }

    // ============================================================
    // RENDER APP
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
