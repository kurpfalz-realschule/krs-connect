<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRS Connect</title>
  <style>
    :root {
      --bg-primary: #F8F9FC;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #EEF0F4;
      --bg-hover: #E4E7ED;
      --bg-active: #D8DCE5;
      --text-primary: #1A1D26;
      --text-secondary: #5A5F72;
      --text-muted: #8C91A0;
      --accent: #5B7B94;
      --accent-hover: #4A6A83;
      --accent-light: rgba(91,123,148,0.1);
      --accent-orange: #D4762C;
      --accent-amber: #E8A832;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
      --danger-bg: #FEE2E2;
      --danger-text: #B91C1C;
      --border: #E2E4E8;
      --shadow: rgba(0,0,0,0.06);
      --radius: 8px;
      --radius-lg: 12px;
      --transition: 0.15s ease;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Keyboard-Focus-Styles (Accessibility) */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--radius);
    }
    button:focus:not(:focus-visible) { outline: none; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    #app { width: 100%; height: 100vh; }

    /* Layout */
    .app-layout {
      display: flex;
      height: 100vh;
      width: 100%;
      background: var(--bg-primary);
    }

    /* Sidebar */
    .sidebar {
      width: 68px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 24px;
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }

    .sidebar-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      padding: 3px;
    }

    .sidebar-logo:hover { background: var(--bg-tertiary); }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .nav-item {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .nav-item svg { width: 20px; height: 20px; }
    .nav-item:hover { color: var(--accent); background: var(--bg-hover); }
    .nav-item.active { color: var(--accent); background: var(--accent-light); }

    .sidebar-bottom {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar-content {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .sidebar-search {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { outline: none; border-color: var(--accent); }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px;
    }

    .list-item {
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: var(--radius);
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-primary);
      text-align: left;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-item:hover { background: var(--bg-hover); }
    .list-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
    .list-item-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .list-item-text { flex: 1; font-size: 13px; }
    .list-item-badge { font-size: 11px; background: var(--danger); color: white; padding: 2px 6px; border-radius: 10px; }

    /* Content Area */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-secondary);
    }

    .content-header h1 { margin: 0; font-size: 18px; }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .icon-btn svg { width: 18px; height: 18px; }
    .icon-btn:hover { background: var(--bg-hover); color: var(--accent); }

    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Cards */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: 0 1px 3px var(--shadow);
      transition: all var(--transition);
    }

    .card:hover { box-shadow: 0 4px 12px var(--shadow); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Posts */
    .post {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: 0 1px 3px var(--shadow);
      transition: all var(--transition);
    }

    .post:hover { box-shadow: 0 4px 12px var(--shadow); }

    .post-header {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .post-author {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 14px;
    }

    .post-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .post-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      margin: 8px 0;
      cursor: pointer;
    }

    .post-content {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
      margin: 8px 0;
    }

    .post-content p { margin: 8px 0; }
    .post-content ul { margin: 8px 0; padding-left: 20px; }
    .post-content li { margin: 4px 0; }
    .post-content strong { font-weight: 600; }

    .post-reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0;
    }

    .reaction {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition);
      min-height: 36px;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .reaction:hover { background: var(--accent-light); border-color: var(--accent); }
    .reaction.own { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .reaction.add-reaction { background: transparent; border-style: dashed; color: var(--text-muted); font-size: 18px; padding: 6px 12px; min-width: 44px; min-height: 36px; }
    .reaction.add-reaction:hover { background: var(--bg-hover); border-style: solid; color: var(--text-secondary); }

    /* Mention Autocomplete */
    .mention-autocomplete {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 -4px 16px var(--shadow);
      max-height: 200px;
      overflow-y: auto;
      z-index: 200;
      margin-bottom: 4px;
    }
    .mention-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      color: var(--text-primary);
    }
    .mention-item:hover, .mention-item.active { background: var(--accent-light); }
    .mention-tag { color: var(--accent); font-weight: 600; }

    /* Skeleton Loading */
    @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
    .skeleton { background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-hover) 50%, var(--bg-tertiary) 75%); background-size: 400px 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }
    .skeleton-line { height: 14px; margin-bottom: 8px; }
    .skeleton-circle { border-radius: 50%; }
    .skeleton-card { padding: 16px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: var(--radius-lg); }
    .mention-tag-all { color: var(--danger); font-weight: 700; background: rgba(239,68,68,0.1); padding: 1px 6px; border-radius: 4px; }

    /* Accordion / Aufklappmenü */
    .accordion { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .accordion-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg-tertiary); cursor: pointer; border: none; width: 100%; font-size: 14px; font-weight: 600; color: var(--text-primary); transition: background var(--transition); }
    .accordion-header:hover { background: var(--bg-hover); }
    .accordion-chevron { transition: transform 0.2s ease; font-size: 12px; color: var(--text-muted); }
    .accordion-chevron.open { transform: rotate(90deg); }
    .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
    .accordion-body.open { max-height: 2000px; }
    .accordion-body-inner { padding: 8px 14px; }

    /* Wiki-Popup */
    .wiki-popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 10000; display: flex; align-items: center; justify-content: center; animation: fadeIn .2s; }
    .wiki-popup { background: var(--bg-secondary); border-radius: 12px; width: 90%; max-width: 800px; height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden; }
    .wiki-popup-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); }
    .wiki-popup-header h3 { font-size: 14px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 0; }
    .wiki-popup-header a { font-size: 12px; color: var(--accent); text-decoration: none; white-space: nowrap; }
    .wiki-popup-close { width: 32px; height: 32px; border: none; background: var(--bg-hover); border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-primary); flex-shrink: 0; }
    .wiki-popup-close:hover { background: var(--bg-active); }
    .wiki-popup iframe { flex: 1; border: none; width: 100%; }
    .wiki-popup-error { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--text-muted); padding: 40px; text-align: center; }
    .wiki-popup-error a { color: var(--accent); }
    .wiki-link { color: var(--accent); cursor: pointer; text-decoration: none; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
    .wiki-link:hover { text-decoration: underline; }

    .post-footer {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .post-footer button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      transition: color var(--transition);
    }

    .post-footer button:hover { color: var(--accent); }

    /* Thread */
    .thread-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .thread-panel {
      width: 100%;
      max-width: 500px;
      height: 100%;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      margin-left: auto;
      border-left: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    .thread-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .thread-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .thread-reply {
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      padding: 12px;
    }

    .thread-reply-author {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
    }

    .thread-reply-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .thread-reply-content {
      font-size: 13px;
      color: var(--text-primary);
      margin-top: 6px;
      line-height: 1.4;
    }

    .thread-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .compose-box {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .compose-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      resize: none;
      max-height: 100px;
      font-family: inherit;
    }

    .compose-input:focus { outline: none; border-color: var(--accent); }

    .compose-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .compose-btn:hover { background: var(--accent-hover); }
    .compose-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    /* Avatar */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* Emoji Picker */
    .emoji-picker-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 500;
    }

    .emoji-picker {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 40px var(--shadow);
      width: 340px;
      max-width: calc(100vw - 32px);
      max-height: min(400px, 60vh);
      display: flex;
      flex-direction: column;
      z-index: 501;
    }

    .emoji-picker-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .emoji-picker-header input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
    }

    .emoji-picker-header input:focus { outline: none; border-color: var(--accent); }

    .emoji-grid {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }

    .emoji-category {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 4px 8px;
    }

    .emoji-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius);
      transition: all var(--transition);
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji-btn:hover { background: var(--bg-hover); }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2000;
    }

    .toast {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 4px 12px var(--shadow);
      animation: toastSlideIn 0.3s ease;
    }

    @keyframes toastSlideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .toast.leaving { animation: toastSlideOut 0.3s ease forwards; }
    @keyframes toastSlideOut { to { transform: translateX(400px); opacity: 0; } }

    .toast > div { flex: 1; }
    .toast strong { color: var(--text-primary); }

    /* Setup/Selection Screens */
    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px;
      text-align: center;
    }

    .setup-screen h1 {
      font-size: 32px;
      margin-bottom: 30px;
    }

    .setup-screen input {
      display: block;
      width: 300px;
      margin: 10px auto;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
    }

    .setup-screen input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .setup-screen button {
      padding: 10px 30px;
      margin-top: 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      transition: all var(--transition);
    }

    .setup-screen button:hover {
      background: var(--accent-hover);
    }

    .setup-screen label {
      display: block;
      margin: 15px 0;
      font-size: 16px;
    }

    .user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      max-width: 600px;
      margin: 30px auto 0;
    }

    .user-btn {
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }

    .user-btn:hover {
      box-shadow: 0 4px 12px var(--shadow);
      transform: translateY(-2px);
    }

    .user-btn-name {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Chat UI */
    .conversation-list { display: flex; flex-direction: column; height: 100%; }
    .conversation-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .conversation-header h2 { margin: 0; font-size: 16px; }
    .new-chat-btn { width: 32px; height: 32px; border-radius: var(--radius); background: var(--accent); color: white; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .new-chat-btn:hover { background: var(--accent-hover); }

    .new-chat-picker { padding: 8px 12px; border-bottom: 1px solid var(--border); max-height: 300px; overflow-y: auto; }
    .new-chat-picker input { position: sticky; top: 0; z-index: 1; }
    .user-pick-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; border: none; background: none; cursor: pointer; border-radius: var(--radius); font-size: 14px; color: var(--text-primary); transition: background var(--transition); }
    .user-pick-btn:hover { background: var(--bg-hover); }

    .conversation-items { flex: 1; overflow-y: auto; }

    .conversation-item { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 16px; border: none; background: none; cursor: pointer; text-align: left; transition: background var(--transition); border-bottom: 1px solid var(--border); }
    .conversation-item:hover { background: var(--bg-hover); }
    .conversation-item.active { background: var(--accent-light); }
    .conversation-info { flex: 1; min-width: 0; }
    .conversation-name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
    .conversation-preview { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    .conversation-time { font-size: 11px; color: var(--text-muted); }
    .unread-badge { background: var(--accent-orange); color: white; border-radius: 10px; padding: 2px 7px; font-size: 11px; font-weight: 600; }
    .nav-badge { position: absolute; top: 2px; right: 2px; background: var(--accent-orange); color: white; border-radius: 10px; padding: 1px 5px; font-size: 10px; font-weight: 700; min-width: 16px; text-align: center; line-height: 14px; }
    .nav-item { position: relative; }
    .channel-unread { font-weight: 700; color: var(--text-primary); }
    .channel-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-orange); flex-shrink: 0; }

    /* Online Status */
    .online-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); border: 2px solid var(--bg-secondary); flex-shrink: 0; }
    .online-dot.small { width: 8px; height: 8px; border-width: 1.5px; }

    .avatar-wrapper { position: relative; display: inline-flex; flex-shrink: 0; }
    .avatar-status { position: absolute; bottom: -1px; right: -1px; }
    .online-indicator { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: var(--radius); background: var(--bg-tertiary); font-size: 12px; color: var(--text-secondary); cursor: pointer; border: none; width: 100%; transition: background var(--transition); }
    .online-indicator:hover { background: var(--bg-hover); }
    .online-count { font-weight: 600; color: var(--success); }
    .online-panel { position: absolute; bottom: 52px; left: 68px; width: 220px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: 0 4px 20px var(--shadow); z-index: 200; overflow: hidden; }
    .online-panel-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; color: var(--text-primary); }
    .online-panel-list { max-height: 250px; overflow-y: auto; padding: 6px 0; }
    .online-panel-user { display: flex; align-items: center; gap: 8px; padding: 6px 14px; font-size: 13px; color: var(--text-primary); }
    .online-panel-user .avatar { width: 28px; height: 28px; font-size: 11px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 300; }
    .modal { background: var(--bg-secondary); border-radius: var(--radius-lg); box-shadow: 0 8px 30px rgba(0,0,0,0.15); width: 420px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .modal-header h3 { margin: 0; font-size: 16px; }
    .modal-body { padding: 16px 20px; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .form-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all var(--transition); }
    .color-swatch.selected { border-color: var(--text-primary); transform: scale(1.1); }
    .color-swatch:hover { transform: scale(1.1); }
    .member-list { max-height: 200px; overflow-y: auto; }
    .member-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
    .member-item .avatar { width: 32px; height: 32px; font-size: 12px; }
    .member-name { flex: 1; font-size: 14px; }
    .member-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 16px; }
    .member-remove:hover { color: var(--danger); background: rgba(239,68,68,0.1); }
    .member-add-btn { background: var(--accent-light); color: var(--accent); border: none; padding: 4px 10px; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 600; }
    .member-add-btn:hover { background: var(--accent); color: white; }
    .btn-primary { padding: 8px 20px; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }
    .btn-secondary { padding: 8px 20px; background: var(--bg-tertiary); color: var(--text-primary); border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; }
    .btn-secondary:hover { background: var(--bg-hover); }
    .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; cursor: pointer; }
    .checkbox-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
    .group-avatar { width: 40px; height: 40px; border-radius: var(--radius); background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; flex-shrink: 0; }
    .settings-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; }
    .settings-btn:hover { color: var(--accent); background: var(--accent-light); }

    .chat-panel { display: flex; flex-direction: column; height: 100%; }
    .chat-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .chat-header-name { font-weight: 600; font-size: 16px; }
    .back-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); padding: 4px; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 6px; }
    .chat-msg { display: flex; gap: 8px; max-width: 75%; }
    .chat-msg.own { align-self: flex-end; flex-direction: row-reverse; }
    .chat-msg.other { align-self: flex-start; }
    .chat-bubble { padding: 10px 14px; border-radius: 16px; background: var(--bg-tertiary); word-break: break-word; }
    .chat-bubble.own { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .chat-bubble.other { border-bottom-left-radius: 4px; }
    .chat-text { font-size: 14px; line-height: 1.5; }
    .chat-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .chat-input-bar { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); align-items: flex-end; }
    .chat-input-bar input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; }
    .chat-input-bar input:focus { outline: none; border-color: var(--accent); }
    .chat-send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: white; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all var(--transition); flex-shrink: 0; }
    .chat-send-btn:hover { background: var(--accent-hover); }
    .chat-send-btn:disabled { background: var(--text-muted); cursor: not-allowed; }
    .chat-image-btn svg { width: 22px; height: 22px; }
    .chat-image-btn:hover { color: var(--accent); }

    .chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 16px; gap: 12px; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    /* Teams visibility */
    .team-item { position: relative; }
    .team-hide-btn { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); opacity: 0; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; font-size: 12px; transition: opacity 0.15s; }
    .team-item:hover .team-hide-btn { opacity: 1; }
    .team-hide-btn:hover { color: var(--danger); }
    .hidden-teams-toggle { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; width: 100%; transition: color 0.15s; }
    .hidden-teams-toggle:hover { color: var(--text-primary); }

    /* Responsive */
    /* Tablet Breakpoint (iPad 768-1024px) */
    @media (min-width: 769px) and (max-width: 1024px) {
      .sidebar-content { width: 220px; min-width: 220px; }
      .content { flex: 1; min-width: 0; }
      .thread-panel { width: 320px; min-width: 320px; }
      .emoji-picker { width: 280px; min-width: 280px; }
      .post-card { padding: 12px 14px; }
      .channel-header h2 { font-size: 16px; }
      .sidebar-bottom { gap: 2px; }
      .sidebar-bottom .feedback-trigger { padding: 4px; font-size: 16px; min-width: 36px; min-height: 36px; }
    }

    @media (max-width: 768px) {
      .app-layout { flex-direction: column; height: 100vh; }
      .sidebar { width: 100%; height: 56px; flex-direction: row; padding: 0 8px; gap: 4px; order: 2; border-top: 1px solid var(--border); border-right: none; }
      .sidebar-nav { flex-direction: row; flex: 1; justify-content: space-around; }
      .sidebar-nav button { font-size: 11px; padding: 6px 8px; }
      .sidebar-bottom { flex-direction: row; gap: 4px; }
      .sidebar-content { position: fixed; top: 0; left: 0; width: 80vw; max-width: 300px; height: calc(100vh - 56px); z-index: 100; transform: translateX(-100%); transition: transform 0.25s ease; background: var(--bg-secondary); box-shadow: 2px 0 12px rgba(0,0,0,0.15); }
      .sidebar-content.mobile-open { transform: translateX(0); }
      .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 99; }
      .mobile-overlay.visible { display: block; }
      .content { flex: 1; order: 1; overflow-y: auto; min-height: 0; }
      .content-header { position: sticky; top: 0; z-index: 10; }
      .modal { width: 95vw; max-height: 90vh; }
      .post-card { padding: 12px; }
      .post-header { gap: 8px; }
      .chat-messages { padding: 8px; }
      .chat-input-bar { padding: 8px; }
      .chat-input-bar textarea { font-size: 16px; } /* Verhindert iOS-Zoom */
      .mobile-menu-btn {
        display: flex !important;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        min-height: 44px;
        border-radius: var(--radius);
      }
      .mobile-menu-btn:active { background: var(--bg-hover); }
    }

    /* Toast System */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      max-width: calc(100% - 32px);
      width: max-content;
      box-shadow: 0 4px 12px var(--shadow);
      pointer-events: auto;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 3.7s forwards;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast-success { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .toast-error { background: #fef2f2; color: #7f1d1d; border: 1px solid #fca5a5; }
    .toast-info { background: #eff6ff; color: #1e3a5f; border: 1px solid #93c5fd; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    /* Feedback Modal */
    .feedback-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9998; display: flex; align-items: center; justify-content: center; }
    .feedback-modal { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 24px; width: 420px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .feedback-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .feedback-categories { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .feedback-cat { padding: 10px 16px; min-height: 44px; border-radius: 22px; border: 1px solid var(--border); background: var(--bg-primary); cursor: pointer; font-size: 14px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .feedback-cat:hover { border-color: var(--accent); }
    .feedback-cat.active { background: var(--accent); color: white; border-color: var(--accent); }
    .feedback-stars { display: flex; gap: 4px; margin-bottom: 16px; }
    .feedback-star { font-size: 32px; cursor: pointer; background: none; border: none; padding: 4px; min-width: 44px; min-height: 44px; transition: transform 0.15s; color: var(--text-muted); }
    .feedback-star:hover { transform: scale(1.2); }
    .feedback-star.active { color: #f59e0b; }
    .feedback-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .feedback-textarea { width: 100%; min-height: 100px; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 14px; font-family: inherit; resize: vertical; background: var(--bg-primary); color: var(--text-primary); }
    .feedback-textarea:focus { outline: none; border-color: var(--accent); }
    .feedback-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .feedback-btn { padding: 10px 20px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
    .feedback-btn-cancel { background: var(--bg-tertiary); color: var(--text-primary); }
    .feedback-btn-cancel:hover { background: var(--bg-hover); }
    .feedback-btn-send { background: var(--accent); color: white; min-width: 120px; }
    .feedback-btn-send:hover { background: var(--accent-hover); }
    .feedback-btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .feedback-trigger { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; font-size: 18px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; transition: color 0.15s; }
    .feedback-trigger:hover { color: var(--accent-orange); }

    @media (max-width: 768px) {
      .toast-container { top: 8px; right: 8px; left: 8px; }
      .toast { max-width: 100%; }
      .feedback-modal { padding: 16px; }
    }

    /* Lightbox Overlay */
    .lightbox-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.88); z-index: 10000;
      display: flex; align-items: center; justify-content: center;
      animation: lbFadeIn .2s; cursor: zoom-out;
    }
    .lightbox-overlay img.lightbox-img {
      max-width: 90vw; max-height: 82vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
      object-fit: contain; cursor: default;
    }
    .lightbox-caption {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 14px; font-weight: 500;
      background: rgba(0,0,0,.6); padding: 8px 20px;
      border-radius: 20px; white-space: nowrap;
      display: flex; align-items: center; gap: 12px;
    }
    .lightbox-caption a {
      color: #fff; text-decoration: none; display: flex; align-items: center; gap: 4px;
      opacity: 0.8; transition: opacity .2s;
    }
    .lightbox-caption a:hover { opacity: 1; }
    .lightbox-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px;
      background: rgba(255,255,255,.15); border: none; border-radius: 50%;
      color: #fff; font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,.3); }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }
    .lightbox-close {
      position: fixed; top: 20px; right: 20px;
      width: 48px; height: 48px;
      background: rgba(255,255,255,.15); border: none; border-radius: 50%;
      color: #fff; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-close:hover { background: rgba(255,255,255,.3); }
    @keyframes lbFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @media (max-width: 768px) {
      .lightbox-nav { width: 40px; height: 40px; font-size: 20px; }
      .lightbox-prev { left: 8px; }
      .lightbox-next { right: 8px; }
      .lightbox-close { top: 12px; right: 12px; width: 40px; height: 40px; }
      .lightbox-caption { font-size: 12px; padding: 6px 14px; bottom: 16px; }
    }
  </style>

<body>
  <div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#5A5F72"><div style="width:40px;height:40px;border:3px solid #E2E4E8;border-top-color:#5B7B94;border-radius:50%;animation:spin 0.8s linear infinite"></div><div>KRS Connect wird geladen...</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
  <script>
    // DOMPurify CDN-Check mit Fallback
    if (!window.DOMPurify) {
      console.warn('DOMPurify CDN 1 fehlgeschlagen, lade Fallback...');
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js';
      s.onload = function() { console.log('DOMPurify Fallback geladen'); };
      s.onerror = function() {
        console.error('KRITISCH: DOMPurify konnte von keinem CDN geladen werden');
        window._domPurifyFailed = true;
      };
      document.head.appendChild(s);
    }
  </script>

  <script>
    // ============================================================
    // LIGHTBOX — Fullscreen-Bildanzeige mit Navigation & Download
    // ============================================================
    (function() {
      var _lbImgs = [], _lbIdx = 0, _lbKeyHandler = null, _lbTouchStartX = 0;

      window.openLightbox = function(images, startIdx) {
        _lbImgs = images;
        _lbIdx = startIdx || 0;
        renderLB();
      };

      function renderLB() {
        var ov = document.querySelector('.lightbox-overlay');
        if (ov) ov.remove();

        ov = document.createElement('div');
        ov.className = 'lightbox-overlay';
        ov.onclick = function(e) { if (e.target === ov) closeLB(); };

        var img = _lbImgs[_lbIdx];
        var imgUrl = typeof img === 'string' ? img : img.url;
        var imgName = typeof img === 'string' ? imgUrl.split('/').pop().split('?')[0] : (img.name || 'Bild');

        // Close button
        var closeBtn = document.createElement('button');
        closeBtn.className = 'lightbox-close';
        closeBtn.setAttribute('aria-label', 'Schließen');
        closeBtn.textContent = '✕';
        closeBtn.onclick = closeLB;
        ov.appendChild(closeBtn);

        // Nav prev
        if (_lbImgs.length > 1) {
          var prevBtn = document.createElement('button');
          prevBtn.className = 'lightbox-nav lightbox-prev';
          prevBtn.setAttribute('aria-label', 'Vorheriges Bild');
          prevBtn.textContent = '‹';
          prevBtn.onclick = function(e) { e.stopPropagation(); lbPrev(); };
          ov.appendChild(prevBtn);
        }

        // Image
        var imgEl = document.createElement('img');
        imgEl.className = 'lightbox-img';
        imgEl.src = imgUrl;
        imgEl.alt = imgName;
        imgEl.onclick = function(e) { e.stopPropagation(); };
        ov.appendChild(imgEl);

        // Nav next
        if (_lbImgs.length > 1) {
          var nextBtn = document.createElement('button');
          nextBtn.className = 'lightbox-nav lightbox-next';
          nextBtn.setAttribute('aria-label', 'Nächstes Bild');
          nextBtn.textContent = '›';
          nextBtn.onclick = function(e) { e.stopPropagation(); lbNext(); };
          ov.appendChild(nextBtn);
        }

        // Caption with download + share
        var caption = document.createElement('div');
        caption.className = 'lightbox-caption';
        var countText = _lbImgs.length > 1 ? ((_lbIdx + 1) + '/' + _lbImgs.length + ' — ') : '';
        caption.innerHTML = countText + '<a href="' + imgUrl + '" download="' + imgName.replace(/"/g, '&quot;') + '" title="Herunterladen" onclick="event.stopPropagation()">⬇ Download</a>';
        ov.appendChild(caption);

        // Touch-Swipe
        ov.addEventListener('touchstart', function(e) { _lbTouchStartX = e.touches[0].clientX; });
        ov.addEventListener('touchend', function(e) {
          var diff = _lbTouchStartX - e.changedTouches[0].clientX;
          if (Math.abs(diff) > 50) { diff > 0 ? lbNext() : lbPrev(); }
        });

        document.body.appendChild(ov);

        // Keyboard
        if (_lbKeyHandler) document.removeEventListener('keydown', _lbKeyHandler);
        _lbKeyHandler = function(e) {
          if (!document.querySelector('.lightbox-overlay')) return;
          if (e.key === 'Escape') closeLB();
          if (e.key === 'ArrowRight') lbNext();
          if (e.key === 'ArrowLeft') lbPrev();
        };
        document.addEventListener('keydown', _lbKeyHandler);
      }

      function lbNext() { _lbIdx = (_lbIdx + 1) % _lbImgs.length; renderLB(); }
      function lbPrev() { _lbIdx = (_lbIdx - 1 + _lbImgs.length) % _lbImgs.length; renderLB(); }

      function closeLB() {
        var ov = document.querySelector('.lightbox-overlay');
        if (ov) ov.remove();
        if (_lbKeyHandler) {
          document.removeEventListener('keydown', _lbKeyHandler);
          _lbKeyHandler = null;
        }
      }
    })();

        || (() => {
          const c = document.createElement('div');
          c.id = 'toast-container';
          c.className = 'toast-container';
          c.setAttribute('role', 'region');
          c.setAttribute('aria-live', 'polite');
          document.body.appendChild(c);
          return c;
        })();
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + (type || 'error');
      toast.setAttribute('role', 'alert');
      const icons = { success: '\u2713', error: '\u2715', info: '\u2139' };
      const iconSpan = document.createElement('span');
      iconSpan.textContent = icons[type] || '';
      const msgSpan = document.createElement('span');
      msgSpan.textContent = String(message);
      toast.appendChild(iconSpan);
      toast.appendChild(msgSpan);
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 4000);
    }

    async function compressImage(file, maxWidth = 1200, quality = 0.8) {
      return new Promise((resolve) => {
        // Skip non-image files or small files (< 200KB)
        if (!file.type.startsWith('image/') || file.size < 200 * 1024) {
          resolve(file);
          return;
        }
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let { width, height } = img;
          if (width > maxWidth) {
            height = Math.round(height * maxWidth / width);
            width = maxWidth;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob((blob) => {
            if (blob && blob.size < file.size) {
              // Compressed is smaller — use it
              const compressed = new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() });
              resolve(compressed);
            } else {
              // Original was already smaller — keep it
              resolve(file);
            }
          }, 'image/jpeg', quality);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          resolve(file); // Fallback to original
        };
        img.src = url;
      });
    }

    class DataService {

      async getStorageStats() {
        if (this.isDemo) return { used: 0, files: 0 };
        try {
          const { data } = await this.sb.storage.from('images').list('uploads', { limit: 1000 });
          if (!data) return { used: 0, files: 0 };
          const totalSize = data.reduce((sum, f) => sum + (f.metadata?.size || 0), 0);
          return { used: totalSize, files: data.length, usedMB: Math.round(totalSize / 1024 / 1024) };
        } catch (err) {
          return { used: 0, files: 0 };
        }
      }

      async cleanupOldFiles(olderThanDays = 90) {
        if (this.isDemo) return 0;
        try {
          const cutoff = new Date();
          cutoff.setDate(cutoff.getDate() - olderThanDays);
          const { data: files } = await this.sb.storage.from('images').list('uploads', { limit: 1000 });
          if (!files) return 0;
          const old = files.filter(f => f.created_at && new Date(f.created_at) < cutoff);
          if (old.length === 0) return 0;
          const paths = old.map(f => `uploads/${f.name}`);
          const { error } = await this.sb.storage.from('images').remove(paths);
          if (error) throw error;
          return old.length;
        } catch (err) {
          console.error('cleanupOldFiles error:', err);

            const lastRead = localStorage.getItem(`krs-lastread-ch-${chId}`) || '1970-01-01';
            return this.sb.from('posts')
              .select('*', { count: 'exact', head: true })
              .eq('channel_id', chId)
              .is('parent_id', null)
              .neq('author_id', userId)
              .gt('created_at', lastRead)
              .then(res => ({ chId, count: res.count, error: res.error }));

          for (const { chId, count, error } of results) {
            if (!error && count > 0) counts.set(chId, count);

        if (this.isDemo) return URL.createObjectURL(file);
        // Compress images before upload
        if (file.type.startsWith('image/')) {
          file = await compressImage(file);
        }
        try {
          // Storage-Quota-Check (Free Tier: 1 GB)
          try {
            const { data: storageFiles } = await this.sb.storage.from('images').list('uploads', { limit: 1000 });
            if (storageFiles) {
              const totalSize = storageFiles.reduce((sum, f) => sum + (f.metadata?.size || 0), 0);
              const maxStorage = 900 * 1024 * 1024; // 900 MB Warnschwelle
              if (totalSize + file.size > maxStorage) {
                console.warn(`Storage fast voll: ${Math.round(totalSize / 1024 / 1024)} MB von ~1000 MB`);
                // Nicht blockieren, nur warnen
              }
            }
          } catch (quotaErr) {
            // Quota-Check fehlgeschlagen — kein Problem, Upload trotzdem versuchen
          }
          const ext = file.name.split('.').pop() || 'bin';
          const path = `uploads/${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${ext}`;
          const { data, error } = await this.sb.storage.from('images').upload(path, file);
          if (error) throw error;
          const { data: urlData } = this.sb.storage.from('images').getPublicUrl(data.path);
          return urlData.publicUrl;
        } catch (err) {
          console.error('uploadFile error:', err);
          showToast('Datei konnte nicht hochgeladen werden. Ist die Datei zu gro\u00df?', 'error');
          return null;
        }
      }

      async getReactions(targetType, targetIds) {
        // Returns Map<targetId, [{emoji, users: [userId,...], count}]>
        const result = new Map();
        if (!targetIds || targetIds.length === 0) return result;
        if (this.isDemo) {
          // Demo: Reactions direkt von den Mock-Posts lesen
          if (targetType === 'post') {
            const allPosts = Object.values(MOCK_POSTS).flat();
            for (const id of targetIds) {
              const post = allPosts.find(p => p.id === id);
              if (post && post.reactions && post.reactions.length > 0) {
                result.set(id, post.reactions);
              }
            }
          }
          return result;
        }
        try {
          const { data, error } = await this.sb.from('reactions')
            .select('target_id, emoji, user_id')
            .eq('target_type', targetType)
            .in('target_id', targetIds);
          if (error) throw error;
          // Group by target_id + emoji
          for (const r of (data || [])) {
            if (!result.has(r.target_id)) result.set(r.target_id, {});
            const byEmoji = result.get(r.target_id);
            if (!byEmoji[r.emoji]) byEmoji[r.emoji] = [];
            byEmoji[r.emoji].push(r.user_id);
          }
          // Convert to array format
          const formatted = new Map();
          for (const [tid, byEmoji] of result) {
            formatted.set(tid, Object.entries(byEmoji).map(([emoji, users]) => ({ emoji, users, count: users.length })));
          }
          return formatted;
        } catch (err) {
          console.error('getReactions error:', err);
          return result;
        }
      }

      async toggleReaction(targetType, targetId, userId, emoji) {
        // Emoji-Validierung: nur echte Emojis (1-8 Zeichen Unicode), kein HTML/Script
        if (!emoji || emoji.length > 8 || /<|>|&|"|'/.test(emoji)) {
          console.error('Invalid emoji rejected:', emoji);
          return false;
        }
        if (this.isDemo) {
          // Toggle in mock data
          const postsArray = targetType === 'post' ? Object.values(MOCK_POSTS).flat() : [];
          const target = postsArray.find(p => p.id === targetId);
          if (target) {
            if (!target.reactions) target.reactions = [];
            const existing = target.reactions.find(r => r.emoji === emoji);
            if (existing) {
              if (existing.users.includes(userId)) {
                existing.users = existing.users.filter(u => u !== userId);
                existing.count = existing.users.length;
                if (existing.count === 0) target.reactions = target.reactions.filter(r => r.emoji !== emoji);
              } else {
                existing.users.push(userId);
                existing.count = existing.users.length;
              }
            } else {
              target.reactions.push({ emoji, users: [userId], count: 1 });
            }
          }
          return true;
        }
        try {
          // Atomarer Toggle via PostgreSQL RPC (keine Race Condition)
          const { data, error } = await this.sb.rpc('toggle_reaction', {
            p_target_type: targetType,
            p_target_id: targetId,
            p_user_id: userId,
            p_emoji: emoji
          });
          if (error) throw error;
          return true;
        } catch (err) {
          console.error('toggleReaction error:', err);
          showToast('Reaktion konnte nicht gespeichert werden.', 'error');
          return false;
        }
      }

      async getConversations(userId) {
        if (this.isDemo) return [...MOCK_CONVERSATIONS];
        try {
          // 1. Finde alle Konversationen des Users (mit Join statt 2 separate Queries)
          const { data: memberships, error: err1 } = await this.sb
            .from('conversation_members')
            .select('conversation_id, conversations(*)')
            .eq('user_id', userId);
          if (err1) throw err1;
          if (!memberships?.length) return [];

          const convIds = memberships.map(m => m.conversation_id);
          const convs = memberships.map(m => m.conversations).filter(Boolean);
          if (!convs.length) return [];

          // 2+3. Lade Teilnehmer UND letzte Nachrichten parallel
          const [membersRes, msgsRes] = await Promise.all([
            this.sb.from('conversation_members').select('conversation_id, user_id, users(*)').in('conversation_id', convIds),
            this.sb.from('messages').select('conversation_id, content, created_at').in('conversation_id', convIds).order('created_at', { ascending: false })
          ]);
          const allMembers = membersRes.data || [];
          const lastMsgs = msgsRes.data || [];

          // 4. Reichere Konversationen an
          return convs.map(conv => {
            const members = allMembers.filter(m => m.conversation_id === conv.id);
            const lastMsg = lastMsgs.find(m => m.conversation_id === conv.id);
            const convObj = {
              ...conv,
              lastMessage: lastMsg?.content || '',
              time: lastMsg ? formatDate(lastMsg.created_at) : ''
            };
            if (conv.is_group) {
              convObj.members = members.map(m => m.user_id);
              convObj.name = conv.name || 'Gruppenchat';
            } else {
              const otherMember = members.find(m => m.user_id !== userId);
              convObj.user = otherMember?.users || { display_name: 'Unbekannt', avatar_color: '#999' };
            }
            return convObj;
          });
        } catch (err) {
          console.error('getConversations error:', err);
          return [];
        }
      }

              .or(`content.ilike.%${query}%,title.ilike.%${query}%`)

              .order('created_at', { ascending: false })

            messages = ftsMsgs;

            const { data: ilikeMsgs } = await this.sb.from('messages')
              .select('*, sender:users(*)')
              .ilike('content', `%${query}%`)
              .order('created_at', { ascending: false })

      subscribeToChannel(channelId, onNewPost) {
        if (this.isDemo) return () => {};
        // Smart: Alte Channel-Subscriptions aufräumen (nur den gleichen Channel-Typ)
        this.subscriptions = this.subscriptions.filter(s => {
          if (s._krsType === 'channel') {
            try { s.unsubscribe(); if (this.sb) this.sb.removeChannel(s); } catch(e) {}
            return false;
          }
          return true;
        });
        try {
          const sub = this.sb.channel('posts-' + channelId)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts', filter: `channel_id=eq.${channelId}` },
              async (payload) => {
                const post = payload.new;
                if (post.author_id && !post.author) {
                  try {
                    const { data: author } = await this.sb.from('users').select('*').eq('id', post.author_id).single();
                    post.author = author;
                  } catch (e) {
                    post.author = { display_name: 'Unbekannt', avatar_color: '#999' };
                  }
                }
                onNewPost(post);
              })
            .subscribe();
          sub._krsType = 'channel'; // Mark type for smart cleanup
          this.subscriptions.push(sub);
          return () => {
            try { sub.unsubscribe(); if (this.sb) this.sb.removeChannel(sub); } catch(e) {}
            this.subscriptions = this.subscriptions.filter(s => s !== sub);
          };
        } catch (err) {
          console.error('subscribeToChannel error:', err);
          return () => {};
        }
      }

      // Presence: track online users
      trackPresence(userId, displayName, onPresenceChange) {
        if (this.isDemo || !this.sb) {
          // Demo: Fake einige User als online
          const fakeOnline = new Set([1, 3, 5]);
          fakeOnline.add(Number(userId));
          setTimeout(() => onPresenceChange(fakeOnline), 500);
          return () => {};
        }
        const presenceChannel = this.sb.channel('online-users', {
          config: { presence: { key: userId } }
        });
        presenceChannel
          .on('presence', { event: 'sync' }, () => {
            const state = presenceChannel.presenceState();
            const onlineIds = new Set();
            Object.values(state).forEach(presences => {
              presences.forEach(p => {
                if (p.user_id != null) {
                  onlineIds.add(Number(p.user_id));
                }
              });
            });
            onPresenceChange(onlineIds);
          })
          .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
              await presenceChannel.track({
                user_id: userId,
                display_name: displayName,
                online_at: new Date().toISOString()
              });
            }
          });
        this.subscriptions.push(presenceChannel);
        return () => {
          presenceChannel.untrack();
          this.sb.removeChannel(presenceChannel);
        };
      }

      async createTeam(name, description, iconText, iconColor, creatorId) {
        if (this.isDemo) {
          const newTeam = { id: 'team-' + Date.now(), name, description, icon_text: iconText, icon_color: iconColor, category: 'Teams', members: 1 };
          MOCK_TEAMS.push(newTeam);
          MOCK_CHANNELS[newTeam.id] = [{ id: 'ch-' + Date.now(), name: 'Allgemein', is_default: true, unread: 0, team_id: newTeam.id }];
          return newTeam;
        }
        try {
          const { data: team, error: teamErr } = await this.sb.from('teams').insert({ name, description, icon_text: iconText, icon_color: iconColor, category: 'Teams' }).select().single();
          if (teamErr) throw teamErr;
          const { error: memberErr } = await this.sb.from('team_members').insert({ team_id: team.id, user_id: creatorId, role: 'admin' });
          if (memberErr) throw memberErr;
          const { data: defaultChannel, error: chanErr } = await this.sb.from('channels').insert({ team_id: team.id, name: 'Allgemein', is_default: true }).select().single();
          if (chanErr) throw chanErr;
          return team;
        } catch (err) {
          console.error('createTeam error:', err);
          return null;
        }
      }

      async getTeamMembers(teamId) {
        if (this.isDemo) {
          return MOCK_USERS.slice(0, 3).map(u => ({ ...u, role: 'member' }));
        }
        try {
          const { data, error } = await this.sb.from('team_members').select('user_id, role, users(*)').eq('team_id', teamId);
          if (error) throw error;
          return data?.map(tm => ({ ...tm.users, role: tm.role })) || [];
        } catch (err) {
          console.error('getTeamMembers error:', err);
          return [];
        }
      }

      async addTeamMember(teamId, userId) {
        if (this.isDemo) return true;
        try {
          const { error } = await this.sb.from('team_members').insert({ team_id: teamId, user_id: userId, role: 'member' });
          if (error) throw error;
          return true;
        } catch (err) {
          console.error('addTeamMember error:', err);
          return false;
        }
      }

      async removeTeamMember(teamId, userId) {
        if (this.isDemo) return true;
        try {
          const { error } = await this.sb.from('team_members').delete().eq('team_id', teamId).eq('user_id', userId);
          if (error) throw error;
          return true;
        } catch (err) {
          console.error('removeTeamMember error:', err);
          return false;
        }
      }

      async updateTeamMemberRole(teamId, userId, newRole) {
        if (this.isDemo) return true;
        try {
          const { error } = await this.sb.from('team_members').update({ role: newRole }).eq('team_id', teamId).eq('user_id', userId);
          if (error) throw error;
          return true;
        } catch (err) {
          console.error('updateTeamMemberRole error:', err);
          return false;
        }
      }

      async createGroupConversation(name, memberIds) {
        if (this.isDemo) {
          const convId = 'group-' + Date.now();
          return { id: convId, is_group: true, name, members: memberIds };
        }
        try {
          const { data: conv, error: convErr } = await this.sb.from('conversations').insert({ is_group: true, name }).select().single();
          if (convErr) throw convErr;
          const memberRows = memberIds.map(id => ({ conversation_id: conv.id, user_id: id }));
          const { error: memErr } = await this.sb.from('conversation_members').insert(memberRows);
          if (memErr) throw memErr;
          return conv;
        } catch (err) {
          console.error('createGroupConversation error:', err);
          return null;
        }
      }

      // === AUTH METHODS ===

      // Magic Link senden
      async sendMagicLink(email) {
        if (this.isDemo) return { error: null };
        try {
          const { error } = await this.sb.auth.signInWithOtp({
            email,
            options: {
              emailRedirectTo: window.location.origin + window.location.pathname
            }
          });
          if (error) throw error;
          return { error: null };
        } catch (err) {
          console.error('sendMagicLink error:', err);
          return { error: err.message || 'Magic Link konnte nicht gesendet werden.' };
        }
      }

      // Aktuelle Session prüfen
      async getSession() {
        if (this.isDemo || !this.sb) return null;
        try {
          const { data: { session } } = await this.sb.auth.getSession();
          return session;
        } catch (err) {
          console.error('getSession error:', err);
          return null;
        }
      }

      // Auth-User in users-Tabelle auflösen
      async resolveAuthUser(authUser) {
        if (!authUser || this.isDemo) return null;
        try {
          // Suche User in der users-Tabelle per E-Mail
          const { data, error } = await this.sb.from('users').select('*').eq('email', authUser.email).single();
          if (error && error.code !== 'PGRST116') throw error; // PGRST116 = no rows
          return data || null;
        } catch (err) {
          console.error('resolveAuthUser error:', err);
          return null;
        }
      }

      // Auth-State-Listener
      onAuthStateChange(callback) {
        if (this.isDemo || !this.sb) return () => {};
        const { data: { subscription } } = this.sb.auth.onAuthStateChange((event, session) => {
          callback(event, session);
        });
        return () => subscription?.unsubscribe();
      }

      // Logout
      async signOut() {
        if (this.isDemo || !this.sb) return;
        try {
          await this.sb.auth.signOut();
        } catch (err) {
          console.error('signOut error:', err);
        }
      }

      cleanup() {
        this.subscriptions.forEach(s => {
          try {
            if (s.unsubscribe) s.unsubscribe();
            if (this.sb && this.sb.removeChannel) this.sb.removeChannel(s);
          } catch (e) {
            console.warn('Cleanup error:', e);
          }
        });
        this.subscriptions = [];
      }
    }

    function isValidPopupUrl(url) {
      try { const u = new URL(url); return u.protocol === 'https:'; } catch (e) { return false; }

    function openWikiPopup(url, title) {
      if (!isValidPopupUrl(url)) { console.warn('Wiki-Popup: Ungültige URL:', url); return; }
      const existing = document.querySelector('.wiki-popup-overlay');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.className = 'wiki-popup-overlay';
      overlay.onclick = e => { if (e.target === overlay) closeWikiPopup(); };

      const popup = document.createElement('div');
      popup.className = 'wiki-popup';

      const header = document.createElement('div');
      header.className = 'wiki-popup-header';
      const h3 = document.createElement('h3');
      h3.textContent = '📖 ' + title;
      const actions = document.createElement('div');
      actions.style.cssText = 'display:flex;align-items:center;gap:12px';
      const extLink = document.createElement('a');
      extLink.href = url; extLink.target = '_blank'; extLink.rel = 'noopener';
      extLink.textContent = '↗ In neuem Tab öffnen';
      const closeBtn = document.createElement('button');
      closeBtn.className = 'wiki-popup-close'; closeBtn.textContent = '✕';
      closeBtn.setAttribute('aria-label', 'Schließen'); closeBtn.onclick = closeWikiPopup;
      actions.appendChild(extLink); actions.appendChild(closeBtn);
      header.appendChild(h3); header.appendChild(actions);

      const iframe = document.createElement('iframe');
      iframe.src = url; iframe.sandbox = 'allow-same-origin allow-popups allow-scripts';
      iframe.setAttribute('loading', 'lazy');
      const loadTimeout = setTimeout(() => { showWikiError(popup, url, title); }, 8000);
      iframe.onload = () => clearTimeout(loadTimeout);
      iframe.onerror = () => { clearTimeout(loadTimeout); showWikiError(popup, url, title); };

      popup.appendChild(header); popup.appendChild(iframe);
      overlay.appendChild(popup); document.body.appendChild(overlay);

      if (_wikiKeyHandler) document.removeEventListener('keydown', _wikiKeyHandler);
      _wikiKeyHandler = function(e) { if (e.key === 'Escape') closeWikiPopup(); };
      document.addEventListener('keydown', _wikiKeyHandler);

    function MentionTextarea({ value, onChange, allUsers, placeholder, autoFocus, style }) {
      const [mentionQuery, setMentionQuery] = useState(null);

      const textareaRef = useRef(null);

      const filteredUsers = useMemo(() => {
        if (mentionQuery === null || !allUsers) return [];
        const q = mentionQuery.toLowerCase();
        // @alle als ersten Eintrag anbieten
        const specialEntries = [];
        if ('alle'.startsWith(q) || q === '') {
          specialEntries.push({ id: '__all__', display_name: 'alle', avatar_color: '#D4762C', _isSpecial: true, _label: '@alle — Alle benachrichtigen' });
        }
        const userMatches = allUsers.filter(u => u.display_name?.toLowerCase().includes(q) || u.username?.toLowerCase().includes(q)).slice(0, 7);
        return [...specialEntries, ...userMatches];
      }, [mentionQuery, allUsers]);

      const handleInput = (e) => {
        const val = e.target.value;
        onChange(val);
        // Detect @mention trigger
        const pos = e.target.selectionStart;
        const textBefore = val.substring(0, pos);
        const atMatch = textBefore.match(/@(\w*)$/);
        if (atMatch) {
          setMentionQuery(atMatch[1]);
          setMentionIdx(0);
        } else {
          setMentionQuery(null);
        }
      };

      const insertMention = (user) => {
        const textarea = textareaRef.current;
        if (!textarea) return;
        const pos = textarea.selectionStart;
        const textBefore = value.substring(0, pos);
        const textAfter = value.substring(pos);
        const atPos = textBefore.lastIndexOf('@');
        const newText = textBefore.substring(0, atPos) + '@' + user.display_name + ' ' + textAfter;
        onChange(newText);
        setMentionQuery(null);
        setTimeout(() => {
          const newPos = atPos + user.display_name.length + 2;
          textarea.focus();
          textarea.setSelectionRange(newPos, newPos);
        }, 0);
      };

      const handleKeyDown = (e) => {
        if (mentionQuery !== null && filteredUsers.length > 0) {
          if (e.key === 'ArrowDown') { e.preventDefault(); setMentionIdx(i => Math.min(i + 1, filteredUsers.length - 1)); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); setMentionIdx(i => Math.max(i - 1, 0)); }
          else if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); insertMention(filteredUsers[mentionIdx]); }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const now = new Date();
        const diff = now - d;
        if (diff < 60000) return 'Gerade eben';
        if (diff < 3600000) return Math.floor(diff / 60000) + ' Min.';
        if (diff < 86400000 && d.getDate() === now.getDate()) return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        if (diff < 172800000) return 'Gestern, ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ', ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      } catch { return dateStr; }
    }

    const SANITIZE_CONFIG = {
      ALLOWED_TAGS: ['p','br','b','strong','i','em','u','a','ul','ol','li','h1','h2','h3','h4','blockquote','pre','code','span','div','hr'],
      ALLOWED_ATTR: ['href','target','rel','class'],

    function highlightMentions(containerEl) {
      // DOM-basiert statt Regex+HTML (XSS-sicher)
      // Iteriert über TextNodes und wrapped @Mentions in <span>
      const walker = document.createTreeWalker(containerEl, NodeFilter.SHOW_TEXT, null);
      const mentionRegex = /@([\wäöüÄÖÜß]+(?:\s[\wäöüÄÖÜß.]+)?)/g;
      const textNodes = [];
      while (walker.nextNode()) textNodes.push(walker.currentNode);
      for (const node of textNodes) {
        const text = node.nodeValue;
        if (!mentionRegex.test(text)) continue;
        mentionRegex.lastIndex = 0;
        const frag = document.createDocumentFragment();
        let lastIdx = 0;
        let match;
        while ((match = mentionRegex.exec(text)) !== null) {
          if (match.index > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
          const span = document.createElement('span');
          span.className = match[1].toLowerCase() === 'alle' ? 'mention-tag-all' : 'mention-tag';
          span.textContent = match[0]; // textContent = XSS-sicher
          frag.appendChild(span);
          lastIdx = mentionRegex.lastIndex;
        }
        if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
        node.parentNode.replaceChild(frag, node);
      }
    }

    function ChatPanel({ conversation, messages, setMessages, dataService, currentUser, onBack, onlineUsers, hasMore, onLoadMore, loadingMore }) {
      const [input, setInput] = useState('');
      const [sending, setSending] = useState(false);
      const [chatFiles, setChatFiles] = useState([]);  // Array of { file, preview }
      const messagesEndRef = useRef(null);
      const chatFileRef = useRef(null);

      useEffect(() => {
        if (messagesEndRef.current) {
          messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [messages]);

      const CHAT_ALLOWED_TYPES = new Set([
        'image/jpeg', 'image/png', 'image/gif', 'image/webp',
        'application/pdf',
        'application/msword',
        'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
        'application/vnd.ms-powerpoint',
        'application/vnd.openxmlformats-officedocument.presentationml.presentation',
        'application/vnd.ms-excel',
        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
        'text/plain'
      ]);

      const handleChatFileSelect = (e) => {
        const newFiles = Array.from(e.target.files);
        const validFiles = [];
        for (const file of newFiles) {
          if (file.size > 20 * 1024 * 1024) { showToast('Datei "' + file.name + '" zu groß (max. 20 MB)', 'error'); continue; }
          if (file.type && !CHAT_ALLOWED_TYPES.has(file.type)) { showToast('Dateityp von "' + file.name + '" nicht erlaubt.', 'error'); continue; }
          const preview = file.type.startsWith('image/') ? URL.createObjectURL(file) : null;
          validFiles.push({ file, preview });
        }
        if (validFiles.length > 0) {
          setChatFiles(prev => {
            if (prev.length + validFiles.length > 10) { showToast('Maximal 10 Dateien pro Nachricht', 'error'); return prev; }
            return [...prev, ...validFiles];
          });
        }
        if (chatFileRef.current) chatFileRef.current.value = '';
      };

      const removeChatFile = (index) => {
        setChatFiles(prev => {
          const removed = prev[index];
          if (removed?.preview) URL.revokeObjectURL(removed.preview);
          return prev.filter((_, i) => i !== index);
        });
      };

      const clearChatFiles = () => {
        chatFiles.forEach(f => { if (f.preview) URL.revokeObjectURL(f.preview); });
        setChatFiles([]);
        if (chatFileRef.current) chatFileRef.current.value = '';
      };

      const handleSend = async (e) => {
        e.preventDefault();
        if ((!input.trim() && chatFiles.length === 0) || sending) return;
        setSending(true);
        try {
          let fileUrls = [];
          if (chatFiles.length > 0) {
            for (const sf of chatFiles) {
              const url = await dataService.uploadFile(sf.file);
              if (url) fileUrls.push({ url, name: sf.file.name, type: sf.file.type });
            }
          }
          const imageUrlValue = fileUrls.length === 1 ? fileUrls[0].url : fileUrls.length > 1 ? JSON.stringify(fileUrls) : null;
          const contentText = input || (fileUrls.length > 0 ? ('📎 ' + fileUrls.length + ' Datei' + (fileUrls.length > 1 ? 'en' : '')) : '');
          const sentMsg = await dataService.sendMessage(conversation.id, currentUser.id, contentText, imageUrlValue);
          if (sentMsg && setMessages) {
