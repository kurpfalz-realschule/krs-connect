    const FEEDBACK_GAS_URL = 'https://script.google.com/macros/s/AKfycbwr9ZV9108jpkfN4nKboTuwMEgUhBOxW2c2ksWgazKNeSgiINL4G2ZNUMKeEzfaOj3H_g/exec';

    function FeedbackModal({ user, onClose }) {
      const [category, setCategory] = useState('');
      const [rating, setRating] = useState(0);
      const [message, setMessage] = useState('');
      const [sending, setSending] = useState(false);
      const [lastSubmit, setLastSubmit] = useState(0);

      const categories = [
        { id: 'bug', label: '🐛 Bug / Fehler' },
        { id: 'verbesserung', label: '💡 Verbesserung' },
        { id: 'lob', label: '👍 Lob' },
        { id: 'frage', label: '❓ Frage' },
        { id: 'sonstiges', label: '📝 Sonstiges' }
      ];

      const handleSubmit = async () => {
        if (!message.trim() && !category) {
          showToast('Bitte schreibe eine Nachricht oder wähle eine Kategorie.', 'info');
          return;
        }
        // Rate-Limiting: 10 Sekunden Cooldown
        if (Date.now() - lastSubmit < 10000) {
          showToast('Bitte warte einen Moment vor dem nächsten Feedback.', 'info');
          return;
        }
        setSending(true);
        try {
          const payload = {
            name: String(user?.display_name || 'Anonym').substring(0, 100),
            category: category || 'Sonstiges',
            rating: Math.min(Math.max(rating, 0), 5),
            message: String(message.trim()).substring(0, 2000),
            page: String(window.location.href).substring(0, 200),
            userAgent: String(navigator.userAgent).substring(0, 300)
          };

          if (FEEDBACK_GAS_URL) {
            const resp = await fetch(FEEDBACK_GAS_URL, {
              method: 'POST',
              body: JSON.stringify(payload),
              mode: 'no-cors'
            });
            // mode: 'no-cors' returns opaque response — we trust GAS handled it
          } else {
            // Kein Endpoint konfiguriert — Demo-Hinweis
            console.log('Feedback (Demo-Modus, kein GAS-Endpoint):', payload);
          }

          setLastSubmit(Date.now());
          showToast('Danke für dein Feedback!', 'success');
          onClose();
        } catch (err) {
          console.error('Feedback send error:', err);
          showToast('Feedback konnte nicht gesendet werden. Bitte versuche es später erneut.', 'error');
          setSending(false);
        }
      };

      return React.createElement('div', { className: 'feedback-overlay', onClick: (ev) => { if (ev.target === ev.currentTarget) onClose(); } },
        React.createElement('div', { className: 'feedback-modal' },
          React.createElement('div', { className: 'feedback-title' }, '📣', ' Feedback geben'),

          React.createElement('div', { className: 'feedback-label' }, 'Kategorie'),
          React.createElement('div', { className: 'feedback-categories' },
            categories.map(cat =>
              React.createElement('button', {
                key: cat.id,
                className: 'feedback-cat' + (category === cat.id ? ' active' : ''),
                onClick: () => setCategory(cat.id)
              }, cat.label)
            )
          ),

          React.createElement('div', { className: 'feedback-label' }, 'Wie gefällt dir KRS Connect? (optional)'),
          React.createElement('div', { className: 'feedback-stars' },
            [1, 2, 3, 4, 5].map(star =>
              React.createElement('button', {
                key: star,
                className: 'feedback-star' + (star <= rating ? ' active' : ''),
                onClick: () => setRating(star === rating ? 0 : star),
                'aria-label': star + ' Sterne'
              }, star <= rating ? '★' : '☆')
            )
          ),

          React.createElement('div', { className: 'feedback-label' }, 'Deine Nachricht'),
          React.createElement('textarea', {

          React.createElement('div', { className: 'feedback-actions' },
            React.createElement('button', { className: 'feedback-btn feedback-btn-cancel', onClick: onClose }, 'Abbrechen'),

              className: 'feedback-btn feedback-btn-send',

        )
      );

    function useNotifications() {
      const [notificationsEnabled, setNotificationsEnabled] = useState(() => {
        try { return localStorage.getItem('krs-notifications') !== 'off'; } catch(e) { return true; }
      });
      const [notificationPermission, setNotificationPermission] = useState(() => {
        return typeof Notification !== 'undefined' ? Notification.permission : 'denied';
      });

      const requestNotifications = useCallback(async () => {
        if (typeof Notification === 'undefined') {
          showToast('Browser unterstützt keine Benachrichtigungen', 'error');
          return;
        }
        const perm = await Notification.requestPermission();
        setNotificationPermission(perm);
        if (perm === 'granted') {
          setNotificationsEnabled(true);
          try { localStorage.setItem('krs-notifications', 'on'); } catch(e) {}
          showToast('Benachrichtigungen aktiviert!', 'success');
        } else {
          showToast('Benachrichtigungen wurden blockiert. Bitte in den Browser-Einstellungen erlauben.', 'error');
        }
      }, []);

      const toggleNotifications = useCallback(() => {
        if (!notificationsEnabled && notificationPermission !== 'granted') {
          requestNotifications();
          return;
        }
        setNotificationsEnabled(prev => {
          const next = !prev;
          try { localStorage.setItem('krs-notifications', next ? 'on' : 'off'); } catch(e) {}
          showToast(next ? 'Benachrichtigungen aktiviert' : 'Benachrichtigungen deaktiviert', 'success');
          return next;
        });
      }, [notificationsEnabled, notificationPermission, requestNotifications]);

      const sendBrowserNotification = useCallback((title, body, onClick) => {
        if (!notificationsEnabled || notificationPermission !== 'granted') return;
        if (document.hasFocus()) return;
        try {
          const n = new Notification(title, {
            body: (body || '').substring(0, 150),
            icon: KRS_LOGO, badge: KRS_LOGO,
            tag: 'krs-' + Date.now(),
            renotify: true
          });
          if (onClick) n.onclick = () => { window.focus(); onClick(); n.close(); };
          setTimeout(() => n.close(), 8000);
        } catch(e) { console.warn('Notification error:', e); }
      }, [notificationsEnabled, notificationPermission]);

      return { notificationsEnabled, notificationPermission, requestNotifications,
        toggleNotifications, sendBrowserNotification };
    }

    function App() {
      const [setupComplete, setSetupComplete] = useState(false);
      const [supabaseClient, setSupabaseClient] = useState(null);
      const [isDemo, setIsDemo] = useState(true);
      const [user, setUser] = useState(null);
      const [view, setView] = useState('teams');
      const [allUsers, setAllUsers] = useState([]);
      const [loadingUsers, setLoadingUsers] = useState(false);
      const [loadingMore, setLoadingMore] = useState(false);
      const [userTeamRole, setUserTeamRole] = useState(null);
      const [onlineUsers, setOnlineUsers] = useState(new Set());
      const [onboardingStep, setOnboardingStep] = useState(0);
      const PAGE_SIZE = 50;

      // Custom Hooks
      const teamsState = useTeamsState();
      const { teams, setTeams, selectedTeam, setSelectedTeam, channels, setChannels,
        selectedChannel, setSelectedChannel, posts, setPosts, replies, setReplies,
        openThread, setOpenThread, hiddenTeams, showHiddenTeams, setShowHiddenTeams,
        postsLoading, setPostsLoading, hasMorePosts, setHasMorePosts, toggleTeamVisibility } = teamsState;

      const chatState = useChatState();
      const { conversations, setConversations, selectedConversation, setSelectedConversation,
        chatMessages, setChatMessages, hasMoreMessages, setHasMoreMessages } = chatState;

      const unreadState = useUnreadState();
      const { unreadChatCount, setUnreadChatCount, unreadPostChannels, setUnreadPostChannels,
        channelTeamMap, setChannelTeamMap } = unreadState;

      const modals = useModals();
      const { showOnlinePanel, setShowOnlinePanel, showFeedback, setShowFeedback,
        showProfile, setShowProfile, showPrivacy, setShowPrivacy,
        showOnboarding, setShowOnboarding, showCreateTeam, setShowCreateTeam,
        showTeamMembers, setShowTeamMembers, mobileSidebarOpen, setMobileSidebarOpen,
        showHelp, setShowHelp } = modals;

      const { notificationsEnabled, notificationPermission, requestNotifications,
        toggleNotifications, sendBrowserNotification } = useNotifications();

      // Notifications, Modals, Teams, Chat, Unread — alle in Custom Hooks (oben)

      const handleAvatarUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) { showToast('Bitte wähle ein Bild aus.', 'error'); return; }
        if (file.size > 5 * 1024 * 1024) { showToast('Bild zu groß (max. 5 MB).', 'error'); return; }
        try {
          const url = await dataService.uploadFile(file);
          if (url) {
            const updated = await dataService.updateProfile(user.id, { avatar_url: url });
            if (updated) {
              setUser(prev => ({ ...prev, avatar_url: url }));
              showToast('Profilbild aktualisiert!', 'success');
              setShowProfile(false);
            }
          }
        } catch (err) {
          showToast('Profilbild konnte nicht hochgeladen werden.', 'error');
        }
      };

      // (loadingUsers, postsLoading, hasMore*, loadingMore, mobileSidebarOpen,
      //  showCreateTeam, showTeamMembers, userTeamRole — jetzt oben in App oder in Custom Hooks)

      const dataService = useMemo(() => new DataService(isDemo ? null : supabaseClient), [supabaseClient, isDemo]);

      // Pending auth user (wird nach Setup+Render automatisch eingeloggt)
      const [pendingAuthUser, setPendingAuthUser] = useState(null);

      // ── Hub-Auth: postMessage-Listener ──────────────
      const hubAuthStateRef = useRef({ setupComplete: false, user: null, allUsers: [] });
      hubAuthStateRef.current = { setupComplete, user, allUsers };

      useEffect(() => {
        const isInHub = window.parent !== window;
        const handleHubAuth = async (event) => {
          if (!event.origin.includes('benditot.github.io') && event.origin !== window.location.origin) return;
          if (event.data?.type === 'KRS_HUB_AUTH' && event.data?.hub_verified) {
            const hubUser = event.data.user;
            const st = hubAuthStateRef.current;
            if (hubUser && !st.setupComplete) {
              // Auto-Setup im Demo-Modus (Hub übernimmt Auth)
              setIsDemo(true);
              setLoadingUsers(true);
              try {
                const ds = new DataService(null);
                const usersData = await ds.getUsers();
                const userList = usersData.length > 0 ? usersData : MOCK_USERS;
                setAllUsers(userList);
                setSetupComplete(true);
                const match = userList.find(u =>
                  u.kuerzel === hubUser.kuerzel ||
                  u.display_name === hubUser.display_name ||
                  u.name === hubUser.lehrkraft_name
                );
                if (match) setPendingAuthUser(match);
              } catch (e) {
                setAllUsers(MOCK_USERS);
                setSetupComplete(true);
              }
              setLoadingUsers(false);
            } else if (hubUser && st.setupComplete && !st.user) {
              const userList = st.allUsers.length > 0 ? st.allUsers : MOCK_USERS;
              const match = userList.find(u =>
                u.kuerzel === hubUser.kuerzel ||
                u.display_name === hubUser.display_name ||
                u.name === hubUser.lehrkraft_name
              );
              if (match) setPendingAuthUser(match);
            }
          }
        };
        window.addEventListener('message', handleHubAuth);
        if (isInHub) {
          window.parent.postMessage({ type: 'KRS_HUB_REQUEST_AUTH', moduleId: 'connect' }, '*');
        }
        return () => window.removeEventListener('message', handleHubAuth);
      }, []);
