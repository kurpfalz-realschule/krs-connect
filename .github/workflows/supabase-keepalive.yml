name: Supabase Keep-Alive
on:
  schedule:
    - cron: '23 5 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Ping Supabase REST
        run: |
          ANON=$(grep -o 'eyJ[A-Za-z0-9_.-]*' index.html | head -1)
          URL=$(grep -o 'https://[a-z]*\.supabase\.co' index.html | head -1)
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $ANON" "$URL/rest/v1/users?select=id&limit=1")
          echo "Keep-Alive-Ping: HTTP $CODE"
          [ "$CODE" = "200" ] || { echo "::warning::Supabase nicht erreichbar - evtl. pausiert!"; exit 1; }
